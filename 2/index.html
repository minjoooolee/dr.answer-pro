<script type="text/babel">
// ─── Calm palette ───────────────────────────────────────────────

  ink2:  '#3A3F47',
  mute:  'rgba(14,17,22,0.55)',

  line:  'rgba(14,17,22,0.06)',
  accent:'#4B3BE0',   // single deep indigo accent
  ok:    '#2BB673',
  warn:  '#E0883A',
  alert: '#D14B5C',
};

// ─── 3D Mesh AI Orb (Three.js) ──────────────────────────────────
// Status → Three.js color palette
const ORB_PALETTE = {
  ok:    { base: 0x052e14, emissive: 0x0a4a22, specular: 0x66ffaa, ambientHex: 0x116622, rimHex: 0x22dd66, wire: 0x33ee77, pts: 0xaaffcc, glow: 0x22cc55, shadow: 'rgba(30,190,80,0.70)'  },
  watch: { base: 0x2e1800, emissive: 0x4a2800, specular: 0xffcc66, ambientHex: 0x663300, rimHex: 0xff8822, wire: 0xff9933, pts: 0xffddaa, glow: 0xee7722, shadow: 'rgba(220,120,30,0.70)'  },
  alert: { base: 0x2e0606, emissive: 0x4a0e0e, specular: 0xff9999, ambientHex: 0x661111, rimHex: 0xff3333, wire: 0xff4444, pts: 0xffbbbb, glow: 0xee2222, shadow: 'rgba(220,40,40,0.75)'   },
};

function MeshOrb({ size = 96, status = 'ok' }) {
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    const el = containerRef.current;
    if (!el || !window.THREE) return;
    const THREE = window.THREE;
    const pal = ORB_PALETTE[status] || ORB_PALETTE.ok;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(size, size);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    el.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 50);
    camera.position.z = 3.0;

    // Lighting — tinted to match status color
    scene.add(new THREE.AmbientLight(pal.ambientHex, 1.0));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
    keyLight.position.set(2, 2, 3);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(pal.rimHex, 0.9);
    rimLight.position.set(-3, -1, -2);
    scene.add(rimLight);

    // Base sphere
    const baseMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1, 64, 48),
      new THREE.MeshPhongMaterial({ color: pal.base, emissive: pal.emissive, specular: pal.specular, shininess: 80 })
    );
    scene.add(baseMesh);

    // Wireframe
    const wireMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1.012, 20, 14),
      new THREE.MeshBasicMaterial({ color: pal.wire, wireframe: true, transparent: true, opacity: 0.38 })
    );
    scene.add(wireMesh);

    // Particle cloud
    const points = new THREE.Points(
      new THREE.SphereGeometry(1.018, 36, 24),
      new THREE.PointsMaterial({ color: pal.pts, size: 0.030, transparent: true, opacity: 0.95 })
    );
    scene.add(points);

    // Outer glow shell
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.18, 20, 14),
      new THREE.MeshBasicMaterial({ color: pal.glow, transparent: true, opacity: 0.09, side: THREE.BackSide })
    ));

    let animId;
    const t0 = Date.now();
    const animate = () => {
      animId = requestAnimationFrame(animate);
      const t = (Date.now() - t0) / 1000;
      wireMesh.rotation.y = t * 0.28;
      wireMesh.rotation.x = t * 0.09;
      points.rotation.y  = t * 0.28;
      points.rotation.x  = t * 0.09;
      const s = 1 + Math.sin(t * 0.75) * 0.022;
      baseMesh.scale.setScalar(s);
      wireMesh.scale.setScalar(s);
      points.scale.setScalar(s);
      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(animId);
      renderer.dispose();
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
    };
  }, [size, status]);

  const pal = ORB_PALETTE[status] || ORB_PALETTE.ok;
  return (
    <div style={{ animation: 'orbFloat 4.5s ease-in-out infinite' }}>
      <div ref={containerRef} style={{
        width: size, height: size, borderRadius: '50%', overflow: 'hidden',
        filter: `drop-shadow(0 0 26px ${pal.shadow})`,
      }}/>
    </div>
  );
}

function SyncIndicator() {
  const TOTAL = 600; // 10분
  const [seconds, setSeconds] = React.useState(TOTAL);
  React.useEffect(() => {
    const id = setInterval(() => {
      setSeconds(s => (s <= 1 ? TOTAL : s - 1));
    }, 1000);
    return () => clearInterval(id);
  }, []);
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  const fmt = `${m}:${String(s).padStart(2, '0')}`;
  return (
    <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 7,

  );
}

// ─── Small bar chart for metric cards ──────────────────────────
function BarChart({ bars, highlightLast = true, accentTone = 'ok', w = 96, h = 26 }) {
  const max = Math.max(...bars);
  const gap = 2;
  const barW = (w - gap * (bars.length - 1)) / bars.length;
  const accent = accentTone === 'warn' ? C.warn : C.ok;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: 'block' }}>
      {bars.map((v, i) => {
        const bh = Math.max(2, (v / max) * (h - 2));
        const x = i * (barW + gap);
        const y = h - bh;
        const isLast = i === bars.length - 1;
        const fill = isLast && highlightLast ? accent : 'rgba(180,194,210,0.55)';
        return <rect key={i} x={x} y={y} width={barW} height={bh} rx={1.2} fill={fill}/>;
      })}
    </svg>
  );
}

function TrendIcon({ dir = 'up', color = C.ok, size = 10 }) {
  if (dir === 'steady') {
    return (
      <svg width={size} height={size} viewBox="0 0 12 12" fill="none">
        <path d="M2 6h8" stroke={color} strokeWidth="2" strokeLinecap="round"/>
      </svg>
    );
  }
  return (
    <svg width={size} height={size} viewBox="0 0 12 12" fill="none">
      <path d="M2 8l4-4 4 4" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function MetricCard({ label, value, unit, tone = 'ok', trend = 'steady', statusText, bars }) {
  const accent = tone === 'warn' ? C.warn : C.ok;
  return (
    <div style={{
      background: C.card, borderRadius: 18, padding: '14px 14px 12px',
      boxShadow: '0 1px 1.5px rgba(14,17,22,0.04)',
      position: 'relative', overflow: 'hidden',
      display: 'flex', flexDirection: 'column', gap: 6, minHeight: 132,
    }}>
      <div style={{
        fontSize: 10.5, fontWeight: 700, color: C.mute, letterSpacing: 1.4, textTransform: 'uppercase',
      }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginTop: -2 }}>
        <span style={{ fontSize: 26, fontWeight: 700, color: accent, letterSpacing: -0.7, lineHeight: 1 }}>{value}</span>
        <span style={{ fontSize: 12, color: C.mute, fontWeight: 500 }}>{unit}</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11.5, color: accent, fontWeight: 600 }}>
        <TrendIcon dir={trend} color={accent}/>
        {statusText}
      </div>
      <div style={{ marginTop: 'auto', paddingTop: 6 }}>
        <BarChart bars={bars} accentTone={tone} w={120} h={26}/>
      </div>
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, height: 3, background: accent, opacity: 0.85 }}/>
    </div>
  );
}

// ─── Tab bar ────────────────────────────────────────────────────
function TabBar() {
  const Ico = {
    home: (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M3 11l9-7 9 7v9a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1v-9z" stroke={C.ink} strokeWidth="1.6" strokeLinejoin="round"/>
      </svg>
    ),
    record: (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="4" width="16" height="16" rx="2" stroke={C.ink} strokeWidth="1.6"/>
        <path d="M8 9h8M8 13h6M8 17h4" stroke={C.ink} strokeWidth="1.6" strokeLinecap="round"/>
      </svg>
    ),
    report: (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M4 19V5M4 19h16M8 14l3-4 3 3 4-6" stroke={C.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    ),
    user: (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke={C.ink} strokeWidth="1.6"/>
        <path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6" stroke={C.ink} strokeWidth="1.6" strokeLinecap="round"/>
      </svg>
    ),
  };

  const item = (ic, label, active) => (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, opacity: active ? 1 : 0.45 }}>
      {ic}
      <div style={{ fontSize: 10, fontWeight: 500, color: C.ink }}>{label}</div>
    </div>
  );

  return (
    <div style={{
      position: 'absolute', left: 16, right: 16, bottom: 22,
      height: 68, borderRadius: 34, padding: '0 12px',
      background: 'rgba(255,255,255,0.85)',
      backdropFilter: 'blur(20px) saturate(180%)',
      WebkitBackdropFilter: 'blur(20px) saturate(180%)',
      boxShadow: '0 8px 24px rgba(14,17,22,0.08), 0 0 0 0.5px rgba(0,0,0,0.04)',
      display: 'flex', alignItems: 'center', gap: 4, zIndex: 40,
    }}>
      {item(Ico.home, '홈', true)}
      {item(Ico.record, '기록', false)}
      {item(Ico.report, '리포트', false)}
      {item(Ico.user, '내정보', false)}
    </div>
  );
}

function App() {
  return (
    <IOSDevice>
      <Home/>
      <TabBar/>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
