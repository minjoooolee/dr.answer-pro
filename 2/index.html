    100% { opacity: 1;   transform: scaleY(1); }
  }
  @keyframes radarPulse {
    0%   { transform: scale(0.6); opacity: 0.55; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }

<script type="text/babel">
// ─── Calm palette ───────────────────────────────────────────────
const C = {
  bg:    '#F6F7F9',
  card:  '#FFFFFF',
  ink:   '#0E1116',
  ink2:  '#3A3F47',
  mute:  'rgba(14,17,22,0.55)',
  mute2: 'rgba(14,17,22,0.34)',
  line:  'rgba(14,17,22,0.06)',
  accent:'#4B3BE0',   // single deep indigo accent
  ok:    '#2BB673',
  warn:  '#E0883A',
  alert: '#D14B5C',
};

// ─── 3D Mesh AI Orb (Three.js) ──────────────────────────────────
// Status → Three.js color palette
const ORB_PALETTE = {
  ok:    { core: 0x00ff88, base: 0x031a0d, emissive: 0x05401a, specular: 0x88ffcc, ambientHex: 0x0d4422, rimHex: 0x00ff77, wire: 0x22ee66, pts: 0xaaffd0, ring1: 0x33ff88, ring2: 0x00dd55, glow: 0x11ee55, shadow: 'rgba(0,220,100,0.75)'  },
  watch: { core: 0xff9900, base: 0x1e0e00, emissive: 0x4a2600, specular: 0xffcc44, ambientHex: 0x552200, rimHex: 0xff8800, wire: 0xff9922, pts: 0xffd088, ring1: 0xffaa33, ring2: 0xff7700, glow: 0xee7700, shadow: 'rgba(230,120,0,0.75)'   },
  alert: { core: 0xff3355, base: 0x1e0404, emissive: 0x4a0c0c, specular: 0xff8888, ambientHex: 0x551111, rimHex: 0xff2244, wire: 0xff3344, pts: 0xffaaaa, ring1: 0xff4455, ring2: 0xdd1133, glow: 0xee1133, shadow: 'rgba(230,30,60,0.80)'    },
};

function MeshOrb({ size = 96, status = 'ok' }) {
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    const el = containerRef.current;
    if (!el || !window.THREE) return;
    const THREE = window.THREE;
    const pal = ORB_PALETTE[status] || ORB_PALETTE.ok;
    const S = size + 28; // canvas larger than visible orb so rings have room

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(S, S);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    el.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(46, 1, 0.1, 50);
    camera.position.z = 3.6;

    // Lighting
    scene.add(new THREE.AmbientLight(pal.ambientHex, 0.9));
    const key = new THREE.DirectionalLight(0xffffff, 1.6);
    key.position.set(2, 2.5, 3); scene.add(key);
    const rim = new THREE.DirectionalLight(pal.rimHex, 1.1);
    rim.position.set(-3, -1, -2); scene.add(rim);
    const fill = new THREE.DirectionalLight(pal.core, 0.5);
    fill.position.set(0, -3, 1); scene.add(fill);

    // ── Inner glowing core ──────────────────────────────
    const core = new THREE.Mesh(
      new THREE.SphereGeometry(0.42, 32, 24),
      new THREE.MeshBasicMaterial({ color: pal.core, transparent: true, opacity: 0.92 })
    );
    scene.add(core);

    // ── Mid energy layer ────────────────────────────────
    const mid = new THREE.Mesh(
      new THREE.SphereGeometry(0.68, 32, 24),
      new THREE.MeshBasicMaterial({ color: pal.glow, transparent: true, opacity: 0.28 })
    );
    scene.add(mid);

    // ── Outer glass sphere ──────────────────────────────
    const base = new THREE.Mesh(
      new THREE.SphereGeometry(1.0, 64, 48),
      new THREE.MeshPhongMaterial({
        color: pal.base, emissive: pal.emissive, specular: pal.specular,
        shininess: 140, transparent: true, opacity: 0.82,
      })
    );
    scene.add(base);

    // ── Wireframe hex mesh ──────────────────────────────
    const wire = new THREE.Mesh(
      new THREE.SphereGeometry(1.018, 22, 14),
      new THREE.MeshBasicMaterial({ color: pal.wire, wireframe: true, transparent: true, opacity: 0.28 })
    );
    scene.add(wire);

    // ── Neural surface nodes (random points on sphere) ──
    const nodeCount = 120;
    const nodePos = new Float32Array(nodeCount * 3);
    for (let i = 0; i < nodeCount; i++) {
      const th = Math.random() * Math.PI * 2;
      const ph = Math.acos(2 * Math.random() - 1);
      const r = 1.022 + Math.random() * 0.02;
      nodePos[i*3]   = r * Math.sin(ph) * Math.cos(th);
      nodePos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
      nodePos[i*3+2] = r * Math.cos(ph);
    }
    const nodeGeo = new THREE.BufferGeometry();
    nodeGeo.setAttribute('position', new THREE.BufferAttribute(nodePos, 3));
    const nodes = new THREE.Points(nodeGeo,
      new THREE.PointsMaterial({ color: pal.pts, size: 0.044, transparent: true, opacity: 0.95 })
    );
    scene.add(nodes);

    // ── Outer glow shell ────────────────────────────────
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.22, 20, 14),
      new THREE.MeshBasicMaterial({ color: pal.glow, transparent: true, opacity: 0.07, side: THREE.BackSide })
    ));

    // ── Orbital ring 1 (equatorial tilt) ────────────────
    const ring1 = new THREE.Mesh(
      new THREE.TorusGeometry(1.38, 0.013, 16, 120),
      new THREE.MeshBasicMaterial({ color: pal.ring1, transparent: true, opacity: 0.70 })
    );
    ring1.rotation.x = Math.PI * 0.28;
    scene.add(ring1);

    // ── Orbital ring 2 (perpendicular tilt) ─────────────
    const ring2 = new THREE.Mesh(
      new THREE.TorusGeometry(1.52, 0.008, 16, 120),
      new THREE.MeshBasicMaterial({ color: pal.ring2, transparent: true, opacity: 0.45 })
    );
    ring2.rotation.x = -Math.PI * 0.15;
    ring2.rotation.z =  Math.PI * 0.22;
    scene.add(ring2);

    // ── Floating outer particles (scattered around sphere) ──
    const floatCount = 55;
    const floatPos = new Float32Array(floatCount * 3);
    for (let i = 0; i < floatCount; i++) {
      const th = Math.random() * Math.PI * 2;
      const ph = Math.acos(2 * Math.random() - 1);
      const r = 1.55 + Math.random() * 0.55;
      floatPos[i*3]   = r * Math.sin(ph) * Math.cos(th);
      floatPos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
      floatPos[i*3+2] = r * Math.cos(ph);
    }
    const floatGeo = new THREE.BufferGeometry();
    floatGeo.setAttribute('position', new THREE.BufferAttribute(floatPos, 3));
    const floats = new THREE.Points(floatGeo,
      new THREE.PointsMaterial({ color: pal.core, size: 0.022, transparent: true, opacity: 0.55 })
    );
    scene.add(floats);

    // ── Data-pulse dots travelling along ring1 path ──────
    const pulseCount = 8;
    const pulsePos = new Float32Array(pulseCount * 3);
    const pulseDots = new THREE.Points(
      (() => { const g = new THREE.BufferGeometry(); g.setAttribute('position', new THREE.BufferAttribute(pulsePos, 3)); return g; })(),
      new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.9 })
    );
    scene.add(pulseDots);

    let animId;
    const t0 = Date.now();
    const animate = () => {
      animId = requestAnimationFrame(animate);
      const t = (Date.now() - t0) / 1000;

      // Breathing
      const s = 1 + Math.sin(t * 0.80) * 0.020;
      base.scale.setScalar(s); wire.scale.setScalar(s); nodes.scale.setScalar(s);

      // Core pulse (faster, more dramatic)
      const cs = 1 + Math.sin(t * 1.6) * 0.14;
      core.scale.setScalar(cs);
      mid.scale.setScalar(1 + Math.sin(t * 1.6 + 0.5) * 0.09);

      // Rotations
      wire.rotation.y   =  t * 0.22;
      wire.rotation.x   =  t * 0.09;
      nodes.rotation.y  = -t * 0.28;
      nodes.rotation.z  =  t * 0.06;

      // Rings orbit
      ring1.rotation.y  =  t * 0.55;
      ring2.rotation.y  = -t * 0.38;

      // Float drift
      floats.rotation.y =  t * 0.10;
      floats.rotation.x =  t * 0.07;

      // Pulse dots travel along ring1 circle (world-space: tilted by ring1.rotation.x)
      const R = 1.38;
      const rx = Math.PI * 0.28 + ring1.rotation.y; // approximate world pos
      for (let i = 0; i < pulseCount; i++) {
        const ang = t * 1.4 + (i / pulseCount) * Math.PI * 2;
        pulsePos[i*3]   =  R * Math.cos(ang);
        pulsePos[i*3+1] =  R * Math.sin(ang) * Math.cos(Math.PI * 0.28);
        pulsePos[i*3+2] =  R * Math.sin(ang) * Math.sin(Math.PI * 0.28);
      }
      pulseDots.geometry.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(animId);
      renderer.dispose();
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
    };
  }, [size, status]);

  const pal = ORB_PALETTE[status] || ORB_PALETTE.ok;
  return (
    <div style={{
      animation: 'orbFloat 4.5s ease-in-out infinite',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <div ref={containerRef} style={{
        width: size + 28, height: size + 28,
        filter: `drop-shadow(0 0 18px ${pal.shadow}) drop-shadow(0 0 7px ${pal.shadow})`,
        marginTop: -8, marginBottom: -8,
      }}/>
    </div>
  );
}

// ─── HOME ───────────────────────────────────────────────────────
const STATUS_UI = {
  ok:    { label: '안정',     labelColor: '#2BB673', gradColor: 'rgba(30,200,90,0.28)'  },
  watch: { label: '관찰 필요', labelColor: '#E0883A', gradColor: 'rgba(220,130,30,0.28)' },
  alert: { label: '위험',     labelColor: '#D14B5C', gradColor: 'rgba(220,40,40,0.30)'  },
};

function SyncIndicator({ synced = false }) {
  const TOTAL = 600; // 10분
  const [seconds, setSeconds] = React.useState(TOTAL);
  React.useEffect(() => {
    if (!synced) return;
    const id = setInterval(() => {
      setSeconds(s => (s <= 1 ? TOTAL : s - 1));
    }, 1000);
    return () => clearInterval(id);
  }, [synced]);
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  const fmt = `${m}:${String(s).padStart(2, '0')}`;
  return (
    <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 7,
        padding: '5px 11px 5px 9px', borderRadius: 100,
        background: synced ? 'rgba(43,182,115,0.10)' : 'rgba(14,17,22,0.05)',
        border: `1px solid ${synced ? 'rgba(43,182,115,0.22)' : 'rgba(14,17,22,0.10)'}`,
      }}>
        <span style={{ position: 'relative', width: 8, height: 8 }}>
          <span style={{
            position: 'absolute', inset: 0, borderRadius: '50%',
            background: synced ? C.ok : C.mute2,
            animation: synced ? 'syncRing 1.6s ease-out infinite' : 'none',
          }}/>
          <span style={{
            position: 'absolute', inset: 0, borderRadius: '50%',
            background: synced ? C.ok : C.mute2,
          }}/>
        </span>
        <span style={{ fontSize: 11.5, fontWeight: 700, color: synced ? C.ok : C.mute, letterSpacing: -0.1 }}>
          {synced ? 'Ventilator 동기화중' : 'Ventilator 미연결'}
        </span>
      </div>
      <div style={{ fontSize: 11.5, color: synced ? C.mute : C.mute2, fontWeight: 500, letterSpacing: -0.1 }}>
        {synced
          ? <>마지막 동기화 · <span style={{ color: C.ink, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{fmt}</span></>
          : '실시간 모드로 전환 시 동기화'}
      </div>
    </div>
  );
}

function AgentPopup({ onClose, onWorry, status = 'watch' }) {
  const [answered, setAnswered] = React.useState(null);
  const isAlert = status === 'alert';

  const handleAnswer = (v) => {
    setAnswered(v);
    if (v === 'warn') {
      if (isAlert) return; // alert 모드: emergency 화면 유지, 닫기는 사용자가
      setTimeout(() => { onWorry && onWorry(); }, 280);
    } else {
      setTimeout(onClose, 1400);
    }
  };

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 200,
      background: 'rgba(14,17,22,0.45)', backdropFilter: 'blur(6px)',
      WebkitBackdropFilter: 'blur(6px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '0 24px',
    }} onClick={answered ? undefined : onClose}>
      {answered === 'ok' ? (
        <div style={{
          background: '#fff', borderRadius: 20, padding: '28px 24px',
          width: '100%', textAlign: 'center',
          boxShadow: '0 12px 40px rgba(14,17,22,0.18)',
        }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>🙂</div>
          <div style={{ fontSize: 17, fontWeight: 700, color: C.ink, letterSpacing: -0.4 }}>다행이에요</div>
          <div style={{ fontSize: 12.5, color: C.mute, marginTop: 6, lineHeight: 1.5, letterSpacing: -0.1 }}>
            계속 모니터링할게요.
          </div>
        </div>
      ) : isAlert && answered === 'warn' ? (
        <div style={{
          background: '#fff', borderRadius: 20, padding: '26px 22px 22px',
          width: '100%', textAlign: 'center',
          boxShadow: '0 12px 40px rgba(14,17,22,0.18)',
        }} onClick={e => e.stopPropagation()}>
          <div style={{
            width: 54, height: 54, borderRadius: '50%',
            background: C.alert + '18', margin: '0 auto 12px',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke={C.alert} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <div style={{ fontSize: 17, fontWeight: 800, color: C.alert, letterSpacing: -0.4 }}>응급 상황이에요</div>
          <div style={{ fontSize: 13, color: C.ink2, marginTop: 6, lineHeight: 1.55, letterSpacing: -0.2 }}>
            즉시 119에 연락해 도움을 요청하세요.<br/>
            아이의 호흡 상태를 계속 확인해주세요.
          </div>
          <a href="tel:119" style={{
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            marginTop: 18, padding: '14px 0', borderRadius: 14,
            background: C.alert, color: '#fff', textDecoration: 'none',
            fontSize: 15, fontWeight: 700, letterSpacing: -0.3,
            boxShadow: '0 6px 18px rgba(209,75,92,0.35)',
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            119 연결하기
          </a>
          <button onClick={onClose} style={{
            marginTop: 10, background: 'none', border: 'none', cursor: 'pointer',
            color: C.mute, fontSize: 12.5, fontWeight: 600, padding: '8px 12px',
          }}>닫기</button>
        </div>
      ) : (
      <div style={{
        width: '100%', background: '#fff', borderRadius: 20,
        padding: '22px 22px 20px',
        boxShadow: '0 12px 40px rgba(14,17,22,0.18)',
      }} onClick={e => e.stopPropagation()}>

        {/* 헤더 */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{
              width: 22, height: 22, borderRadius: '50%',
              background: isAlert ? C.alert : C.ink,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>

            { v: 'warn', emoji: '😟', label: '걱정돼요' },

            return (
            <button key={o.v} onClick={() => handleAnswer(o.v)} style={{
              flex: 1, padding: '13px 0', borderRadius: 14, cursor: 'pointer',
              background: isEmergencyBtn ? C.alert : '#fff',
              border: `1px solid ${isEmergencyBtn ? C.alert : (answered === o.v ? C.ink : 'rgba(14,17,22,0.14)')}`,
              color: isEmergencyBtn ? '#fff' : C.ink,
              fontSize: 14, fontWeight: isEmergencyBtn ? 700 : 600, letterSpacing: -0.3,

            }}>

              {o.label}
            </button>
            );
          })}
        </div>
      </div>
      )}
    </div>
  );
}

// ─── Small bar chart for metric cards ──────────────────────────
function BarChart({ bars, highlightLast = true, accentTone = 'ok', w = 96, h = 26, animate = false, showLabels = false, unit = '' }) {
  const min = Math.min(...bars);
  const max = Math.max(...bars);
  const range = max - min || 1;
  const accent = accentTone === 'warn' ? C.warn : C.ok;
  const gap = 2;
  const barW = (w - gap * (bars.length - 1)) / bars.length;

  const [settled, setSettled] = React.useState(!animate);
  React.useEffect(() => {
    if (!animate) return;
    setSettled(false);
    const t = setTimeout(() => setSettled(true), 1500);
    return () => clearTimeout(t);
  }, [animate]);

  const chartEl = (
    <div style={{ position: 'relative', width: w, height: h, display: 'flex', alignItems: 'flex-end', gap: gap }}>
      {bars.map((v, i) => {
        // Scale from min baseline so small fluctuations are visible
        const bh = Math.max(3, ((v - min) / range) * (h - 6) + 6);
        const isLast = i === bars.length - 1;
        const fill = isLast && highlightLast ? accent : 'rgba(180,194,210,0.55)';
        let anim = 'none';
        if (animate && isLast) {
          anim = settled
            ? 'barSettle 0.45s cubic-bezier(.22,.68,0,1.2) forwards'
            : 'barBlink 0.5s ease-in-out 3';
        }
        return (
          <div key={i} style={{
            width: barW, height: bh, borderRadius: 1.5,
            background: fill, flexShrink: 0,
            transformOrigin: 'bottom',
            animation: anim,
          }}/>
        );
      })}
    </div>
  );

  if (!showLabels) return chartEl;

  return (
    <div style={{ width: w }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3, fontSize: 8.5, color: C.mute2, fontWeight: 600, letterSpacing: 0.2 }}>
        <span>1h 전</span>
        <span>지금</span>
      </div>
      {chartEl}
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 3, fontSize: 9, color: C.mute, fontWeight: 600 }}>
        <span>{bars[0]}</span>
        <span style={{ color: accent }}>{bars[bars.length - 1]}{unit}</span>
      </div>
    </div>
  );
}

            {(() => {

                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>

        {/* AI 분석 */}
        <div style={{ padding: '18px 22px 6px', fontSize: 11, fontWeight: 700, color: C.mute, letterSpacing: 1.4, textTransform: 'uppercase' }}>AI 분석</div>

          <div style={{

              fontSize: 12.5, fontWeight: 700, letterSpacing: -0.2,
            }}>저장</button>
          </div>
        ) : (
          <button onClick={startEdit} style={{
            padding: '7px 14px', borderRadius: 100, cursor: 'pointer',
            background: '#fff', border: '1px solid rgba(14,17,22,0.14)',
            fontSize: 12.5, fontWeight: 700, color: C.ink, letterSpacing: -0.2,
            display: 'inline-flex', alignItems: 'center', gap: 5,
          }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
              <path d="M4 20h4l10-10-4-4L4 16v4zM14 6l4 4" stroke={C.ink} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            편집
          </button>
        )}
      </div>

      {/* 프로필 요약 */}
      <div style={{ padding: '18px 22px 0', display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style={{
          width: 56, height: 56, borderRadius: 18, flexShrink: 0,
          background: `linear-gradient(140deg, rgba(75,59,224,0.15) 0%, rgba(75,59,224,0.06) 100%)`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 26,
        }}>👦</div>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: C.ink, letterSpacing: -0.5 }}>{data.childName}</div>
          <div style={{ fontSize: 12.5, color: C.mute, fontWeight: 500, marginTop: 2, letterSpacing: -0.1 }}>{data.age}세 · {data.condition}</div>
        </div>
        <div style={{ flex: 1 }}/>
        {!editing && (
          <div style={{
            padding: '6px 14px', borderRadius: 100, fontSize: 12, fontWeight: 700,
            background: 'rgba(224,136,58,0.12)', color: C.warn, letterSpacing: -0.2,
            display: 'flex', alignItems: 'center', gap: 5,
          }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: C.warn, display: 'inline-block' }}/>
            관찰 중
          </div>
        )}
      </div>

      <Section title="환아 정보">
        {editing ? (
          <>
            <div style={{ padding: '14px 18px', display: 'grid', gridTemplateColumns: '1fr 80px', gap: 10, alignItems: 'end', borderBottom: `1px solid ${C.line}` }}>
              <div>
                <div style={{ fontSize: 11.5, color: C.mute, fontWeight: 500, marginBottom: 4 }}>이름</div>
                <input value={draft.childName} onChange={update('childName')} style={{...inputStyle, textAlign: 'left'}}/>
              </div>
              <div>
                <div style={{ fontSize: 11.5, color: C.mute, fontWeight: 500, marginBottom: 4 }}>나이</div>
                <input value={draft.age} onChange={update('age')} style={{...inputStyle, textAlign: 'left'}}/>
              </div>
            </div>
            <Row icon={icons.hospital} label="진료 병원" value={data.hospital} field="hospital"/>
            <Row icon={icons.doctor}   label="주치의"    value={data.doctor}   field="doctor" last/>
          </>
        ) : (
          <>
            <Row icon={icons.child}    label="이름 · 나이"  value={`${data.childName} · ${data.age}세`}/>
            <Row icon={icons.hospital} label="진료 병원"    value={data.hospital}/>
            <Row icon={icons.doctor}   label="주치의"       value={data.doctor} last/>
          </>
        )}
      </Section>

      <Section title="인공호흡기 정보">
        <Row icon={icons.device}   label="기기명"     value={data.device} field="device"/>
        <Row icon={icons.mode}     label="환기 모드"  value={data.mode}   field="mode"/>
        <Row icon={icons.status}   label="현재 상태"  value="정상 작동 중"
          badge={{ label: '연결됨', bg: 'rgba(43,182,115,0.10)', fg: C.ok }}/>
        <Row icon={icons.calendar} label="마지막 설정 변경" value={data.lastChange} field="lastChange" last/>
      </Section>

      <Section title="처방 파라미터">
        <KVRow label="IPAP" field="ipap"/>
        <KVRow label="EPAP" field="epap"/>
        <KVRow label="BPM"  field="bpm"/>
        <KVRow label="Ti"   field="ti"/>
        <KVRow label="FiO₂" field="fio2" last/>
      </Section>

      <Section title="앱 설정">
        <KVRow label="알림 수신"   field="notify"/>
        <KVRow label="응급 연락처" field="emergency"/>
        <KVRow label="동기화 주기" field="sync" last/>
      </Section>

      {/* 로그아웃 */}
      <div style={{ padding: '28px 22px 8px' }}>
        <button onClick={onLogout} disabled={editing} style={{
          width: '100%', padding: '14px 0', borderRadius: 14,
          background: '#fff', border: '1px solid rgba(14,17,22,0.10)',
          cursor: editing ? 'not-allowed' : 'pointer',
          color: C.alert, fontSize: 13.5, fontWeight: 700, letterSpacing: -0.2,
          opacity: editing ? 0.4 : 1,
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M10 4H6a2 2 0 00-2 2v12a2 2 0 002 2h4M16 16l4-4-4-4M20 12H10" stroke={C.alert} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          로그아웃
        </button>
        <div style={{ fontSize: 11, color: C.mute2, textAlign: 'center', marginTop: 12, letterSpacing: -0.1 }}>
          Dr.Answer PRO Companion · v1.0.0
        </div>
      </div>

      {savedFlash && (
        <div style={{
          position: 'absolute', left: '50%', bottom: 110, transform: 'translateX(-50%)',
          background: C.ink, color: '#fff', padding: '10px 18px', borderRadius: 100,
          fontSize: 12.5, fontWeight: 700, letterSpacing: -0.2,
          boxShadow: '0 8px 24px rgba(14,17,22,0.25)', zIndex: 60,
        }}>
          ✓ 저장됐어요
        </div>
      )}
    </div>
  );
}

// ─── Onboarding / Auth flow ─────────────────────────────────────
const AuthWrap = ({ children, dark = false, top }) => (
  <div style={{
    flex: 1, display: 'flex', flexDirection: 'column',
    background: dark ? '#0D0F14' : C.bg, color: dark ? '#fff' : C.ink,
    paddingTop: 64, paddingBottom: 28,
  }}>
    {top}
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '0 22px' }}>
      {children}
    </div>
  </div>
);

const AuthStepHeader = ({ progress, onBack }) => (
  <div style={{ padding: '4px 22px 14px' }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
      {onBack && (
        <button onClick={onBack} style={{
          background: 'none', border: 'none', cursor: 'pointer', padding: 2,
          display: 'inline-flex',
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M15 6l-6 6 6 6" stroke={C.ink} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      )}
      <div style={{ flex: 1, height: 4, background: 'rgba(14,17,22,0.08)', borderRadius: 4, overflow: 'hidden' }}>
        <div style={{
          width: `${progress * 100}%`, height: '100%', background: C.ink,
          borderRadius: 4, transition: 'width 0.35s ease',
        }}/>
      </div>
    </div>
  </div>
);

const AuthTitle = ({ children, sub }) => (
  <div style={{ marginBottom: 24 }}>
    <div style={{ fontSize: 22, fontWeight: 800, color: C.ink, letterSpacing: -0.6, lineHeight: 1.25 }}>
      {children}
    </div>
    {sub && (
      <div style={{ fontSize: 13, color: C.mute, fontWeight: 500, marginTop: 6, letterSpacing: -0.1, lineHeight: 1.5 }}>
        {sub}
      </div>
    )}
  </div>
);

const AuthField = ({ label, children, hint }) => (
  <div style={{ marginBottom: 16 }}>
    <div style={{ fontSize: 11.5, fontWeight: 700, color: C.mute, letterSpacing: 0.8, marginBottom: 8, textTransform: 'uppercase' }}>
      {label}
    </div>
    {children}
    {hint && (
      <div style={{ fontSize: 11.5, color: C.mute, marginTop: 6, letterSpacing: -0.1 }}>{hint}</div>
    )}
  </div>
);

const authInputBox = {
  width: '100%', padding: '14px 16px', fontSize: 15, fontWeight: 600,
  color: C.ink, letterSpacing: -0.3,
  background: '#fff', border: '1px solid rgba(14,17,22,0.10)',
  borderRadius: 14, outline: 'none', fontFamily: 'inherit',
};

const AuthCTA = ({ onClick, disabled, children, variant = 'primary' }) => {
  const styles = {
    primary:   { bg: C.ink,  fg: '#fff' },
    secondary: { bg: 'rgba(14,17,22,0.04)', fg: C.ink, border: '1px solid rgba(14,17,22,0.10)' },
  }[variant];
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width: '100%', padding: '16px 0', borderRadius: 16,
      border: styles.border || 0, cursor: disabled ? 'not-allowed' : 'pointer',
      background: styles.bg, color: styles.fg, opacity: disabled ? 0.35 : 1,
      fontSize: 14.5, fontWeight: 700, letterSpacing: -0.3,
      boxShadow: variant === 'primary' && !disabled ? '0 6px 18px rgba(14,17,22,0.18)' : 'none',
    }}>{children}</button>
  );
};

function Auth({ onComplete }) {
  // welcome, login, phone, verify, patient-code, hospital, guardian, pairing, done
  const [step, setStep] = React.useState('welcome');
  const [mode, setMode] = React.useState('signup');
  const [phone, setPhone] = React.useState('');
  const [otp,   setOtp]   = React.useState('');
  const [patientCode, setPatientCode] = React.useState('');
  const [guardian, setGuardian] = React.useState({ name: '', relation: '어머니', tel: '' });
  const [pair, setPair] = React.useState({ phase: 'searching', pct: 0 });

  // ── WELCOME ───────────────────────────────────────────────────
  if (step === 'welcome') {
    return (
      <div style={{
        flex: 1, display: 'flex', flexDirection: 'column',
        background: '#0D0F14', color: '#fff',
        padding: '90px 28px 32px',
      }}>
        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 28 }}>
          <MeshOrb size={68} status="ok"/>
        </div>
        <div style={{ textAlign: 'center', marginBottom: 'auto' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.55)', letterSpacing: 2, textTransform: 'uppercase', marginBottom: 12 }}>
            Dr.Answer PRO Companion
          </div>
          <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.8, lineHeight: 1.25 }}>
            소아 만성호흡부전 환아<br/>보호자를 위한 AI 주치의
          </div>
          <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.55)', marginTop: 14, lineHeight: 1.55, letterSpacing: -0.1 }}>
            인공호흡기 상태를 실시간 모니터링하고<br/>이상 신호를 의료진과 함께 추적해요.
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 32 }}>
          <button onClick={() => { setMode('signup'); setStep('phone'); }} style={{
            width: '100%', padding: '16px 0', borderRadius: 16, border: 0, cursor: 'pointer',
            background: '#fff', color: C.ink, fontSize: 14.5, fontWeight: 700, letterSpacing: -0.3,
          }}>새로 시작하기</button>
          <button onClick={onComplete} style={{
            width: '100%', padding: '14px 0', background: 'transparent', border: 0, cursor: 'pointer',
            color: 'rgba(255,255,255,0.75)', fontSize: 13, fontWeight: 600, letterSpacing: -0.2,
          }}>이미 계정이 있어요</button>
        </div>
      </div>
    );
  }

  // ── PHONE ─────────────────────────────────────────────────────
  if (step === 'phone') {
    const formatted = phone.replace(/[^0-9]/g, '').slice(0, 11);
    const disp = formatted.replace(/^(\d{3})(\d{0,4})(\d{0,4}).*/, (m,a,b,c) => [a,b,c].filter(Boolean).join('-'));
    const valid = formatted.length >= 10;
    return (
      <AuthWrap top={<AuthStepHeader progress={mode === 'login' ? 0.5 : 0.14} onBack={() => setStep('welcome')}/>}>
        <AuthTitle sub={mode === 'login' ? '로그인을 위해 번호를 입력해 주세요.' : '본인 인증을 위해 사용해요. 개인정보는 암호화 저장됩니다.'}>
          {mode === 'login' ? '로그인' : '휴대폰 번호로\n시작하기'}
        </AuthTitle>
        <AuthField label="휴대폰 번호">
          <input
            value={disp}
            onChange={e => setPhone(e.target.value)}
            placeholder="010-0000-0000"
            inputMode="numeric"
            style={authInputBox}
          />
        </AuthField>
        <div style={{ flex: 1 }}/>
        <AuthCTA disabled={!valid} onClick={() => setStep('verify')}>인증번호 받기</AuthCTA>
      </AuthWrap>
    );
  }

  // ── VERIFY ────────────────────────────────────────────────────
  if (step === 'verify') {
    const valid = otp.length === 6;
    return (
      <AuthWrap top={<AuthStepHeader progress={mode === 'login' ? 0.85 : 0.28} onBack={() => setStep('phone')}/>}>
        <AuthTitle sub={`${phone.replace(/[^0-9]/g,'').replace(/^(\d{3})(\d{4})(\d{4}).*/, '$1-$2-$3')}로 전송한 6자리 코드를 입력해 주세요.`}>
          인증번호를 입력해 주세요
        </AuthTitle>
        <AuthField label="인증번호" hint="문자가 오지 않으면 1분 후 재요청할 수 있어요.">
          <input
            value={otp}
            onChange={e => setOtp(e.target.value.replace(/[^0-9]/g,'').slice(0,6))}
            placeholder="123456"
            inputMode="numeric"
            style={{ ...authInputBox, letterSpacing: 8, textAlign: 'center', fontWeight: 800, fontSize: 22 }}
          />
        </AuthField>
        <div style={{ flex: 1 }}/>
        <AuthCTA disabled={!valid} onClick={() => {
          if (mode === 'login') { onComplete(); }
          else { setStep('patient-code'); }
        }}>{mode === 'login' ? '로그인' : '인증 완료 · 계속'}</AuthCTA>
      </AuthWrap>
    );
  }

  // ── PATIENT CODE ──────────────────────────────────────────────
  if (step === 'patient-code') {
    const cleaned = patientCode.replace(/[^A-Za-z0-9]/g,'').slice(0,8).toUpperCase();
    const valid = cleaned.length >= 6;
    return (
      <AuthWrap top={<AuthStepHeader progress={0.42} onBack={() => setStep('verify')}/>}>
        <AuthTitle sub="병원에서 받으신 환아 등록 코드를 입력하면 처방 정보가 자동으로 불러와져요.">
          환아 코드를 입력해 주세요
        </AuthTitle>
        <AuthField label="환아 코드" hint="외래 진료 시 발급된 카드에서 확인할 수 있어요.">
          <input
            value={cleaned}
            onChange={e => setPatientCode(e.target.value)}
            placeholder="예: MJ5K28"
            style={{ ...authInputBox, letterSpacing: 6, textAlign: 'center', fontWeight: 800, fontSize: 20, textTransform: 'uppercase' }}
          />
        </AuthField>
        <div style={{
          background: 'rgba(75,59,224,0.06)', borderRadius: 14, padding: '12px 14px',
          display: 'flex', gap: 10, alignItems: 'flex-start', marginTop: 4,
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{ marginTop: 1, flexShrink: 0 }}>
            <circle cx="12" cy="12" r="9" stroke={C.accent} strokeWidth="1.6"/>
            <path d="M12 8v5M12 16v.5" stroke={C.accent} strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
          <div style={{ fontSize: 12, color: C.ink2, lineHeight: 1.55, letterSpacing: -0.1 }}>
            코드가 없으신가요? 담당 의료진에게 문의하시면 발급받으실 수 있어요.
          </div>
        </div>
        <div style={{ flex: 1 }}/>
        <AuthCTA disabled={!valid} onClick={() => setStep('hospital')}>병원 정보 불러오기</AuthCTA>
      </AuthWrap>
    );
  }

  // ── HOSPITAL PREFILLED ────────────────────────────────────────
  if (step === 'hospital') {
    const Row = ({ label, value, mono = false }) => (
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '11px 0', borderBottom: `1px solid ${C.line}`,
      }}>
        <span style={{ fontSize: 12.5, color: C.mute, fontWeight: 500, letterSpacing: -0.1 }}>{label}</span>
        <span style={{
          fontSize: 13.5, color: C.ink, fontWeight: 700, letterSpacing: -0.3,
          fontFamily: mono ? 'ui-monospace, SFMono-Regular, monospace' : 'inherit',
        }}>{value}</span>
      </div>
    );
    return (
      <AuthWrap top={<AuthStepHeader progress={0.56} onBack={() => setStep('patient-code')}/>}>
        <AuthTitle sub="병원 시스템에서 자동으로 등록된 정보입니다. 변경이 필요하면 외래에서 의료진에게 요청해 주세요.">
          이 정보가 맞나요?
        </AuthTitle>
        <div style={{
          background: C.card, borderRadius: 18, padding: '14px 18px',
          boxShadow: '0 1px 1.5px rgba(14,17,22,0.04)',
          animation: 'fadeUp 0.45s ease both',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 5,
              padding: '3px 10px', borderRadius: 100,
              background: 'rgba(75,59,224,0.10)', color: C.accent,
              fontSize: 10.5, fontWeight: 700, letterSpacing: 0.4,
            }}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none">
                <path d="M5 13l4 4L19 7" stroke={C.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              HOSPITAL VERIFIED
            </span>
          </div>
          <Row label="환아"          value="김민준 · 5세 (남)"/>
          <Row label="진단명"        value="만성호흡부전 (소아)"/>
          <Row label="진료 병원"     value="신촌세브란스병원"/>
          <Row label="주치의"        value="호흡기내과 이진환 교수"/>
          <Row label="처방 환기기"   value="ResMed Astral 150"/>
          <Row label="환기 모드"     value="AVAPS-AE (BiPAP)"/>
          <Row label="IPAP / EPAP"   value="18 / 6 cmH₂O" mono/>
          <Row label="BPM · Ti · FiO₂" value="16 · 0.9s · 21%" mono/>
        </div>
        <div style={{ flex: 1, minHeight: 12 }}/>
        <AuthCTA onClick={() => setStep('guardian')}>네, 맞아요 · 계속</AuthCTA>
        <div style={{ height: 8 }}/>
        <AuthCTA variant="secondary" onClick={() => setStep('patient-code')}>정보가 달라요</AuthCTA>
      </AuthWrap>
    );
  }

  // ── GUARDIAN ──────────────────────────────────────────────────
  if (step === 'guardian') {
    const valid = guardian.name.trim().length >= 1 && guardian.tel.replace(/[^0-9]/g,'').length >= 10;
    const relations = ['어머니','아버지','조부모','기타'];
    return (
      <AuthWrap top={<AuthStepHeader progress={0.72} onBack={() => setStep('hospital')}/>}>
        <AuthTitle sub="민준이의 보호자 정보를 알려주세요. 응급 시 의료진이 연락할 수 있어요.">
          보호자 정보를{'\n'}입력해 주세요
        </AuthTitle>
        <AuthField label="이름">
          <input
            value={guardian.name}
            onChange={e => setGuardian({ ...guardian, name: e.target.value })}
            placeholder="예: 김지영"
            style={authInputBox}
          />
        </AuthField>
        <AuthField label="관계">
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {relations.map(r => {
              const active = guardian.relation === r;
              return (
                <button key={r} onClick={() => setGuardian({ ...guardian, relation: r })} style={{
                  padding: '10px 16px', borderRadius: 100, cursor: 'pointer',
                  background: active ? C.ink : '#fff',
                  border: `1px solid ${active ? C.ink : 'rgba(14,17,22,0.12)'}`,
                  color: active ? '#fff' : C.ink,
                  fontSize: 13, fontWeight: 600, letterSpacing: -0.2,
                }}>{r}</button>
              );
            })}
          </div>
        </AuthField>
        <AuthField label="응급 연락처" hint="기본 인증 번호와 같다면 비워두셔도 돼요.">
          <input
            value={guardian.tel}
            onChange={e => setGuardian({ ...guardian, tel: e.target.value })}
            placeholder="010-0000-0000"
            inputMode="numeric"
            style={authInputBox}
          />
        </AuthField>
        <div style={{ flex: 1 }}/>
        <AuthCTA disabled={!valid} onClick={() => { setPair({ phase: 'searching', pct: 0 }); setStep('pairing'); }}>
          다음 · 인공호흡기 연결
        </AuthCTA>
      </AuthWrap>
    );
  }

  // ── PAIRING ───────────────────────────────────────────────────
  if (step === 'pairing') {
    return <Pairing pair={pair} setPair={setPair} onDone={() => setStep('done')} onBack={() => setStep('guardian')}/>;
  }

  // ── DONE ──────────────────────────────────────────────────────
  if (step === 'done') {
    return (
      <div style={{
        flex: 1, display: 'flex', flexDirection: 'column',
        background: C.bg, paddingTop: 90, paddingBottom: 28, padding: '90px 28px 28px',
      }}>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
          <div style={{ marginBottom: 26, animation: 'fadeUp 0.5s ease both' }}>
            <MeshOrb size={56} status="ok"/>
          </div>
          <div style={{ fontSize: 22, fontWeight: 800, color: C.ink, letterSpacing: -0.6, lineHeight: 1.3, animation: 'fadeUp 0.5s 0.1s both' }}>
            준비가 끝났어요 🎉
          </div>
          <div style={{ fontSize: 13.5, color: C.mute, marginTop: 10, lineHeight: 1.6, letterSpacing: -0.1, animation: 'fadeUp 0.5s 0.18s both' }}>
            {guardian.name || '민준이'} {guardian.relation || '어머니'}, 환영합니다.<br/>
            지금부터 민준이의 인공호흡기 상태를<br/>실시간으로 함께 살펴드릴게요.
          </div>
        </div>
        <AuthCTA onClick={onComplete}>홈으로 이동</AuthCTA>
      </div>
    );
  }

  return null;
}

function Pairing({ pair, setPair, onDone, onBack }) {
  React.useEffect(() => {
    let phaseTimer, pctTimer;
    if (pair.phase === 'searching') {
      phaseTimer = setTimeout(() => setPair({ phase: 'found', pct: 0 }), 1800);
    } else if (pair.phase === 'found') {
      phaseTimer = setTimeout(() => setPair({ phase: 'connecting', pct: 0 }), 900);
    } else if (pair.phase === 'connecting') {
      pctTimer = setInterval(() => {
        setPair(p => {
          if (p.phase !== 'connecting') return p;
          const np = Math.min(100, p.pct + 7);
          if (np >= 100) {
            clearInterval(pctTimer);
            setTimeout(() => setPair({ phase: 'synced', pct: 100 }), 350);
          }
          return { ...p, pct: np };
        });
      }, 120);
    }
    return () => { clearTimeout(phaseTimer); clearInterval(pctTimer); };
  }, [pair.phase]);

  const phaseText = {
    searching:  { title: '인공호흡기를 찾고 있어요', sub: 'ResMed Astral 150을 켜고 휴대폰 가까이에 두세요.' },
    found:      { title: '기기를 발견했어요',         sub: '연결을 시작할게요.' },
    connecting: { title: '연결 중',                  sub: '안전한 채널로 동기화 중이에요.' },
    synced:     { title: '연결이 완료됐어요',         sub: '첫 동기화가 끝났어요. 곧 데이터가 표시돼요.' },
  }[pair.phase];

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      background: C.bg, paddingTop: 64, paddingBottom: 28,
    }}>
      <AuthStepHeader progress={pair.phase === 'synced' ? 1 : 0.86} onBack={pair.phase === 'searching' ? onBack : undefined}/>
      <div style={{ padding: '0 22px' }}>
        <AuthTitle sub={phaseText.sub}>{phaseText.title}</AuthTitle>
      </div>

      {/* Radar */}
      <div style={{
        flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
        position: 'relative', minHeight: 220,
      }}>
        {pair.phase === 'searching' && (
          <>
            {[0, 0.6, 1.2].map(d => (
              <div key={d} style={{
                position: 'absolute', width: 120, height: 120, borderRadius: '50%',
                border: `2px solid ${C.accent}`,
                animation: `radarPulse 1.8s ease-out ${d}s infinite`,
              }}/>
            ))}
            <div style={{
              width: 80, height: 80, borderRadius: '50%',
              background: 'rgba(75,59,224,0.10)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                <path d="M2 8c4-4 16-4 20 0M5 11c3-3 11-3 14 0M8 14c2-2 6-2 8 0" stroke={C.accent} strokeWidth="1.8" strokeLinecap="round"/>
                <circle cx="12" cy="18" r="1.5" fill={C.accent}/>
              </svg>
            </div>
          </>
        )}
        {pair.phase !== 'searching' && (
          <div style={{
            background: C.card, borderRadius: 20, padding: '18px 22px',
            boxShadow: '0 6px 24px rgba(14,17,22,0.10)', width: 'calc(100% - 44px)',
            animation: 'fadeUp 0.4s ease both',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <div style={{
                width: 48, height: 48, borderRadius: 12,
                background: pair.phase === 'synced' ? 'rgba(43,182,115,0.12)' : 'rgba(75,59,224,0.10)',
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
              }}>
                {pair.phase === 'synced' ? (
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M5 13l4 4L19 7" stroke={C.ok} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                ) : (
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="6" width="18" height="14" rx="2" stroke={C.accent} strokeWidth="1.8"/>
                    <path d="M7 4h10M6 11l2 3 2-4 2 4 2-3" stroke={C.accent} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.ink, letterSpacing: -0.3 }}>ResMed Astral 150</div>
                <div style={{ fontSize: 11.5, color: C.mute, marginTop: 2, letterSpacing: -0.1 }}>
                  S/N: AS-{Math.floor(Math.random()*900+100)}KR · BLE
                </div>
              </div>
            </div>
            {pair.phase === 'connecting' && (
              <div style={{ marginTop: 16 }}>
                <div style={{ height: 6, borderRadius: 6, background: 'rgba(14,17,22,0.06)', overflow: 'hidden' }}>
                  <div style={{
                    width: `${pair.pct}%`, height: '100%', background: C.accent,
                    borderRadius: 6, transition: 'width 0.18s ease',
                  }}/>
                </div>
                <div style={{ fontSize: 11, color: C.mute, marginTop: 6, fontWeight: 600, letterSpacing: -0.1 }}>
                  {pair.pct}% · 보안 핸드셰이크 중
                </div>
              </div>
            )}
            {pair.phase === 'synced' && (
              <div style={{
                marginTop: 12, padding: '10px 12px',
                background: 'rgba(43,182,115,0.08)', borderRadius: 12,
                display: 'flex', alignItems: 'center', gap: 8,
              }}>
                <span style={{ width: 7, height: 7, borderRadius: '50%', background: C.ok, animation: 'pulseDot 1.4s ease-in-out infinite' }}/>
                <span style={{ fontSize: 11.5, color: C.ok, fontWeight: 700, letterSpacing: -0.1 }}>
                  동기화 활성 · 10분 주기
                </span>
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{ padding: '0 22px' }}>
        <AuthCTA disabled={pair.phase !== 'synced'} onClick={onDone}>
          {pair.phase === 'synced' ? '완료' : '연결 중...'}
        </AuthCTA>
      </div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = React.useState(false);
  const [screen, setScreen] = React.useState('home');

  if (!authed) {
    return (
      <IOSDevice>
        <Auth onComplete={() => setAuthed(true)}/>
      </IOSDevice>
    );
  }

  return (
    <IOSDevice>
      {screen === 'home' && (
        <Home
          onWorry={() => setScreen('record')}
        />
      )}
      {screen === 'record' && <RecordTab onSurveyOpen={() => setScreen('survey')}/>}
      {screen === 'survey' && <Survey onBack={() => setScreen('record')}/>}
      {screen === 'report' && <Report/>}
      {screen === 'user' && <MyInfo onLogout={() => {
        setAuthed(false);
        setScreen('home');
      }}/>}
      <TabBar active={screen === 'home' ? 'home' : (screen === 'survey' ? 'record' : screen)} onChange={(s) => {
        if (s === 'record') setScreen('record');
        else setScreen(s);
      }}/>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
