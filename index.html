<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>닥터앤서 PRO</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body {
    font-family: system-ui, sans-serif;
    background: #f3f6f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
  }
  #error {
    display: none;
    text-align: center;
    padding: 40px;
    color: #555;
  }
  #error h2 { margin-bottom: 8px; color: #333; }
</style>
</head>
<body>
<iframe id="frame" sandbox="allow-scripts allow-same-origin"></iframe>
<div id="error">
  <h2>콘텐츠를 불러올 수 없습니다</h2>
  <p>URL에 유효한 #hash 값이 없습니다.</p>
</div>

<script>
(function () {
  var hash = window.location.hash.slice(1);
  if (!hash) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('frame').style.display = 'none';
    return;
  }
  document.getElementById('frame').src = hash + '.html';
})();
</script>
</body>
</html>
