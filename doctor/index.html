<script type="text/babel">
const { useState } = React;

/* ───────── 색상 토큰 (reference mock 매칭) ───────── */
const C = {
  bg:        '#F0F3F2',      // 패널 사이/뒤 쿨그레이
  chrome:    '#2E2F33',      // 헤더·사이드바 차콜
  chromeAct: '#43444A',      // 사이드바 active 강조
  chromeMute:'rgba(255,255,255,0.7)',
  surface:   '#FFFFFF',      // 카드·패널 흰색
  border:    '#E2E6E5',
  borderSoft:'#ECEFEE',
  text:      '#1A1D26',
  textSub:   '#6E7280',
  textMute:  '#A0A6B1',
  primary:   '#1E1F4B',      // 진료 저장 — 거의 검정에 가까운 짙은 네이비
  primarySoft:'#EDEFFB',
  accent:    '#4F5BE0',      // 선택/하이라이트 인디고
  accentSoft:'#EEF1FF',
  green:     '#1FB87A',
  greenSoft: '#E7F6EE',
  blue:      '#4F5BE0',
  blueSoft:  '#E6EAFE',
  gray:      '#6E7280',
  graySoft:  '#EEF0F3',
  dark:      '#22253A',      // 진료보류 배지 색
};

/* ───────── 아이콘 (사이드바 등) ───────── */
const Icon = ({ name, size = 22, color = 'currentColor' }) => {
  const props = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'mic': return (<svg {...props}><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0014 0"/><path d="M12 18v3"/></svg>);
    case 'cal': return (<svg {...props}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>);
    case 'user': return (<svg {...props}><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>);
    case 'list': return (<svg {...props}><path d="M4 6h16M4 12h16M4 18h16"/></svg>);
    case 'doc':  return (<svg {...props}><path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 3v5h5"/></svg>);
    case 'colon':  return (
      <svg {...props} strokeWidth="1.6">
        {/* 외곽선 — Π 프레임 따라 동글동글한 haustra outline, 내부는 비어있음(fill 없음) */}
        {/* 상부(횡행결장) 외측 불룩 - 5 bumps 위로 */}
        <path d="M3.5 8
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0"/>
        {/* 우측(상행결장) 외측 불룩 - 3 bumps 오른쪽으로 */}
        <path d="M21.5 8
                 a1.75 1.75 0 0 1 0 3
                 a1.75 1.75 0 0 1 0 3
                 a1.75 1.75 0 0 1 0 3"/>
        {/* 맹장 곡선 + 충수 튜브 */}
        <path d="M21.5 17c0 2-1 3-2.5 3 l 0 3"/>
        {/* S상결장 - 우→좌 물결 */}
        <path d="M19 20
                 c-1.3 0-1.7-1.3-3-1.3
                 c-1.3 0-1.7 1.3-3 1.3
                 c-1.3 0-1.7-1.3-3-1.3
                 c-1.3 0-1.7 1.3-3 1.3"/>
        {/* 직장 튜브 */}
        <path d="M7 20 v 3"/>
        {/* 좌측(하행결장) 외측 불룩 - 3 bumps 왼쪽으로 */}
        <path d="M2.5 17
                 a1.75 1.75 0 0 1 0 -3
                 a1.75 1.75 0 0 1 0 -3
                 a1.75 1.75 0 0 1 0 -3"/>
      </svg>
    );
    case 'stomach': return (
      <svg {...props} strokeWidth="1.7">
        {/* 식도 — 좌측에 위로 열린 긴 튜브 */}
        <path d="M9 2 v 6"/>
        <path d="M11.5 2 v 5"/>
        {/* 위 본체 outline (좌우 반전: fundus 우측, pylorus 좌측) */}
        <path d="M11.5 7
                 c1 .8 2 1.2 3 1.2
                 c3 0 5 1.8 5.5 4.5
                 c .5 3 -1 6 -4 7
                 c -3 1 -7 .5 -9 -1.5
                 c -2 -2 -2.5 -5 -1 -7
                 c 1 -1.3 2.5 -1.7 4 -1.7"/>
        {/* 분문 곡선 (식도→위 입구) */}
        <path d="M9 8 c .5 1 1.7 1.5 2.5 .5"/>
        {/* 십이지장 — 좌측 아래로 긴 튜브 */}
        <path d="M5.5 16
                 c -1 1.5 -.5 3.5 1 4
                 c 1 .3 1.7 -.5 1 -1.5"/>
      </svg>
    );
    case 'lung':   return (
      <svg {...props} strokeWidth="1.7">
        {/* 기관(trachea) — 위로 열린 튜브 */}
        <path d="M11 2 v 6"/>
        <path d="M13 2 v 6"/>
        {/* 기관 분기부 — 양쪽으로 더 벌어짐 (gap 확대) */}
        <path d="M11 8 L 8.5 10.5"/>
        <path d="M13 8 L 15.5 10.5"/>
        {/* 좌측 폐 — 내측 edge x=10 (이전 11.5 → gap 확대) */}
        <path d="M8.5 10.5
                 c-3 .8 -5.5 3.5 -6 7
                 c-.4 2.5 .8 4.5 3 4.5
                 h4.5
                 c.6 0 1 -.5 1 -1.2
                 V 11.5
                 c0 -.6 -.4 -1 -1 -1
                 z"/>
        {/* 우측 폐 — 내측 edge x=14 */}
        <path d="M15.5 10.5
                 c3 .8 5.5 3.5 6 7
                 c.4 2.5 -.8 4.5 -3 4.5
                 h-4.5
                 c-.6 0 -1 -.5 -1 -1.2
                 V 11.5
                 c0 -.6 .4 -1 1 -1
                 z"/>
      </svg>
    );
    case 'gear': return (<svg {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3h0a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8v0a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>);
    case 'phone':return (<svg {...props}><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>);
    case 'link': return (<svg {...props}><path d="M10 14a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1"/><path d="M14 10a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>);
    case 'cal2': return (<svg {...props}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>);
    case 'search':return (<svg {...props}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>);
    case 'chevL':return (<svg {...props}><path d="M15 6l-6 6 6 6"/></svg>);
    case 'chevR':return (<svg {...props}><path d="M9 6l6 6-6 6"/></svg>);
    case 'chevD':return (<svg {...props}><path d="M6 9l6 6 6-6"/></svg>);
    case 'copy': return (<svg {...props}><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V6a2 2 0 012-2h10"/></svg>);
    case 'star': return (<svg {...props}><path d="M12 3l2.7 5.5L20.5 9.4l-4.3 4.2 1 6L12 16.8 6.8 19.6l1-6-4.3-4.2 5.8-.9z"/></svg>);
    case 'starF':return (<svg width="18" height="18" viewBox="0 0 24 24" fill={C.accent}><path d="M12 3l2.7 5.5L20.5 9.4l-4.3 4.2 1 6L12 16.8 6.8 19.6l1-6-4.3-4.2 5.8-.9z"/></svg>);
    case 'check':return (<svg {...props} strokeWidth="3"><path d="M5 12l5 5 9-10"/></svg>);
    case 'refresh':return (<svg {...props}><path d="M21 12a9 9 0 11-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>);
    case 'x':    return (<svg {...props}><path d="M6 6l12 12M18 6L6 18"/></svg>);
    case 'edit': return (<svg {...props}><path d="M4 20h4l10-10-4-4L4 16v4z"/></svg>);
    case 'note': return (<svg {...props}><path d="M4 4h12l4 4v12H4z"/><path d="M16 4v4h4"/></svg>);
    case 'send': return (<svg {...props}><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>);
    case 'inbox':return (<svg {...props}><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 6h13a1 1 0 0 1 .9.6L22 12v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6L4.6 6.6A1 1 0 0 1 5.5 6z"/></svg>);
    case 'expand': return (
      <svg {...props}>
        {/* 우상단 대각선 화살표 (밖으로) */}
        <path d="M14 10L20 4"/>
        <path d="M15 4h5v5"/>
        {/* 좌하단 대각선 화살표 (밖으로) */}
        <path d="M10 14L4 20"/>
        <path d="M9 20H4v-5"/>
      </svg>
    );
    case 'trendUp': return (
      <svg {...props}><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>
    );
    case 'alert': return (
      <svg {...props}>
        <path d="M10.3 3.86l-8.16 14a2 2 0 0 0 1.72 3h16.3a2 2 0 0 0 1.72-3l-8.16-14a2 2 0 0 0-3.42 0z"/>
        <path d="M12 9v4"/><path d="M12 17.5v.01"/>
      </svg>
    );
    case 'info': return (
      <svg {...props}><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><path d="M12 8v.01"/></svg>
    );
    case 'moon': return (
      <svg {...props}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    );
    case 'collapse': return (
      <svg {...props}>
        {/* 우상단 → 안쪽으로 향하는 화살표 */}
        <path d="M20 4L14 10"/>
        <path d="M14 5v5h5"/>
        {/* 좌하단 → 안쪽으로 향하는 화살표 */}
        <path d="M4 20L10 14"/>
        <path d="M10 19v-5H5"/>
      </svg>
    );
    default: return null;
  }
};

/* ───────── 로고 ───────── */
const Logo = () => (
  <div style={{
    width: 72, height: 60,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    color: '#fff', fontWeight: 800, letterSpacing: 0.2,
  }}>
    <div style={{ fontSize: 14, fontWeight: 800 }}>닥터앤서</div>
  </div>
);

/* ───────── 상단 헤더 ───────── */
function Header() {
  const tab = (label) => (
    <button style={{
      padding: '0 4px', height: 60, fontSize: 15, fontWeight: 700,
      color: '#fff', position: 'relative',
    }}>
      {label}
      <div style={{ position:'absolute', left:0, right:0, bottom:-1, height:2, background: '#fff', borderRadius: 2 }}/>
    </button>
  );
  const navItem = (iconName, label) => (
    <button style={{ display:'flex', alignItems:'center', gap:6, padding:'0 12px', height:60, fontSize:13.5, color:'#fff', fontWeight:500 }}>
      <Icon name={iconName} size={17} color="#fff"/> {label}
    </button>
  );
  return (
    <header style={{
      height: 60, background: C.chrome,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      paddingRight: 16, flexShrink: 0,
    }}>
      <div style={{ display:'flex', alignItems:'center', gap: 24 }}>
        <Logo/>
        <div style={{ display:'flex', alignItems:'center', gap: 24, marginLeft: 4 }}>
          {tab('진료')}
          <div style={{ width:1, height:18, background:'rgba(255,255,255,0.3)' }}/>
          <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.85)', fontWeight: 500 }}>대장항문외과 이예나 교수님</span>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'center' }}>
        {navItem('search','환자검색')}
      </div>
    </header>
  );
}

/* ───────── 좌측 사이드바 ───────── */
function Sidebar() {
  const items = [
    { icon:'colon',   label:'대장암',   active: true },
    { icon:'stomach', label:'위암'   },
    { icon:'lung',    label:'호흡부전' },
  ];
  return (
    <aside style={{
      width: 84, background: C.chrome,
      display:'flex', flexDirection:'column', alignItems:'center',
      padding: '14px 0', flexShrink: 0,
    }}>
      {items.map((it, i) => (
        <button key={i} style={{
          width: 68, padding: '12px 0', marginBottom: 6,
          display:'flex', flexDirection:'column', alignItems:'center', gap:6,
          color: it.active ? '#fff' : 'rgba(255,255,255,0.7)',
          fontSize: 13, fontWeight: it.active ? 700 : 500,
          borderRadius: 10, background: it.active ? C.chromeAct : 'transparent',
        }}>
          <Icon name={it.icon} size={24}/>
          <span>{it.label}</span>
        </button>
      ))}
      <div style={{ flex: 1 }}/>
      <button style={{
        width: 68, padding: '12px 0',
        display:'flex', flexDirection:'column', alignItems:'center', gap:6,
        color: 'rgba(255,255,255,0.7)', fontSize: 13, fontWeight: 500,
      }}>
        <Icon name="gear" size={22}/>
        <span>설정</span>
      </button>
    </aside>
  );
}

/* ───────── 환자 카드 & 환자 목록 ───────── */
const STATUS_STYLES = {
  '진료중':       { bg:'#4F5BE0', fg:'#fff' },
  '문진중':       { bg:'#4F5BE0', fg:'#fff' },
  '문진완료':     { bg:'#E6EAFE', fg:'#3742C5' },
  '문진생략':     { bg:'#EEF0F3', fg:'#6E7280' },
  '도착':         { bg:'#E7F6EE', fg:'#16A769' },
  '분석중':       { bg:'#E7F6EE', fg:'#16A769' },
  '대기':         { bg:'#EEF0F3', fg:'#6E7280' },
  '진료보류':     { bg:'#22253A', fg:'#fff' },
  '템플릿 발송 완료': { bg:'#EEF0F3', fg:'#6E7280' },
};
function StatusBadge({ label }) {
  const s = STATUS_STYLES[label] || { bg: C.graySoft, fg: C.gray };
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', height: 22, padding:'0 8px',
      borderRadius: 4, background: s.bg, color: s.fg,
      fontSize: 11, fontWeight: 600,
    }}>{label}</span>
  );
}
function PatientCard({ p, selected, onClick }) {
  return (
    <button onClick={onClick} style={{
      width:'100%', textAlign:'left',
      background: C.surface, border: `1.5px solid ${selected ? C.accent : C.border}`,
      borderRadius: 10, padding: '12px 14px', marginBottom: 8,
      boxShadow: selected ? '0 0 0 3px rgba(84,104,255,0.08)' : 'none',
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>
          {p.name} <span style={{ fontSize:12, color: C.textSub, fontWeight: 500, marginLeft:4 }}>
            {p.id} · {p.gender}/{p.age}세
          </span>
        </div>
      </div>
      <div style={{ fontSize: 12, color: C.textSub, marginTop: 4 }}>오전 {p.time}</div>
      <div style={{ display:'flex', gap: 5, marginTop: 8 }}>
        {p.tags.map((t, i) => <StatusBadge key={i} label={t}/>)}
      </div>
    </button>
  );
}

function HomeReportCard({ patient, collapsed, active, onToggle }) {
  const [status, setStatus] = useState('none');
  const [code, setCode] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [section, setSection] = useState('ai');

  const homeReport = patient && patient.homeReport;
  const hasData = !!homeReport;

  const genCode = () => 'MX' + Math.floor(1000 + Math.random() * 9000);
  const onClickSend = () => {
    if (status === 'sent') return;
    setCode(genCode());
    setShowModal(true);
  };
  const onConfirmSend = () => { setStatus('sent'); setShowModal(false); };
  const sent = status === 'sent';

  const toggleBtn = (
    <button onClick={(e) => { e.stopPropagation(); onToggle(); }}
      style={{ color: C.textSub, padding: 4, display:'flex' }}>
      <Icon name={active ? 'collapse' : 'expand'} size={13}/>
    </button>
  );

  if (collapsed) {
    return (
      <>
        <div onClick={onToggle} style={{
          background: C.surface, borderRadius: 12, border: `1px solid ${C.border}`,
          padding: '12px 18px', flexShrink: 0, cursor: 'pointer',
          display:'flex', alignItems:'center', justifyContent:'space-between',
        }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>환자 재택 관리 경과 보고</div>
          <button onClick={(e) => { e.stopPropagation(); onToggle(); }}
            style={{ color: C.textSub, padding: 4, display:'flex' }}>
            <Icon name="expand" size={13}/>
          </button>
        </div>
        {showModal && (
          <SendCodeModal code={code} onClose={() => setShowModal(false)} onConfirm={onConfirmSend}/>
        )}
      </>
    );
  }

  const sectionContent = (() => {
    if (!hasData) return null;
    if (section === 'ai')       return <ReportAi       items={homeReport.ai}/>;
    if (section === 'symptoms') return <ReportSymptoms items={homeReport.symptoms}/>;
    if (section === 'pro')      return <ReportPro      items={homeReport.pro}/>;
    if (section === 'weight')   return <ReportWeight   items={homeReport.weight}/>;
    if (section === 'diet')     return <ReportDiet     items={homeReport.diet}/>;
    if (section === 'exercise') return <ReportExercise items={homeReport.exercise}/>;
    return null;
  })();

  return (
    <div style={{ flex: 1, minHeight: 0, display:'flex', flexDirection:'column' }}>
      <div style={{
        flex: 1, minHeight: 0,
        background: C.surface, borderRadius: 12,
        border: `1px solid ${C.border}`,
        display:'flex', flexDirection:'column', overflow:'hidden',
      }}>
        {/* 타이틀 */}
        <div style={{
          padding: '14px 18px',
          display:'flex', alignItems:'center', justifyContent:'space-between',
          borderBottom: hasData ? `1px solid ${C.borderSoft}` : 'none',
        }}>
          <div style={{ fontSize: 15.5, fontWeight: 700, color: C.text }}>
            환자 재택 관리 경과 보고
          </div>
          {toggleBtn}
        </div>

        {hasData ? (
          <div style={{ flex: 1, minHeight: 0, display:'flex' }}>
            {/* 좌측 섹션 사이드바 */}
            <div className="scroll" style={{
              width: 140, flexShrink: 0, overflowY:'auto',
              borderRight: `1px solid ${C.borderSoft}`, padding: '6px 0',
            }}>
              {HOME_REPORT_SECTIONS.map(s => {
                const a = section === s.k;
                return (
                  <button key={s.k} onClick={() => setSection(s.k)} style={{
                    width:'100%', textAlign:'left',
                    padding: '10px 14px', fontSize: 12.5,
                    color: a ? C.text : C.textSub,
                    fontWeight: a ? 700 : 500,
                    background: a ? C.bg : 'transparent',
                    borderLeft: a ? `3px solid ${C.text}` : '3px solid transparent',
                  }}>{s.l}</button>
                );
              })}
            </div>
            {/* 우측 콘텐츠 */}
            <div className="scroll" style={{
              flex: 1, minWidth: 0, overflowY:'auto',
              padding: '14px 18px 18px',
            }}>
              {section !== 'ai' && (
                <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 10 }}>
                  {HOME_REPORT_SECTIONS.find(s => s.k === section).l}

              {sectionContent}

          </div>
        ) : (
          /* 빈 상태 — 환자 코드 전송 */
          <div style={{
            flex: 1, display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center', gap: 14,
            padding: '16px',
          }}>
            <div style={{
              width: 56, height: 56, borderRadius: 28,
              background: C.bg,
              display:'flex', alignItems:'center', justifyContent:'center',
              color: C.textMute,

              <Icon name="inbox" size={26}/>

/* ───────── 재발률 예측 스코어 카드 (꺾은선 그래프) ───────── */
function RecurrenceChart({ points }) {
  const W = 560, H = 130;
  const PAD = { top: 12, right: 24, bottom: 24, left: 36 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;
  const yMax = 100;

  const xToPx = (i, n) => n <= 1
    ? PAD.left + innerW / 2
    : PAD.left + (i / (n - 1)) * innerW;
  const yToPx = (v) => PAD.top + innerH * (1 - v / yMax);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'auto', display:'block' }}>
      {/* y-grid */}
      {[0, 25, 50, 75, 100].map(v => (
        <g key={v}>
          <line x1={PAD.left} x2={W - PAD.right} y1={yToPx(v)} y2={yToPx(v)}
                stroke={C.borderSoft} strokeWidth="1"/>
          <text x={PAD.left - 8} y={yToPx(v) + 4} textAnchor="end"
                fontSize="11" fill={C.textSub} fontFamily="Pretendard">{v}</text>
        </g>
      ))}
      {/* baseline */}
      <line x1={PAD.left} x2={W - PAD.right} y1={yToPx(0)} y2={yToPx(0)}
            stroke={C.border} strokeWidth="1"/>
      {/* line */}
      {points.length > 1 && (
        <polyline
          fill="none" stroke={C.accent} strokeWidth="2.5"
          strokeLinejoin="round" strokeLinecap="round"
          points={points.map((p, i) => `${xToPx(i, points.length)},${yToPx(p.score)}`).join(' ')}
        />
      )}
      {/* dots + labels + x-axis ticks */}
      {points.map((p, i) => {
        const x = xToPx(i, points.length);
        const y = yToPx(p.score);
        return (
          <g key={i}>
            <circle cx={x} cy={y} r="4" fill="#fff" stroke={C.accent} strokeWidth="2"/>
            <text x={x} y={y - 11} textAnchor="middle" fontSize="11.5" fontWeight="700"
                  fill={C.text} fontFamily="Pretendard">{p.score}</text>
            <text x={x} y={H - PAD.bottom + 18} textAnchor="middle" fontSize="11"
                  fill={C.textSub} fontFamily="Pretendard">{p.date}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* "**critical**" 마커를 굵게 강조해서 렌더링 (블랙 + 볼드) */
function renderRich(text) {
  return text.split(/(\*\*[^*]+\*\*)/g).map((p, i) =>
    p.startsWith('**') && p.endsWith('**')
      ? <strong key={i} style={{ fontWeight: 800, color: C.text }}>{p.slice(2, -2)}</strong>
      : <React.Fragment key={i}>{p}</React.Fragment>
  );
}

                onChange={(v) => setChemo({ ...chemo, cycleTotal: v.replace(/\D/g, '') })}/>
              <span style={{ fontSize: 13, color: C.textSub }}>주기</span>
            </div>
          </Field>
          <Field label="이번 주기 시작일">
            <TextInput value={chemo.lastStartDate} placeholder="YYYY.MM.DD"
              onChange={(v) => setChemo({ ...chemo, lastStartDate: v })} width={180}/>
          </Field>
          <Field label="치료 유형">
            <Select value={chemo.adjuvant ? '보조 화학요법 (Adjuvant)' : '완화 화학요법 (Palliative)'}
              options={['보조 화학요법 (Adjuvant)', '완화 화학요법 (Palliative)', '선행 화학요법 (Neoadjuvant)']}
              onChange={(v) => setChemo({ ...chemo, adjuvant: v.includes('보조') })}/>
          </Field>
          <Field label="비고">
            <TextInput value={chemo.note || ''} placeholder="메모"
              onChange={(v) => setChemo({ ...chemo, note: v })}/>
          </Field>
        </div>
      );
    }
    if (section === 'surgery') {
      return (
        <KVGrid cols={1} items={[
          ['수술일',    emr.surgery.date],
          ['수술 방법', emr.surgery.method],
          ['집도의',    emr.surgery.surgeon],
          ['병기',      emr.surgery.stage],
        ]}/>
      );
    }
    return null;
  })();

  const sectionLabel = EMR_SECTIONS.find(s => s.k === section).l;

  return (
    <div style={{ flex: 1, display:'flex', minHeight: 0, borderTop: `1px solid ${C.borderSoft}` }}>
      {/* 좌측 섹션 사이드바 */}
      <div className="scroll" style={{
        width: 168, overflowY:'auto',
        borderRight: `1px solid ${C.borderSoft}`, padding: '6px 0',
      }}>
        {EMR_SECTIONS.map(s => {
          const active = section === s.k;
          return (
            <button key={s.k} onClick={() => setSection(s.k)} style={{
              width:'100%', textAlign:'left',
              padding: '10px 16px', fontSize: 13,
              color: active ? C.text : C.textSub,
              fontWeight: active ? 700 : 500,
              background: active ? C.bg : 'transparent',
              borderLeft: active ? `3px solid ${C.text}` : '3px solid transparent',
            }}>{s.l}</button>
          );
        })}
      </div>
      {/* 우측 콘텐츠 */}
      <div className="scroll" style={{ flex: 1, minWidth: 0, overflowY:'auto', padding: '16px 20px 20px' }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>
          {sectionLabel}
        </div>
        {content}
      </div>
    </div>
  );
}

/* ─── 재택 관리 플랜 helpers ─── */
function NumberInput({ value, onChange, width = 64 }) {
  return (
    <input type="text" inputMode="decimal" value={value}
      onChange={(e) => onChange(e.target.value.replace(/[^\d.]/g, ''))}
      style={{
        width, height: 32, padding: '0 8px',
        borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface,
        fontSize: 13, color: C.text, outline: 'none', textAlign:'center',
        fontFamily: 'inherit', boxSizing:'border-box',
      }}/>
  );
}
function CheckBox({ checked, onChange, label }) {
  return (
    <label onClick={() => onChange(!checked)} style={{
      display:'inline-flex', alignItems:'center', gap: 6, cursor:'pointer',
      fontSize: 13, color: C.text, padding: '4px 0',
    }}>
      <span style={{
        width: 16, height: 16, borderRadius: 4,
        background: checked ? C.accent : C.surface,
        border: `1.5px solid ${checked ? C.accent : '#C7CCD6'}`,
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        flexShrink: 0,
      }}>
        {checked && <Icon name="check" size={10} color="#fff"/>}
      </span>
      {label}
    </label>
  );
}
function Segment({ options, value, onChange }) {
  return (
    <div style={{
      display:'inline-flex', background: '#FAFBFC',
      border: `1px solid ${C.border}`, borderRadius: 8, padding: 2,
    }}>
      {options.map(opt => {
        const active = opt === value;
        return (
          <button key={opt} onClick={() => onChange(opt)} style={{
            padding: '6px 12px', borderRadius: 6,
            background: active ? C.surface : 'transparent',
            color: active ? C.text : C.textSub,
            fontSize: 12.5, fontWeight: active ? 700 : 500,
            border: active ? `1px solid ${C.border}` : '1px solid transparent',
            boxShadow: active ? '0 1px 2px rgba(0,0,0,0.04)' : 'none',
          }}>{opt}</button>
        );
      })}
    </div>
  );
}
function Textarea({ value, onChange, placeholder }) {
  return (
    <textarea value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
      style={{
        width:'100%', minHeight: 60, padding: '10px 12px',
        borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface,
        fontSize: 13, color: C.text, outline: 'none',
        fontFamily: 'inherit', resize: 'vertical', boxSizing:'border-box',
      }}/>
  );
}
function SectionTitle({ children, num }) {
  return (
    <div style={{
      display:'flex', alignItems:'center', gap: 10,
      marginBottom: 14, paddingBottom: 10,
      borderBottom: `1px solid ${C.border}`,
    }}>
      {num != null && (
        <span style={{
          display:'inline-flex', alignItems:'center', justifyContent:'center',
          width: 22, height: 22, borderRadius: 6,
          background: C.primary, color: '#fff',
          fontSize: 11.5, fontWeight: 800, lineHeight: 1,
        }}>{num}</span>
      )}
      <div style={{
        fontSize: 15.5, fontWeight: 800, color: C.text,
        letterSpacing: -0.2, lineHeight: 1.2,
      }}>
        {children}
      </div>
    </div>
  );
}
function SubHeader({ children, color }) {
  return (
    <div style={{
      fontSize: 10.5, fontWeight: 800,
      color: color || C.textMute,
      letterSpacing: 1.4, textTransform: 'uppercase',
      marginBottom: 8,
    }}>
      {children}

}
function Card({ children, style }) {
  return (
    <div style={{
      background: '#FAFBFC',
      borderRadius: 10, border: `1px solid ${C.borderSoft}`,
      padding: '14px 16px', marginBottom: 10,
      ...(style || {}),

}
function InlineHint({ children }) {
  return <span style={{ fontSize: 12.5, color: C.textSub, marginLeft: 4 }}>{children}</span>;
}

/* ─── 미리보기 텍스트 생성 (환자 친화 톤) ─── */
function buildDietText(d) {
  const lines = [];
  lines.push(`매일 과일·채소 ${d.fruitsVeg}인분 이상, 식이섬유 ${d.fiber}g 이상 챙겨 드세요.`);
  lines.push(`가공육은 주 ${d.processedMeat}회, 붉은 육류는 주 ${d.redMeat}회, 튀김·패스트푸드는 주 ${d.fried}회, 가당 음료는 하루 ${d.sugary}잔 이하로 줄여 주세요.`);
  lines.push(`알코올은 ${d.alcohol}, 수분은 하루 ${d.water}L 이상 드세요.`);
  if (d.note) lines.push(`참고 사항 — ${d.note}`);
  return lines;
}
function buildExerciseText(e) {
  const lines = [];
  lines.push(`주 ${e.freq}회, ${e.intensity}로 회당 ${e.timePerSession}분씩 (주 ${e.timePerWeek}분) 운동하세요.`);
  const types = [];
  if (e.aerobic)  types.push('유산소');
  if (e.strength) types.push(`근력(주 ${e.strengthFreq}회)`);
  if (types.length) lines.push(`구성: ${types.join(' + ')}.`);
  if (e.progressive) lines.push('수술 후 회복기 첫 2주는 저강도로 시작해 점차 늘려 갑니다.');
  return lines;
}
function buildMeasureText(m) {
  const lines = [];
  lines.push(`체중 ${m.weight}, 혈압 ${m.bp}, 통증 NRS ${m.pain}, 식단 ${m.diet}, 운동 ${m.exercise} 으로 기록해 주세요.`);
  const daily  = Object.keys(m.daily).filter(k => m.daily[k]);
  const weekly = Object.keys(m.weekly).filter(k => m.weekly[k]);
  if (daily.length)  lines.push(`매일 체크: ${daily.join(', ')}.`);
  if (weekly.length) lines.push(`주 1회 체크: ${weekly.join(', ')}.`);
  lines.push(`통증이 ${m.painThreshold}점 이상이면 자동으로 의료진에게 알림이 갑니다.`);
  return lines;
}
function buildTriageText(t) {
  const red = [];
  if (t.redFever)         red.push(`${t.redFeverTemp}°C 이상 발열`);
  if (t.redBlood)         red.push('혈변');
  if (t.redAbdominalPain) red.push('심한 복통');
  if (t.redConsciousness) red.push('의식 변화');
  const yellow = [];
  if (t.yellowFever)       yellow.push(`${t.yellowFeverTemp}°C 이상 발열`);
  if (t.yellowDiarrhea)    yellow.push(`하루 ${t.yellowDiarrheaFreq}회 이상 설사`);
  if (t.yellowDehydration) yellow.push('수분 섭취 불가');
  return [
    { tag:'RED',    color:'#D63A3A', bg:'#FBE6E6',
      text: red.length    ? `즉시 응급실로 가야 하는 증상 — ${red.join(', ')}.`
                          : '즉시 응급실 트리거가 비어 있습니다.' },
    { tag:'YELLOW', color:'#D08221', bg:'#FFF1DC',
      text: yellow.length ? `24시간 안에 외래로 연락 — ${yellow.join(', ')}.`
                          : '24시간 트리거가 비어 있습니다.' },
    { tag:'GREEN',  color:'#16A769', bg:'#E7F6EE',
      text: '경미한 변화는 다음 외래 때 보고해 주세요.' },
  ];
}
function buildNextText(n) {
  const metrics = Object.keys(n.metrics).filter(k => n.metrics[k]);
  const lines = [];
  lines.push(`중간 점검일은 ${n.checkDate}로 앱에서 알림이 갑니다.`);
  lines.push(`다음 외래 방문일은 ${n.nextVisit}입니다.`);
  if (metrics.length) lines.push(`다음 방문 시 함께 확인할 지표: ${metrics.join(', ')}.`);
  return lines;
}

function PreviewBlock({ title, lines }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 6 }}>
        {title}
      </div>
      <div style={{ fontSize: 12.5, color: C.text, lineHeight: 1.65 }}>
        {lines.map((l, i) => <div key={i} style={{ marginBottom: 4 }}>{l}</div>)}
      </div>
    </div>
  );
}

function PlanPreviewModal({ plan, onClose }) {
  const triage = buildTriageText(plan.triage);
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(20,22,30,0.45)',
      display:'flex', alignItems:'center', justifyContent:'center', zIndex: 100,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: 540, maxWidth:'92vw', maxHeight:'86vh',
        background: C.surface, borderRadius: 16,
        boxShadow: '0 24px 60px rgba(0,0,0,0.18)',
        display:'flex', flexDirection:'column', overflow:'hidden',
      }}>
        <div style={{
          display:'flex', alignItems:'center', justifyContent:'space-between',
          padding: '18px 22px', borderBottom: `1px solid ${C.borderSoft}`,
        }}>
          <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
            <span style={{
              display:'inline-flex', alignItems:'center', height: 20,
              padding: '0 8px', borderRadius: 4,
              background: C.accentSoft, color: C.accent,
              fontSize: 11, fontWeight: 800, letterSpacing: 0.6,
            }}>AI</span>
            <div style={{ fontSize: 17, fontWeight: 700, color: C.text }}>환자용 요약 미리보기</div>
          </div>
          <button onClick={onClose} style={{ color: C.textSub, padding: 4, display:'flex' }}>
            <Icon name="x" size={20}/>
          </button>
        </div>
        <div style={{ fontSize: 12.5, color: C.textSub, padding: '12px 22px 0', lineHeight: 1.5 }}>
          입력하신 처방을 환자가 이해하기 쉽게 풀어 쓴 내용입니다. 환자 앱으로 이대로 전송됩니다.
        </div>
        <div className="scroll" style={{ flex: 1, overflowY:'auto', padding: '14px 22px 22px' }}>
          <PreviewBlock title="식이"      lines={buildDietText(plan.diet)}/>
          <PreviewBlock title="운동"      lines={buildExerciseText(plan.exercise)}/>
          <PreviewBlock title="자기 측정" lines={buildMeasureText(plan.measure)}/>
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 6 }}>응급 대응</div>
            {triage.map((t, i) => (
              <div key={i} style={{
                background: t.bg, borderRadius: 8, padding: '10px 12px',
                marginBottom: 6, fontSize: 12.5, color: C.text, lineHeight: 1.55,
                display:'flex', gap: 8,
              }}>
                <span style={{
                  flexShrink: 0, alignSelf:'flex-start',
                  padding: '2px 7px', borderRadius: 3,
                  background: t.color, color: '#fff',
                  fontSize: 10, fontWeight: 800, letterSpacing: 0.4,
                }}>{t.tag}</span>
                <span>{t.text}</span>
              </div>
            ))}
          </div>
          <PreviewBlock title="다음 방문" lines={buildNextText(plan.next)}/>
          {plan.custom && plan.custom.trim() && (
            <div style={{ marginBottom: 4 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 6 }}>의료진 직접 처방</div>
              <div style={{
                fontSize: 12.5, color: C.text, lineHeight: 1.65,
                whiteSpace: 'pre-wrap',
                background: C.bg, borderRadius: 8,
                border: `1px solid ${C.borderSoft}`,
                padding: '10px 12px',
              }}>{plan.custom}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function ExportConfirmModal({ onClose }) {
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(20,22,30,0.45)',
      display:'flex', alignItems:'center', justifyContent:'center', zIndex: 110,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: 400, maxWidth:'92vw',
        background: C.surface, borderRadius: 16, padding: 26,
        boxShadow: '0 24px 60px rgba(0,0,0,0.18)',
        textAlign:'center',
      }}>
        <div style={{
          width: 56, height: 56, borderRadius: 28,
          background: C.accentSoft, color: C.accent,
          display:'flex', alignItems:'center', justifyContent:'center',
          margin: '4px auto 16px',
        }}>
          <Icon name="check" size={26}/>
        </div>
        <div style={{ fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 8 }}>
          에이전트 내보내기 완료
        </div>
        <div style={{ fontSize: 13.5, color: C.textSub, lineHeight: 1.6, marginBottom: 22 }}>
          처방하신 값으로 환자 앱의 에이전트가 구동됩니다.
        </div>
        <button onClick={onClose} style={{
          width:'100%', height: 44, borderRadius: 10,
          background: C.primary, color: '#fff',
          fontSize: 14, fontWeight: 700,
        }}>
          확인
        </button>
      </div>
    </div>
  );
}

function PlanPanel({ plan, setPlan }) {
  const [section, setSection] = useState('all');

  const sectionsRender = {
    diet:     <DietSection      d={plan.diet}     set={(d) => setPlan({ ...plan, diet: d })}/>,
    exercise: <ExerciseSection  e={plan.exercise} set={(e) => setPlan({ ...plan, exercise: e })}/>,
    measure:  <MeasureSection   m={plan.measure}  set={(m) => setPlan({ ...plan, measure: m })}/>,
    triage:   <TriageSection    t={plan.triage}   set={(t) => setPlan({ ...plan, triage: t })}/>,
    next:     <NextVisitSection n={plan.next}     set={(n) => setPlan({ ...plan, next: n })}/>,
    custom:   <CustomSection    value={plan.custom} set={(v) => setPlan({ ...plan, custom: v })}/>,
  };

  const sectionsForAll = [
    { k:'diet',     l:'식이 처방',         render: sectionsRender.diet },
    { k:'exercise', l:'운동 처방 (FITT)',  render: sectionsRender.exercise },
    { k:'measure',  l:'자기 측정 처방',    render: sectionsRender.measure },
    { k:'triage',   l:'트리아제 트리거',   render: sectionsRender.triage },
    { k:'next',     l:'다음 외래 일정',    render: sectionsRender.next },
    { k:'custom',   l:'의료진 직접 처방',  render: sectionsRender.custom },
  ];

  return (
    <div style={{ flex: 1, display:'flex', minHeight: 0, borderTop: `1px solid ${C.borderSoft}` }}>
      {/* 좌측 섹션 사이드바 */}
      <div className="scroll" style={{
        width: 152, flexShrink: 0, overflowY:'auto',
        borderRight: `1px solid ${C.borderSoft}`, padding: '8px 0',
      }}>
        {PLAN_SECTIONS.map(s => {
          const active = section === s.k;
          return (
            <button key={s.k} onClick={() => setSection(s.k)} style={{
              width:'100%', textAlign:'left',
              padding: '11px 16px', fontSize: 13,
              color: active ? C.text : C.textSub,
              fontWeight: active ? 700 : 500,
              background: active ? C.bg : 'transparent',
              borderLeft: active ? `3px solid ${C.text}` : '3px solid transparent',
            }}>{s.l}</button>
          );
        })}
      </div>
      {/* 우측 폼 (preview 컬럼 제거) */}
      <div className="scroll" style={{ flex: 1, minWidth: 0, overflowY:'auto', padding: '18px 24px 24px' }}>
        {section === 'all' ? (
          sectionsForAll.map((s, i) => (
            <div key={s.k} style={{ marginBottom: i === sectionsForAll.length - 1 ? 0 : 22 }}>
              <SectionTitle num={i + 1}>{s.l}</SectionTitle>
              {s.render}
            </div>
          ))
        ) : (
          <>
            <SectionTitle num={PLAN_SECTIONS.findIndex(s => s.k === section)}>
              {PLAN_SECTIONS.find(s => s.k === section).l}
            </SectionTitle>
            {sectionsRender[section]}
          </>
        )}
      </div>
    </div>
  );
}

function RightPanel({ patient }) {
  const [tab, setTab] = useState('emr');               // 'emr' | 'plan'
  const [plan, setPlan] = useState(DEFAULT_PLAN);
  const [showPreview, setShowPreview] = useState(false);
  const [showExported, setShowExported] = useState(false);

  return (
    <section style={{
      flex: 1, minWidth: 0, background: C.surface,
      borderRadius: 12, border: `1px solid ${C.border}`,
      display:'flex', flexDirection:'column', overflow:'hidden',
    }}>
      {/* 탭 */}
      <div style={{ display:'flex', borderBottom: `1px solid ${C.border}`, padding: '0 20px' }}>
        {[
          { k:'emr',  l:'환자 치료 정보 (EMR)' },
          { k:'plan', l:'재택 관리 플랜 생성 (Agent-builder)' },
        ].map(t => {
          const active = tab === t.k;
          return (
            <button key={t.k} onClick={() => setTab(t.k)} style={{
              height: 50, padding: '0 18px',
              fontSize: 14, fontWeight: active ? 700 : 500,
              color: active ? C.text : C.textSub,
              borderBottom: active ? `2px solid ${C.text}` : '2px solid transparent',
            }}>{t.l}</button>
          );
        })}
      </div>

      {tab === 'emr'
        ? <EMRPanel emr={patient.emr}/>
        : <PlanPanel plan={plan} setPlan={setPlan}/>}

      {/* 하단 액션 바 */}
      <div style={{ borderTop: `1px solid ${C.border}`, padding: '12px 20px',
                    display:'flex', justifyContent:'flex-end', gap: 8 }}>
        {tab === 'plan' && (
          <button onClick={() => setShowPreview(true)} style={{
            display:'flex', alignItems:'center', gap: 6,
            height: 42, padding: '0 18px', borderRadius: 8,
            border: `1px solid ${C.border}`, background: C.surface,
            fontSize: 14, fontWeight: 600, color: C.text,
          }}>
            <Icon name="note" size={14} color={C.text}/> 미리보기
          </button>
        )}
        <button onClick={() => setShowExported(true)} style={{
          display:'flex', alignItems:'center', gap: 8,
          height: 42, padding: '0 24px', borderRadius: 8,
          background: C.primary, color: '#fff',
          fontSize: 14, fontWeight: 700,
        }}>
          <Icon name="send" size={14} color="#fff"/> 에이전트 내보내기
        </button>
      </div>

      {showPreview && (
        <PlanPreviewModal plan={plan} onClose={() => setShowPreview(false)}/>
      )}
      {showExported && (
        <ExportConfirmModal onClose={() => setShowExported(false)}/>
      )}
    </section>
  );
}

/* ───────── App ───────── */
function App() {
  const [selectedIdx, setSelectedIdx] = useState(0);
  const patient = PATIENTS[selectedIdx];

  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
      <Header/>
      <div style={{ flex:1, display:'flex', minHeight: 0, background: C.chrome }}>
        <Sidebar/>
        <div style={{
          flex:1, display:'flex', gap: 10, padding: 10,
          background: C.bg, minHeight: 0,
        }}>
          <PatientList selectedIdx={selectedIdx} setSelectedIdx={setSelectedIdx}/>
          <CenterPanel patient={patient}/>
          <RightPanel patient={patient}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
