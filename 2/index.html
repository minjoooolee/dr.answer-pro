<script type="text/babel">
// ─── Calm palette ───────────────────────────────────────────────
const C = {
  bg:    '#F6F7F9',
  card:  '#FFFFFF',
  ink:   '#0E1116',
  ink2:  '#3A3F47',
  mute:  'rgba(14,17,22,0.55)',
  mute2: 'rgba(14,17,22,0.34)',
  line:  'rgba(14,17,22,0.06)',
  accent:'#4B3BE0',   // single deep indigo accent
  ok:    '#2BB673',
  warn:  '#E0883A',
  alert: '#D14B5C',
};

// ─── 3D Mesh AI Orb (Three.js) ──────────────────────────────────
// Status → Three.js color palette
const ORB_PALETTE = {
  ok:    { base: 0x052e14, emissive: 0x0a4a22, specular: 0x66ffaa, ambientHex: 0x116622, rimHex: 0x22dd66, wire: 0x33ee77, pts: 0xaaffcc, glow: 0x22cc55, shadow: 'rgba(30,190,80,0.70)'  },
  watch: { base: 0x2e1800, emissive: 0x4a2800, specular: 0xffcc66, ambientHex: 0x663300, rimHex: 0xff8822, wire: 0xff9933, pts: 0xffddaa, glow: 0xee7722, shadow: 'rgba(220,120,30,0.70)'  },
  alert: { base: 0x2e0606, emissive: 0x4a0e0e, specular: 0xff9999, ambientHex: 0x661111, rimHex: 0xff3333, wire: 0xff4444, pts: 0xffbbbb, glow: 0xee2222, shadow: 'rgba(220,40,40,0.75)'   },
};

function MeshOrb({ size = 96, status = 'ok' }) {
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    const el = containerRef.current;
    if (!el || !window.THREE) return;
    const THREE = window.THREE;
    const pal = ORB_PALETTE[status] || ORB_PALETTE.ok;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(size, size);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    el.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 50);
    camera.position.z = 3.0;

    // Lighting — tinted to match status color
    scene.add(new THREE.AmbientLight(pal.ambientHex, 1.0));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
    keyLight.position.set(2, 2, 3);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(pal.rimHex, 0.9);
    rimLight.position.set(-3, -1, -2);
    scene.add(rimLight);

    // Base sphere
    const baseMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1, 64, 48),
      new THREE.MeshPhongMaterial({ color: pal.base, emissive: pal.emissive, specular: pal.specular, shininess: 80 })
    );
    scene.add(baseMesh);

    // Wireframe
    const wireMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1.012, 20, 14),
      new THREE.MeshBasicMaterial({ color: pal.wire, wireframe: true, transparent: true, opacity: 0.38 })
    );
    scene.add(wireMesh);

    // Particle cloud
    const points = new THREE.Points(
      new THREE.SphereGeometry(1.018, 36, 24),
      new THREE.PointsMaterial({ color: pal.pts, size: 0.030, transparent: true, opacity: 0.95 })
    );
    scene.add(points);

    // Outer glow shell
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.18, 20, 14),
      new THREE.MeshBasicMaterial({ color: pal.glow, transparent: true, opacity: 0.09, side: THREE.BackSide })
    ));

    let animId;
    const t0 = Date.now();
    const animate = () => {
      animId = requestAnimationFrame(animate);
      const t = (Date.now() - t0) / 1000;
      wireMesh.rotation.y = t * 0.28;
      wireMesh.rotation.x = t * 0.09;
      points.rotation.y  = t * 0.28;
      points.rotation.x  = t * 0.09;
      const s = 1 + Math.sin(t * 0.75) * 0.022;
      baseMesh.scale.setScalar(s);
      wireMesh.scale.setScalar(s);
      points.scale.setScalar(s);
      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(animId);
      renderer.dispose();
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
    };
  }, [size, status]);

  const pal = ORB_PALETTE[status] || ORB_PALETTE.ok;
  return (
    <div style={{ animation: 'orbFloat 4.5s ease-in-out infinite' }}>
      <div ref={containerRef} style={{
        width: size, height: size, borderRadius: '50%', overflow: 'hidden',
        filter: `drop-shadow(0 0 26px ${pal.shadow})`,
      }}/>
    </div>
  );
}

// ─── HOME ───────────────────────────────────────────────────────
const STATUS_UI = {
  ok:    { label: '정상',     labelColor: '#5dffa0', gradColor: 'rgba(30,200,90,0.28)'  },
  watch: { label: '관찰 필요', labelColor: '#ffcc55', gradColor: 'rgba(220,130,30,0.28)' },
  alert: { label: '응급 상황', labelColor: '#ff7777', gradColor: 'rgba(220,40,40,0.30)'  },
};

function SyncIndicator() {
  const TOTAL = 600; // 10분
  const [seconds, setSeconds] = React.useState(TOTAL);
  React.useEffect(() => {
    const id = setInterval(() => {
      setSeconds(s => (s <= 1 ? TOTAL : s - 1));
    }, 1000);
    return () => clearInterval(id);
  }, []);
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  const fmt = `${m}:${String(s).padStart(2, '0')}`;
  return (
    <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 7,
        padding: '5px 11px 5px 9px', borderRadius: 100,
        background: 'rgba(43,182,115,0.10)',
        border: '1px solid rgba(43,182,115,0.22)',
      }}>
        <span style={{ position: 'relative', width: 8, height: 8 }}>
          <span style={{
            position: 'absolute', inset: 0, borderRadius: '50%',
            background: C.ok,
            animation: 'syncRing 1.6s ease-out infinite',
          }}/>
          <span style={{
            position: 'absolute', inset: 0, borderRadius: '50%', background: C.ok,
          }}/>
        </span>
        <span style={{ fontSize: 11.5, fontWeight: 700, color: C.ok, letterSpacing: -0.1 }}>
          Ventilator 동기화중
        </span>
      </div>
      <div style={{ fontSize: 11.5, color: C.mute, fontWeight: 500, letterSpacing: -0.1 }}>
        마지막 동기화 · <span style={{ color: C.ink, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{fmt}</span>
      </div>
    </div>
  );
}

function AgentPopup({ onClose, onWorry }) {
  const [answered, setAnswered] = React.useState(null);

  const handleAnswer = (v) => {
    setAnswered(v);
    if (v === 'warn') {
      setTimeout(() => { onWorry && onWorry(); }, 280);
    } else {
      setTimeout(onClose, 1400);
    }
  };

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 200,
      background: 'rgba(14,17,22,0.45)', backdropFilter: 'blur(6px)',
      WebkitBackdropFilter: 'blur(6px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '0 24px',
    }} onClick={answered ? undefined : onClose}>
      {answered === 'ok' ? (
        <div style={{
          background: '#fff', borderRadius: 20, padding: '28px 24px',
          width: '100%', textAlign: 'center',
          boxShadow: '0 12px 40px rgba(14,17,22,0.18)',
        }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>🙂</div>
          <div style={{ fontSize: 17, fontWeight: 700, color: C.ink, letterSpacing: -0.4 }}>다행이에요</div>
          <div style={{ fontSize: 12.5, color: C.mute, marginTop: 6, lineHeight: 1.5, letterSpacing: -0.1 }}>
            계속 모니터링할게요.
          </div>
        </div>
      ) : (
      <div style={{
        width: '100%', background: '#fff', borderRadius: 20,
        padding: '22px 22px 20px',
        boxShadow: '0 12px 40px rgba(14,17,22,0.18)',
      }} onClick={e => e.stopPropagation()}>

        {/* 헤더 */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{
              width: 22, height: 22, borderRadius: '50%',
              background: C.ink,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
                <path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" fill="#fff"/>
              </svg>
            </div>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.ink, letterSpacing: -0.3 }}>AI 모니터링 에이전트</span>
          </div>
          <button onClick={onClose} style={{
            background: 'none', border: 'none', cursor: 'pointer',
            color: C.mute, fontSize: 18, lineHeight: 1, padding: 4,
          }}>×</button>
        </div>

        {/* 상태 메시지 */}
        <div style={{ marginBottom: 22 }}>
          <div style={{ fontSize: 14.5, fontWeight: 700, color: C.ink, lineHeight: 1.55, letterSpacing: -0.3 }}>
            호흡수(RR)가 기준치보다 다소 높게 측정되고 있어요.
          </div>
          <div style={{ fontSize: 13.5, fontWeight: 700, color: C.ink, marginTop: 6, lineHeight: 1.55, letterSpacing: -0.2 }}>
            지금 민준이 상태가 어떤가요?
          </div>
        </div>

        {/* 버튼 */}
        <div style={{ display: 'flex', gap: 10 }}>
          {[
            { v: 'ok',   emoji: '😊', label: '괜찮아요' },
            { v: 'warn', emoji: '😟', label: '걱정돼요' },
          ].map(o => (
            <button key={o.v} onClick={() => handleAnswer(o.v)} style={{
              flex: 1, padding: '13px 0', borderRadius: 14, cursor: 'pointer',
              background: '#fff',
              border: `1px solid ${answered === o.v ? C.ink : 'rgba(14,17,22,0.14)'}`,
              color: C.ink,
              fontSize: 14, fontWeight: 600, letterSpacing: -0.3,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
              transition: 'border-color 0.2s',
            }}>
              <span style={{ fontSize: 16 }}>{o.emoji}</span>
              {o.label}
            </button>
          ))}
        </div>
      </div>
      )}
    </div>
  );
}

function Home({ showAgent = false, onAgentClose, onWorry }) {
  // 'ok' | 'watch' | 'alert' — 오브/카드 색상 연동
  const STATUS = 'watch';
  const sui = STATUS_UI[STATUS];

  return (
    <div style={{ flex: 1, overflow: 'auto', paddingTop: 64, paddingBottom: 120, background: C.bg, position: 'relative' }}>
      {showAgent && <AgentPopup
        onClose={onAgentClose}
        onWorry={onWorry}
      />}

      {/* Minimal header */}
      <div style={{
        padding: '18px 22px 4px',
        display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12,
      }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, color: C.ink, letterSpacing: -0.2 }}>
            민준 · 5세
          </div>
          <div style={{ fontSize: 11.5, color: C.mute, fontWeight: 500, marginTop: 2, letterSpacing: -0.1 }}>
            신촌세브란스병원 · 호흡기내과 이진환 교수
          </div>
        </div>
        <div style={{
          width: 36, height: 36, borderRadius: '50%', flexShrink: 0,
          background: 'rgba(14,17,22,0.05)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2a2 2 0 01-.6 1.4L4 17h5m6 0a3 3 0 11-6 0" stroke={C.ink} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </div>

      {/* Greeting */}
      <div style={{ padding: '14px 22px 4px' }}>
        <div style={{ fontSize: 28, fontWeight: 700, color: C.ink, letterSpacing: -1.0, lineHeight: 1.18 }}>
          안녕하세요, 어머님.
        </div>
        <SyncIndicator/>
      </div>

      {/* AI summary card — status-aware mesh orb */}
      <div style={{ padding: '22px 16px 0' }}>
        <div style={{
          background: '#0D0F14',
          color: '#fff', borderRadius: 24, padding: '18px 20px 20px',
          position: 'relative', overflow: 'hidden',
        }}>
          <div style={{
            position: 'absolute', inset: 0,
            background: `radial-gradient(130% 90% at 110% -10%, ${sui.gradColor} 0%, transparent 55%)`,
            pointerEvents: 'none',
          }}/>
          <div style={{ position: 'relative', display: 'flex', justifyContent: 'center', marginBottom: 12 }}>
            <MeshOrb size={72} status={STATUS}/>
          </div>
          <div style={{ position: 'relative', textAlign: 'center' }}>
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 5,
              padding: '4px 10px', borderRadius: 100, marginBottom: 8,
              background: 'rgba(255,255,255,0.06)',
              border: `1px solid ${sui.labelColor}44`,
            }}>
              <span style={{
                width: 6, height: 6, borderRadius: '50%', background: sui.labelColor,
                animation: STATUS !== 'ok' ? 'pulseDot 1.2s ease-in-out infinite' : 'none',
              }}/>
              <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.2, color: sui.labelColor }}>
                {sui.label}
              </span>
            </div>
            <div style={{
              fontSize: 10, fontWeight: 600, letterSpacing: 2,
              color: 'rgba(255,255,255,0.45)', textTransform: 'uppercase', marginBottom: 8,
            }}>지난 1시간 요약</div>
            <div style={{
              fontSize: 14.5, fontWeight: 600, letterSpacing: -0.4, lineHeight: 1.55, padding: '0 4px', whiteSpace: 'nowrap',
            }}>
              RR, MinVent 지표에서 변화가 감지됩니다.<br/>아이 상태를 확인해주세요.
            </div>
            <div style={{
              fontSize: 12, color: 'rgba(255,255,255,0.50)', marginTop: 10, lineHeight: 1.6,
            }}>
              분석 시각: 09:23 · 다음 분석: 10:00
            </div>
          </div>
        </div>
      </div>

      {/* V-PEP 실시간 환기 지표 */}
      <div style={{ padding: '20px 22px 10px', display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.ink, letterSpacing: -0.3 }}>
          V-PEP 실시간 환기 지표
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: C.ok, fontWeight: 600 }}>
          <span style={{
            width: 5, height: 5, borderRadius: '50%', background: C.ok,
            animation: 'pulseDot 1.6s ease-in-out infinite',
          }}/>
          실시간
        </div>
      </div>

      <div style={{ padding: '0 16px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        <MetricCard label="PIP"  value="18"  unit="cmH₂O" tone="ok"   trend="up"     statusText="기준 ±2"               bars={[3,4,3,5,4,3,5,7]} animate={!showAgent}/>
        <MetricCard label="VTE"  value="142" unit="mL"    tone="ok"   trend="steady" statusText="정상 범위"             bars={[4,5,4,5,4,5,4,6]} animate={!showAgent}/>
        <MetricCard label="RR"   value="28"  unit="bpm"   tone="warn" trend="up"     statusText="+18% 상승"             bars={[3,4,5,4,5,6,7,8]} animate={!showAgent}/>
        <MetricCard label="LEAK" value="19"  unit="L/min" tone="ok"   trend="steady" statusText="허용 범위"             bars={[4,3,4,5,4,5,4,6]} animate={!showAgent}/>
      </div>

      {/* MINVENT — wide card */}
      <div style={{ padding: '10px 16px 0' }}>
        <div style={{
          background: C.card, borderRadius: 18, padding: '16px 18px 14px',
          boxShadow: '0 1px 1.5px rgba(14,17,22,0.04)',
          position: 'relative', overflow: 'hidden',
          display: 'flex', alignItems: 'center', gap: 14,

// ─── Small bar chart for metric cards ──────────────────────────
function BarChart({ bars, highlightLast = true, accentTone = 'ok', w = 96, h = 26, animate = false }) {
  const max = Math.max(...bars);
  const accent = accentTone === 'warn' ? C.warn : C.ok;
  const gap = 2;
  const barW = (w - gap * (bars.length - 1)) / bars.length;

  // Track whether the last bar has settled yet
  const [settled, setSettled] = React.useState(!animate);
  React.useEffect(() => {
    if (!animate) return;
    setSettled(false);
    // blink 3 times (~1.5s) then settle
    const t = setTimeout(() => setSettled(true), 1500);
    return () => clearTimeout(t);
  }, [animate]);

  return (
    <div style={{ position: 'relative', width: w, height: h, display: 'flex', alignItems: 'flex-end', gap: gap }}>
      {bars.map((v, i) => {
        const bh = Math.max(2, (v / max) * (h - 2));
        const isLast = i === bars.length - 1;
        const fill = isLast && highlightLast ? accent : 'rgba(180,194,210,0.55)';
        let anim = 'none';
        if (animate && isLast) {
          anim = settled
            ? 'barSettle 0.45s cubic-bezier(.22,.68,0,1.2) forwards'
            : 'barBlink 0.5s ease-in-out 3';
        }
        return (
          <div key={i} style={{
            width: barW, height: bh, borderRadius: 1.5,
            background: fill, flexShrink: 0,
            transformOrigin: 'bottom',
            animation: anim,
          }}/>
        );
      })}
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState('home');
  const [agentSeen, setAgentSeen] = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);

  const handleSubmit = () => {
    setSubmitting(true);
    setTimeout(() => {
      setSubmitting(false);
      setScreen('home');
    }, 1100);
  };

  return (
    <IOSDevice>
      {screen === 'home' && (
        <Home
          showAgent={!agentSeen}
          onAgentClose={() => setAgentSeen(true)}
          onWorry={() => { setAgentSeen(true); setScreen('record'); }}
        />
      )}
      {screen === 'record' && <Survey onBack={() => setScreen('home')} onSubmit={handleSubmit}/>}
      {screen === 'report' && <Report/>}
      {screen === 'user' && (
        <div style={{ flex: 1, padding: 60, color: C.mute, textAlign: 'center', background: C.bg }}>내정보 화면 준비중</div>
      )}
      <TabBar active={screen === 'home' ? 'home' : screen} onChange={setScreen}/>
      {submitting && <SubmitToast/>}
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
