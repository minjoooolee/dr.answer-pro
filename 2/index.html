<script type="text/babel">

  bg:    '#F6F7F9',
  card:  '#FFFFFF',
  ink:   '#0E1116',
  ink2:  '#3A3F47',
  mute:  'rgba(14,17,22,0.55)',

  line:  'rgba(14,17,22,0.06)',

  warn:  '#E0883A',

// ─── 3D Mesh AI Orb (Three.js) ──────────────────────────────────
function MeshOrb({ size = 138 }) {
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    const el = containerRef.current;
    if (!el || !window.THREE) return;
    const THREE = window.THREE;

    // Renderer — transparent background so card bg shows through
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(size, size);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    el.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 50);
    camera.position.z = 3.0;

    // ── Lighting ────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x5533cc, 1.0));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
    keyLight.position.set(2, 2, 3);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0x8866ff, 0.8);
    rimLight.position.set(-3, -1, -2);
    scene.add(rimLight);

    // ── Base sphere — dark indigo with phong shading ─────────────
    const baseGeo = new THREE.SphereGeometry(1, 64, 48);
    const baseMat = new THREE.MeshPhongMaterial({
      color: 0x12085e,
      emissive: 0x200e6a,
      specular: 0xaa88ff,
      shininess: 80,
    });
    const baseMesh = new THREE.Mesh(baseGeo, baseMat);
    scene.add(baseMesh);

    // ── Wireframe mesh ────────────────────────────────────────────
    const wireGeo = new THREE.SphereGeometry(1.012, 20, 14);
    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x9977ff,
      wireframe: true,
      transparent: true,
      opacity: 0.38,
    });
    const wireMesh = new THREE.Mesh(wireGeo, wireMat);
    scene.add(wireMesh);

    // ── Surface particle cloud ────────────────────────────────────
    const ptGeo = new THREE.SphereGeometry(1.018, 36, 24);
    const ptMat = new THREE.PointsMaterial({
      color: 0xddd0ff,
      size: 0.030,
      transparent: true,
      opacity: 0.95,
    });
    const points = new THREE.Points(ptGeo, ptMat);
    scene.add(points);

    // ── Thin outer glow shell (additive) ─────────────────────────
    const glowGeo = new THREE.SphereGeometry(1.18, 20, 14);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0x7755ff,
      transparent: true,
      opacity: 0.08,
      side: THREE.BackSide,
    });
    scene.add(new THREE.Mesh(glowGeo, glowMat));

    // ── Animation loop ────────────────────────────────────────────
    let animId;
    const t0 = Date.now();
    const animate = () => {
      animId = requestAnimationFrame(animate);
      const t = (Date.now() - t0) / 1000;
      wireMesh.rotation.y = t * 0.28;
      wireMesh.rotation.x = t * 0.09;
      points.rotation.y  = t * 0.28;
      points.rotation.x  = t * 0.09;
      // Subtle breathing
      const s = 1 + Math.sin(t * 0.75) * 0.022;
      baseMesh.scale.setScalar(s);
      wireMesh.scale.setScalar(s);
      points.scale.setScalar(s);
      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(animId);
      renderer.dispose();
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
    };
  }, [size]);

  return (
    <div style={{ animation: 'orbFloat 4.5s ease-in-out infinite' }}>
      <div
        ref={containerRef}
        style={{
          width: size, height: size, borderRadius: '50%', overflow: 'hidden',
          filter: 'drop-shadow(0 0 28px rgba(120,90,255,0.65))',
        }}
      />
    </div>
  );
}

// ─── Sparkline ──────────────────────────────────────────────────
function Spark({ data, w = 110, h = 28, color = C.accent }) {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = w / (data.length - 1);
  const pts = data.map((v, i) => [i * step, h - ((v - min) / range) * (h - 6) - 3]);
  const path = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={path} fill="none" stroke={color} strokeOpacity="0.85"
            strokeWidth="1.6" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2.2" fill={color}/>
    </svg>
  );
}

// ─── Pressure waveform ──────────────────────────────────────────
function VentWave({ w = 326, h = 50, color = C.accent }) {
  const cycles = 4;
  const cycleW = w / cycles;
  let d = `M0,${h - 4}`;
  for (let i = 0; i < cycles; i++) {
    const x0 = i * cycleW;
    d += ` L${x0 + cycleW*0.05},${h - 4}`;
    d += ` C${x0 + cycleW*0.10},${h*0.18} ${x0 + cycleW*0.30},${h*0.12} ${x0 + cycleW*0.42},${h*0.20}`;
    d += ` L${x0 + cycleW*0.55},${h*0.24}`;
    d += ` C${x0 + cycleW*0.62},${h*0.55} ${x0 + cycleW*0.75},${h - 6} ${x0 + cycleW*0.95},${h - 4}`;
  }
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={d} fill="none" stroke={color} strokeOpacity="0.9"
            strokeWidth="1.6" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

}

      backdropFilter: 'blur(20px) saturate(180%)',
      WebkitBackdropFilter: 'blur(20px) saturate(180%)',
      boxShadow: '0 8px 24px rgba(14,17,22,0.08), 0 0 0 0.5px rgba(0,0,0,0.04)',
      display: 'flex', alignItems: 'center', gap: 4, zIndex: 40,
    }}>
      {item(Ico.home, '홈', true)}
      {item(Ico.chart, '추세', false)}
      <div style={{ flex: 1.1, display: 'flex', justifyContent: 'center' }}>
        <button style={{
          height: 46, width: 46, borderRadius: '50%', border: 0,
          background: C.ink, color: '#fff', display: 'flex',
          alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 6px 16px rgba(14,17,22,0.30)', cursor: 'pointer',
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" fill="#fff"/>
          </svg>
        </button>
      </div>
      {item(Ico.bell, '알림', false)}
      {item(Ico.user, '내정보', false)}
    </div>
  );
}

function App() {
  return (
    <IOSDevice>
      <Home/>
      <TabBar/>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
