<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>닥터앤서 PRO Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
  body {
    font-family: 'Pretendard', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #f3f6f5;
  }
  input::placeholder { color: rgba(0,0,0,0.35); }

  @keyframes aiPulse {
    0%   { transform: scale(0.85); opacity: 0.55; }
    100% { transform: scale(1.25); opacity: 0; }
  }
  @keyframes aiBreathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  @keyframes aiHeart {
    0%, 100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.6; }
    50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }
  @keyframes aiRotate {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes aiBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }
  @keyframes aiWave {
    0%, 100% { height: 30%; }
    50%      { height: 90%; }
  }
  @keyframes blobA {
    0%, 100% { transform: translate(0%, 0%) scale(1); }
    33%      { transform: translate(-12%, 8%) scale(1.18); }
    66%      { transform: translate(8%, -10%) scale(0.92); }
  }
  @keyframes blobB {
    0%, 100% { transform: translate(0%, 0%) scale(1); }
    50%      { transform: translate(14%, -6%) scale(1.12); }
  }
  @keyframes blobC {
    0%, 100% { transform: translate(0%, 0%) scale(1); }
    40%      { transform: translate(-10%, -8%) scale(1.2); }
    80%      { transform: translate(6%, 10%) scale(0.9); }
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes slideInRight {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<!-- ─── ios-frame ─────────────────────────────────────────────── -->
<script type="text/babel">
// iOS device frame — Simplified iOS 26 (Liquid Glass)
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: dark ? '#fff' : '#000', letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSDevice({ children, width = 402, height = 874, dark = false, title, keyboard = false }) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
      </div>
      {/* home indicator */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

Object.assign(window, { IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow });
</script>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined'
      ? new ResizeObserver(clampToViewport)
      : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value}
                onChange={(e) => onChange(options.find(o => String(typeof o === 'object' ? o.value : o) === e.target.value) ?? e.target.value)}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakToggle, TweakRadio, TweakText,
});
</script>

function WeightChart({ data, dark, accent = '#41d2b4' }) {
  const w = 320, h = 160;
  const pad = { top: 26, right: 16, bottom: 32, left: 16 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  const values = data.map(d => d.value);
  const min = Math.min(...values) - 0.6;
  const max = Math.max(...values) + 0.6;
  const range = max - min || 1;
  const points = data.map((d, i) => ({
    x: pad.left + (i / Math.max(1, data.length - 1)) * cw,
    y: pad.top + ch - ((d.value - min) / range) * ch,
    ...d,
  }));
  const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const last = points[points.length - 1];
  const first = points[0];
  const areaPath = `${path} L ${last.x} ${pad.top + ch} L ${first.x} ${pad.top + ch} Z`;

  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none"

  const [transcript, setTranscript] = React.useState('');
  const [todayWeight, setTodayWeight] = React.useState('');
  const [dietMode, setDietMode] = React.useState(null);
  const [dietInput, setDietInput] = React.useState('');
  const [dietAnalyzed, setDietAnalyzed] = React.useState(false);
  const [dietPhoto, setDietPhoto] = React.useState(null);
  const [dietRecording, setDietRecording] = React.useState(false);
  const [exerciseDone, setExerciseDone] = React.useState(null);
  const [exerciseMode, setExerciseMode] = React.useState(null);
  const [exerciseInput, setExerciseInput] = React.useState('');
  const [exerciseAnalyzed, setExerciseAnalyzed] = React.useState(false);
  const [exerciseRecording, setExerciseRecording] = React.useState(false);
  const [reportType, setReportType] = React.useState(null);
  const [reportTab, setReportTab] = React.useState('문진');

  const closeSheet = () => {
    setActiveTag(null); setSurveyStep(0); setSubStep(-1); setSurveyMode(null);
    setTranscript(''); setTodayWeight('');
    setDietMode(null); setDietInput(''); setDietAnalyzed(false); setDietPhoto(null); setDietRecording(false);
    setExerciseDone(null); setExerciseMode(null); setExerciseInput(''); setExerciseAnalyzed(false); setExerciseRecording(false);
    setReportType(null); setReportTab('문진');
  };
  const advanceSurvey = () => { setSurveyStep(s => s + 1); setSubStep(-1); };

  React.useEffect(() => {
    if (surveyMode !== 'voice') return;
    if (surveyStep >= SURVEY_CATEGORIES.length) return;
    const response = subStep === -1
      ? VOICE_RESPONSES_CATEGORY[surveyStep]
      : VOICE_RESPONSES_PAIN[subStep];
    if (!response) return;
    setTranscript('');
    let intervalId;
    const timeoutId = setTimeout(() => {
      let i = 0;
      intervalId = setInterval(() => {
        i++;
        setTranscript(response.slice(0, i));
        if (i >= response.length) clearInterval(intervalId);
      }, 90);
    }, 700);
    return () => { clearTimeout(timeoutId); if (intervalId) clearInterval(intervalId); };
  }, [surveyMode, surveyStep, subStep]);

  const DIET_VOICE_TEXT = '닭가슴살 200g 삶은계란 2개 제로콜라 1캔';
  React.useEffect(() => {
    if (!dietRecording) return;
    setDietInput(''); setDietAnalyzed(false);
    let i = 0, intervalId;
    const timeoutId = setTimeout(() => {
      intervalId = setInterval(() => {
        i++;
        setDietInput(DIET_VOICE_TEXT.slice(0, i));
        if (i >= DIET_VOICE_TEXT.length) {
          clearInterval(intervalId);
          setDietRecording(false);
          setTimeout(() => setDietAnalyzed(true), 600);
        }
      }, 80);
    }, 500);
    return () => { clearTimeout(timeoutId); if (intervalId) clearInterval(intervalId); };
  }, [dietRecording]);

  const EXERCISE_VOICE_TEXT = '실내 자전거 30분 런닝머신 40분 산책 10분';
  React.useEffect(() => {
    if (!exerciseRecording) return;
    setExerciseInput(''); setExerciseAnalyzed(false);
    let i = 0, intervalId;
    const timeoutId = setTimeout(() => {
      intervalId = setInterval(() => {
        i++;
        setExerciseInput(EXERCISE_VOICE_TEXT.slice(0, i));
        if (i >= EXERCISE_VOICE_TEXT.length) {
          clearInterval(intervalId);
          setExerciseRecording(false);
          setTimeout(() => setExerciseAnalyzed(true), 600);
        }
      }, 80);
    }, 500);
    return () => { clearTimeout(timeoutId); if (intervalId) clearInterval(intervalId); };
  }, [exerciseRecording]);

  React.useEffect(() => {
    if (!recording) return;
    const target = '응 괜찮아';
    setText('');
    setSubmitted(false);
    let i = 0;
    const id = setInterval(() => {
      i++;
      setText(target.slice(0, i));
      if (i >= target.length) {
        clearInterval(id);
        setTimeout(() => {
          setRecording(false);
          setSubmitted(true);
        }, 600);
      }
    }, 180);
    return () => clearInterval(id);
  }, [recording]);

  const dark = tweaks.darkMode;
  const symbolState = recording ? 'listening' : tweaks.state;

  const bg = dark
    ? 'radial-gradient(ellipse at 50% 0%, #0e1f1c 0%, #050807 60%)'

    <div style={{
      width: '100%', height: '100%', position: 'relative',
      background: bg,
      paddingTop: 60, display: 'flex', flexDirection: 'column',

        }}>
          닥터앤서 PRO
        </div>
        <button
          onClick={() => setSidebarOpen(true)}
          style={{
            width: 38, height: 38, borderRadius: '50%', border: 'none', cursor: 'pointer',
            background: dark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.07)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'Poppins', fontWeight: 800, fontSize: 11,
            color: dark ? '#fff' : '#000',

          김

                {/* ── 나의 건강 리포트 ── */}
                {reportType === 'personal' && (
                  <>
                    {/* header row */}
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
                      <button onClick={() => setReportType(null)} style={{ background:'none', border:'none', cursor:'pointer', padding:'4px 0', display:'flex', alignItems:'center', gap:4 }}>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke={dark?'#fff':'#000'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        <span style={{ fontFamily:'Pretendard', fontWeight:500, fontSize:13, color: dark?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.5)' }}>뒤로</span>
                      </button>
                      <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:14, color: dark?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.8)' }}>{REPORT_MONTH}</div>
                      <div style={{ width:50 }} />
                    </div>
                    <div style={{ fontFamily:'Pretendard', fontWeight:800, fontSize:20, color: dark?'#fff':'#000', letterSpacing:'-0.02em', marginBottom:18 }}>📓 나의 건강 리포트</div>

                    {/* tab bar */}
                    <div style={{ display:'flex', gap:8, marginBottom:20, overflowX:'auto', paddingBottom:2 }}>
                      {['문진','체중','식단','운동'].map(tab => (
                        <button key={tab} onClick={() => setReportTab(tab)} style={{
                          flexShrink:0, padding:'7px 16px', borderRadius:20,
                          border: reportTab === tab ? 'none' : `1px solid ${dark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.12)'}`,
                          background: reportTab === tab ? C.purple : 'transparent',
                          color: reportTab === tab ? '#fff' : (dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.5)'),
                          fontFamily:'Pretendard', fontWeight:600, fontSize:13,
                          cursor:'pointer', transition:'all 0.15s',
                        }}>{tab}</button>
                      ))}
                    </div>

                    {/* LLM summary card */}
                    <div style={{
                      borderRadius:16, padding:'14px 16px', marginBottom:20,
                      background: dark ? 'rgba(125,80,240,0.12)' : 'rgba(125,80,240,0.07)',
                      border: `1px solid ${dark?'rgba(125,80,240,0.25)':'rgba(125,80,240,0.18)'}`,
                    }}>
                      <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:12, color:C.purple, marginBottom:6, letterSpacing:'-0.01em' }}>✨ AI 월간 {reportTab} 요약</div>
                      <div style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:13, color: dark?'rgba(255,255,255,0.75)':'rgba(0,0,0,0.65)', lineHeight:1.65 }}>{REPORT_LLM_SUMMARY[reportTab]}</div>
                    </div>

                    {/* diary entries */}
                    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                      {reportTab === '문진' && REPORT_SURVEY_DIARY.map(day => (
                        <div key={day.date} style={{ borderRadius:14, padding:'12px 14px', background: dark?'rgba(255,255,255,0.04)':'#fff', border:`1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)'}` }}>
                          <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color:C.purple, marginBottom:8 }}>{day.date}</div>
                          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                            {day.entries.map((e,i) => (
                              <span key={i} style={{
                                padding:'4px 10px', borderRadius:10, fontSize:11, fontFamily:'Pretendard', fontWeight:500,
                                background: e.includes('없음')||e.includes('양호')||e.includes('좋음')||e.includes('매우') ? (dark?'rgba(65,210,180,0.15)':'rgba(65,210,180,0.12)') : e.includes('심함')||e.includes('나쁨')||e.includes('저림') ? (dark?'rgba(238,63,96,0.2)':'rgba(238,63,96,0.1)') : (dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.05)'),
                                color: e.includes('없음')||e.includes('양호')||e.includes('좋음')||e.includes('매우') ? C.main : e.includes('심함')||e.includes('나쁨')||e.includes('저림') ? C.red : (dark?'rgba(255,255,255,0.65)':'rgba(0,0,0,0.55)'),
                              }}>{e}</span>
                            ))}
                          </div>
                        </div>
                      ))}
                      {reportTab === '체중' && REPORT_WEIGHT_DIARY.map(day => (
                        <div key={day.date} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', borderRadius:14, padding:'12px 16px', background: dark?'rgba(255,255,255,0.04)':'#fff', border:`1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)'}` }}>
                          <span style={{ fontFamily:'Pretendard', fontWeight:600, fontSize:13, color: dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.5)' }}>{day.date}</span>
                          <span style={{ fontFamily:'Pretendard', fontWeight:800, fontSize:16, color: C.main, letterSpacing:'-0.02em' }}>{day.value} kg</span>
                        </div>
                      ))}
                      {reportTab === '식단' && REPORT_DIET_DIARY.map(day => (
                        <div key={day.date} style={{ borderRadius:14, padding:'12px 16px', background: dark?'rgba(255,255,255,0.04)':'#fff', border:`1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)'}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                          <div>
                            <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color:C.purple, marginBottom:4 }}>{day.date}</div>
                            <div style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:12, color: dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.55)', maxWidth:200 }}>{day.summary}</div>
                          </div>
                          <span style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color:C.main, flexShrink:0 }}>{day.kcal} kcal</span>
                        </div>
                      ))}
                      {reportTab === '운동' && REPORT_EXERCISE_DIARY.map(day => (
                        <div key={day.date} style={{ borderRadius:14, padding:'12px 16px', background: dark?'rgba(255,255,255,0.04)':'#fff', border:`1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)'}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                          <div>
                            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                              <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color: day.done ? C.red : (dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.35)') }}>{day.date}</div>
                              <span style={{ fontSize:10, padding:'2px 7px', borderRadius:8, fontFamily:'Pretendard', fontWeight:600, background: day.done ? (dark?'rgba(238,63,96,0.18)':'rgba(238,63,96,0.1)') : (dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.05)'), color: day.done ? C.red : (dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.35)') }}>{day.done ? '운동함' : '휴식'}</span>
                            </div>
                            <div style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:12, color: dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.55)', maxWidth:200 }}>{day.summary}</div>
                          </div>
                          {day.done && <span style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color:C.red, flexShrink:0 }}>{day.kcal} kcal</span>}
                        </div>
                      ))}
                    </div>
                    <div style={{ height:20 }} />
                  </>
                )}

                {/* ── 의료진용 리포트 ── */}
                {reportType === 'medical' && (
                  <>
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
                      <button onClick={() => setReportType(null)} style={{ background:'none', border:'none', cursor:'pointer', padding:'4px 0', display:'flex', alignItems:'center', gap:4 }}>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke={dark?'#fff':'#000'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        <span style={{ fontFamily:'Pretendard', fontWeight:500, fontSize:13, color: dark?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.5)' }}>뒤로</span>
                      </button>
                      <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:14, color: dark?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.8)' }}>{REPORT_MONTH}</div>
                      <div style={{ width:50 }} />
                    </div>
                    <div style={{ fontFamily:'Pretendard', fontWeight:800, fontSize:20, color: dark?'#fff':'#000', letterSpacing:'-0.02em', marginBottom:6 }}>🏥 의료진용 리포트</div>
                    <div style={{ fontFamily:'Poppins', fontWeight:400, fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', color:C.red, marginBottom:20 }}>CLINICAL REPORT — {REPORT_MONTH}</div>

                    {/* Score section */}
                    <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color: dark?'rgba(255,255,255,0.8)':'rgba(0,0,0,0.7)', marginBottom:12, letterSpacing:'-0.01em' }}>월간 증상 평균 점수 (1–5점)</div>
                    <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:24 }}>
                      {MEDICAL_SCORES.map(item => (
                        <div key={item.label} style={{ borderRadius:14, padding:'12px 16px', background: dark?'rgba(255,255,255,0.04)':'#fff', border:`1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)'}` }}>
                          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                            <span style={{ fontFamily:'Pretendard', fontWeight:600, fontSize:13, color: dark?'rgba(255,255,255,0.8)':'rgba(0,0,0,0.75)' }}>{item.label}</span>
                            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                              <span style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:11, color: dark?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.45)' }}>{item.trend}</span>
                              <span style={{ fontFamily:'Pretendard', fontWeight:800, fontSize:17, color:item.color, letterSpacing:'-0.02em' }}>{item.score}</span>
                            </div>
                          </div>
                          {/* score bar */}
                          <div style={{ height:6, borderRadius:3, background: dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)', overflow:'hidden' }}>
                            <div style={{ height:'100%', width:`${(item.score/5)*100}%`, borderRadius:3, background:`linear-gradient(90deg, ${item.color}99, ${item.color})`, transition:'width 0.5s' }} />
                          </div>
                          {/* 1-5 scale labels */}
                          <div style={{ display:'flex', justifyContent:'space-between', marginTop:4 }}>
                            {[1,2,3,4,5].map(n => (
                              <span key={n} style={{ fontFamily:'Pretendard', fontWeight:500, fontSize:10, color: dark?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.3)' }}>{n}</span>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* LLM 문진 요약 */}
                    <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color: dark?'rgba(255,255,255,0.8)':'rgba(0,0,0,0.7)', marginBottom:10, letterSpacing:'-0.01em' }}>AI 문진 분석 요약</div>
                    <div style={{ borderRadius:16, padding:'14px 16px', marginBottom:22, background: dark?'rgba(238,63,96,0.1)':'rgba(238,63,96,0.06)', border:`1px solid ${dark?'rgba(238,63,96,0.22)':'rgba(238,63,96,0.14)'}` }}>
                      <div style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:13, color: dark?'rgba(255,255,255,0.75)':'rgba(0,0,0,0.65)', lineHeight:1.7 }}>{MEDICAL_LLM}</div>
                    </div>

                    {/* Weight monthly summary */}
                    <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color: dark?'rgba(255,255,255,0.8)':'rgba(0,0,0,0.7)', marginBottom:10, letterSpacing:'-0.01em' }}>체중 월간 요약</div>
                    <div style={{ borderRadius:16, padding:'14px 16px', marginBottom:16, background: dark?'rgba(65,210,180,0.08)':'rgba(65,210,180,0.07)', border:`1px solid ${dark?'rgba(65,210,180,0.2)':'rgba(65,210,180,0.18)'}` }}>
                      <div style={{ display:'flex', gap:0 }}>
                        {[{label:'치료 전', val:'70.5 kg'},{label:'이번 달 평균', val:'68.0 kg'},{label:'총 감량', val:'−3.4 kg'}].map((item,i) => (
                          <div key={i} style={{ flex:1, textAlign:'center', borderRight: i<2 ? `1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)'}` : 'none' }}>
                            <div style={{ fontFamily:'Pretendard', fontWeight:800, fontSize:15, color:C.main, letterSpacing:'-0.02em', marginBottom:3 }}>{item.val}</div>
                            <div style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:11, color: dark?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.45)' }}>{item.label}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Diet monthly summary */}
                    <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color: dark?'rgba(255,255,255,0.8)':'rgba(0,0,0,0.7)', marginBottom:10, letterSpacing:'-0.01em' }}>식단 월간 요약</div>
                    <div style={{ borderRadius:16, padding:'14px 16px', marginBottom:16, background: dark?'rgba(125,80,240,0.08)':'rgba(125,80,240,0.06)', border:`1px solid ${dark?'rgba(125,80,240,0.2)':'rgba(125,80,240,0.14)'}` }}>
                      <div style={{ display:'flex', gap:0 }}>
                        {[{label:'일평균 칼로리', val:'469 kcal'},{label:'고칼로리 일수', val:'1일'},{label:'기록 완료', val:'13일'}].map((item,i) => (
                          <div key={i} style={{ flex:1, textAlign:'center', borderRight: i<2 ? `1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)'}` : 'none' }}>
                            <div style={{ fontFamily:'Pretendard', fontWeight:800, fontSize:15, color:C.purple, letterSpacing:'-0.02em', marginBottom:3 }}>{item.val}</div>
                            <div style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:11, color: dark?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.45)' }}>{item.label}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Exercise monthly summary */}
                    <div style={{ fontFamily:'Pretendard', fontWeight:700, fontSize:13, color: dark?'rgba(255,255,255,0.8)':'rgba(0,0,0,0.7)', marginBottom:10, letterSpacing:'-0.01em' }}>운동 월간 요약</div>
                    <div style={{ borderRadius:16, padding:'14px 16px', marginBottom:24, background: dark?'rgba(238,63,96,0.08)':'rgba(238,63,96,0.06)', border:`1px solid ${dark?'rgba(238,63,96,0.2)':'rgba(238,63,96,0.14)'}` }}>
                      <div style={{ display:'flex', gap:0 }}>
                        {[{label:'운동 완료', val:'11일'},{label:'총 소모 칼로리', val:'4,555 kcal'},{label:'평균 소모', val:'414 kcal'}].map((item,i) => (
                          <div key={i} style={{ flex:1, textAlign:'center', borderRight: i<2 ? `1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)'}` : 'none' }}>
                            <div style={{ fontFamily:'Pretendard', fontWeight:800, fontSize:15, color:C.red, letterSpacing:'-0.02em', marginBottom:3 }}>{item.val}</div>
                            <div style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:11, color: dark?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.45)' }}>{item.label}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <button onClick={closeSheet} style={{
                      width:'100%', height:54, borderRadius:16, border:'none', cursor:'pointer',
                      background:C.red, color:'#fff',
                      fontFamily:'Pretendard', fontWeight:800, fontSize:15, letterSpacing:'-0.01em',
                      boxShadow:'0 8px 22px rgba(238,63,96,0.35)',
                    }}>닫기</button>
                    <div style={{ height:20 }} />
                  </>
                )}
              </>
            ) : null
            }
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULT);

  return (
    <div data-screen-label="01 PRO Home" style={{
      minHeight: '100vh',
      background: tweaks.darkMode
        ? 'radial-gradient(ellipse at top, #0a1412 0%, #000 80%)'
        : 'radial-gradient(ellipse at top, #f3f6f5 0%, #e8ecea 100%)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '40px 0',
    }}>
      <IOSDevice width={402} height={874} dark={tweaks.darkMode}>
        <PROScreen tweaks={tweaks} setTweak={setTweak} />
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Symbol">
          <TweakRadio
            label="Variant"
            value={tweaks.variant}
            options={['aurora', 'liquid', 'plasma']}
            onChange={v => setTweak('variant', v)}
          />
          <TweakRadio
            label="State"
            value={tweaks.state}
            options={['idle', 'thinking', 'listening']}
            onChange={v => setTweak('state', v)}
          />
        </TweakSection>
        <TweakSection label="Theme">
          <TweakToggle label="Dark mode" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
        </TweakSection>
        <TweakSection label="Copy">
          <TweakText label="Greeting" value={tweaks.greeting} onChange={v => setTweak('greeting', v)} />
          <TweakText label="Subtitle" value={tweaks.subGreeting} onChange={v => setTweak('subGreeting', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
