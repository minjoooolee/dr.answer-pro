// ─── Mini sparkline (SVG) ───────────────────────────────────────
function Spark({ data, color = C.teal, w = 130, h = 40, fillBelow = true }) {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = w / (data.length - 1);
  const pts = data.map((v, i) => [i * step, h - ((v - min) / range) * (h - 8) - 4]);
  const path = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const area = `${path} L${w},${h} L0,${h} Z`;
  const gradId = `g${color.replace('#','')}`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <defs>
        <linearGradient id={gradId} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {fillBelow && <path d={area} fill={`url(#${gradId})`}/>}
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color}/>
    </svg>
  );
}

// ─── Live ECG-style ventilator waveform ─────────────────────────
function VentWave({ w = 320, h = 56, color = C.teal }) {
  // Pressure-cycle waveform (inspiration + expiration repeating)
  const cycles = 4;
  const cycleW = w / cycles;
  let d = `M0,${h - 6}`;
  for (let i = 0; i < cycles; i++) {
    const x0 = i * cycleW;
    d += ` L${x0 + cycleW*0.05},${h - 6}`;
    d += ` C${x0 + cycleW*0.10},${h*0.15} ${x0 + cycleW*0.30},${h*0.10} ${x0 + cycleW*0.42},${h*0.18}`;
    d += ` L${x0 + cycleW*0.55},${h*0.22}`;
    d += ` C${x0 + cycleW*0.62},${h*0.55} ${x0 + cycleW*0.75},${h - 8} ${x0 + cycleW*0.95},${h - 6}`;
  }
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <defs>
        <linearGradient id="ventfill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={`${d} L${w},${h} L0,${h} Z`} fill="url(#ventfill)"/>
      <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

          <span style={{
            display: 'inline-block', width: 7, height: 7, borderRadius: '50%',
            background: C.teal, animation: 'pulseDot 1.4s ease-in-out infinite',
          }}/>
          실시간
        </div>
      </div>

      {/* Live waveform */}
      <div style={{ padding: '0 16px 14px' }}>
        <div style={{
          background: C.card, borderRadius: 22, padding: '14px 16px 12px',
          boxShadow: '0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(15,17,21,0.04)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
            <span style={{ fontSize: 12.5, fontWeight: 600, color: C.ink }}>압력 파형 (cmH₂O)</span>
            <span style={{ fontSize: 11, color: C.mute, fontWeight: 500 }}>PIP 18 · PEEP 5</span>
            <span style={{
              marginLeft: 'auto', fontSize: 10.5, fontWeight: 700, letterSpacing: 0.6,
              color: C.teal, padding: '3px 7px', background: 'rgba(65,210,180,0.12)', borderRadius: 100,
            }}>정상</span>
          </div>
          <VentWave w={338} h={56} color={C.teal}/>
          <div style={{
            display: 'flex', justifyContent: 'space-between', fontSize: 10.5,
            color: C.mute2, fontWeight: 500, marginTop: 4,
          }}>
            <span>흡기</span><span>호기</span><span>흡기</span><span>호기</span>
          </div>
        </div>
      </div>

      {/* 2x grid */}
      <div style={{ padding: '0 16px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <StatTile
          icon={Icon.drop(15, C.red)}
          label="SpO₂"
          value="98"
          unit="%"
          sub="목표 ≥ 95% · 평균 97.4"
          chart={<Spark data={spo2} color={C.red} w={140} h={36}/>}
          status="ok"
        />
        <StatTile
          icon={Icon.lung(15, C.teal)}
          label="호흡수"
          value="28"
          unit="/min"
          sub="범위 24–32"
          chart={<Spark data={rr} color={C.teal} w={140} h={36}/>}
          status="ok"
        />
        <StatTile
          icon={Icon.gauge(15, C.purple)}
          label="분당환기량 MV"
          value="3.2"
          unit="L/min"
          sub="설정 모드: PC-SIMV"
          status="ok"
        />
        <StatTile
          icon={Icon.leak(15, C.amber)}
          label="누설량"
          value="6.4"
          unit="L/min"
          sub="허용 ≤ 10 L/min"
          status="ok"
        />
      </div>

      {/* Device status row */}
      <div style={{ padding: '12px 16px 0' }}>
        <div style={{
          background: C.card, borderRadius: 22, padding: '14px 16px',
          boxShadow: '0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(15,17,21,0.04)',
          display: 'flex', alignItems: 'center', gap: 14,
        }}>
          <div style={{
            width: 44, height: 44, borderRadius: 14,
            background: 'linear-gradient(135deg, rgba(65,210,180,0.15), rgba(65,210,180,0.04))',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            {Icon.battery(22, C.teal)}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12.5, color: C.mute, fontWeight: 500 }}>Trilogy EV300 · 연결됨</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.ink, marginTop: 1, letterSpacing: -0.3 }}>
              배터리 82% · AC 전원
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 11, color: C.mute2, fontWeight: 500 }}>예상 백업</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.ink }}>4시간 20분</div>
          </div>
        </div>
      </div>

      {/* AI Insights */}
      <div style={{
        padding: '22px 22px 10px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div style={{ fontSize: 17, fontWeight: 700, color: C.ink, letterSpacing: -0.4 }}>
          AI 인사이트
        </div>
        <span style={{ fontSize: 12.5, color: C.mute, fontWeight: 500 }}>이번 주</span>
      </div>

      <div style={{ padding: '0 16px 8px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        <InsightRow
          tone="ok"
          title="야간 무호흡 에피소드 감소"
          desc="지난주 대비 –42%. 측위 조정 효과로 분석돼요."
        />
        <InsightRow
          tone="warn"
          title="오후 누설량이 점진 증가"
          desc="14–18시 누설 평균 8.1 L/min. 마스크 핏 점검을 권장해요."
        />
        <InsightRow
          tone="info"
          title="다음 외래 진료까지 12일"
          desc="이비인후과 김민서 교수 · 5월 24일 10:30"
        />
      </div>

      {/* Spacer for bottom nav */}
      <div style={{ height: 24 }}/>
    </div>
  );
}

function InsightRow({ tone = 'ok', title, desc }) {
  const palette = {
    ok:   { bg: 'rgba(65,210,180,0.10)',  bd: 'rgba(65,210,180,0.20)',  dot: C.teal,   ic: '✓' },
    warn: { bg: 'rgba(255,178,74,0.12)',  bd: 'rgba(255,178,74,0.22)',  dot: C.amber,  ic: '!' },
    info: { bg: 'rgba(125,80,240,0.10)',  bd: 'rgba(125,80,240,0.18)',  dot: C.purple, ic: 'i' },
  }[tone];
  return (
    <div style={{
      background: C.card, borderRadius: 18, padding: '12px 14px',
      display: 'flex', alignItems: 'flex-start', gap: 12,
      boxShadow: '0 1px 2px rgba(0,0,0,0.03), 0 6px 18px rgba(15,17,21,0.03)',
    }}>
      <div style={{
        width: 32, height: 32, borderRadius: 10, flexShrink: 0,
        background: palette.bg, border: `1px solid ${palette.bd}`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: palette.dot, fontWeight: 800, fontSize: 13,
      }}>{palette.ic}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.ink, letterSpacing: -0.3 }}>{title}</div>
        <div style={{ fontSize: 12.5, color: C.mute, marginTop: 2, lineHeight: 1.45 }}>{desc}</div>
      </div>
      <svg width="8" height="14" viewBox="0 0 8 14" style={{ marginTop: 12 }}>
        <path d="M1 1l6 6-6 6" stroke={C.mute2} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
}

// ─── Bottom Tab Bar ─────────────────────────────────────────────
function TabBar() {
  const item = (icon, label, active) => (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
      opacity: active ? 1 : 0.5,
    }}>
      {icon}
      <div style={{ fontSize: 10, fontWeight: 600, color: C.ink, letterSpacing: -0.1 }}>{label}</div>
    </div>
  );
  return (
    <div style={{
      position: 'absolute', left: 16, right: 16, bottom: 26,
      height: 70, borderRadius: 36,
      background: 'rgba(255,255,255,0.85)',
      backdropFilter: 'blur(20px) saturate(180%)',
      WebkitBackdropFilter: 'blur(20px) saturate(180%)',
      boxShadow: '0 10px 30px rgba(15,17,21,0.10), 0 0 0 0.5px rgba(0,0,0,0.05)',
      display: 'flex', alignItems: 'center', padding: '0 14px', gap: 6, zIndex: 40,
    }}>
      {item(Icon.home(22, C.ink), '홈', true)}
      {item(Icon.chart(22, C.ink), '추세', false)}
      {/* Center AI button */}
      <div style={{ flex: 1.2, display: 'flex', justifyContent: 'center' }}>
        <button style={{
          height: 50, padding: '0 18px', border: 0, borderRadius: 100,
          background: 'linear-gradient(135deg, #7d50f0 0%, #4ec9fb 100%)',
          color: '#fff', fontFamily: 'inherit', fontWeight: 700, fontSize: 13,
          letterSpacing: -0.2, display: 'flex', alignItems: 'center', gap: 7,
          boxShadow: '0 8px 22px rgba(125,80,240,0.45)',
        }}>
          {Icon.sparkle(16, '#fff')}
          LUMI에게 묻기
        </button>
      </div>
      {item(Icon.bell(22, C.ink), '알림', false)}
      {item(Icon.user(22, C.ink), '내정보', false)}
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────
function App() {
  return (
    <IOSDevice>
      <Home/>
      <TabBar/>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
