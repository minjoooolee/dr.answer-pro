/* ───────── 색상 토큰 (reference mock 매칭) ───────── */
const C = {

  chrome:    '#2E2F33',      // 헤더·사이드바 차콜
  chromeAct: '#43444A',      // 사이드바 active 강조
  chromeMute:'rgba(255,255,255,0.7)',
  surface:   '#FFFFFF',      // 카드·패널 흰색
  border:    '#E2E6E5',
  borderSoft:'#ECEFEE',
  text:      '#1A1D26',
  textSub:   '#6E7280',
  textMute:  '#A0A6B1',
  primary:   '#1E1F4B',      // 진료 저장 — 거의 검정에 가까운 짙은 네이비
  primarySoft:'#EDEFFB',
  accent:    '#4F5BE0',      // 선택/하이라이트 인디고

/* ───────── 아이콘 (사이드바 등) ───────── */
const Icon = ({ name, size = 22, color = 'currentColor' }) => {
  const props = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'mic': return (<svg {...props}><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0014 0"/><path d="M12 18v3"/></svg>);
    case 'cal': return (<svg {...props}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>);
    case 'user': return (<svg {...props}><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>);
    case 'list': return (<svg {...props}><path d="M4 6h16M4 12h16M4 18h16"/></svg>);
    case 'doc':  return (<svg {...props}><path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 3v5h5"/></svg>);
    case 'colon':  return (
      <svg {...props} strokeWidth="1.6">
        {/* 외곽선 — Π 프레임 따라 동글동글한 haustra outline, 내부는 비어있음(fill 없음) */}
        {/* 상부(횡행결장) 외측 불룩 - 5 bumps 위로 */}
        <path d="M3.5 8
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0
                 a1.75 1.75 0 0 1 3 0"/>
        {/* 우측(상행결장) 외측 불룩 - 3 bumps 오른쪽으로 */}
        <path d="M21.5 8
                 a1.75 1.75 0 0 1 0 3
                 a1.75 1.75 0 0 1 0 3
                 a1.75 1.75 0 0 1 0 3"/>
        {/* 맹장 곡선 + 충수 튜브 */}
        <path d="M21.5 17c0 2-1 3-2.5 3 l 0 3"/>
        {/* S상결장 - 우→좌 물결 */}
        <path d="M19 20
                 c-1.3 0-1.7-1.3-3-1.3
                 c-1.3 0-1.7 1.3-3 1.3
                 c-1.3 0-1.7-1.3-3-1.3
                 c-1.3 0-1.7 1.3-3 1.3"/>
        {/* 직장 튜브 */}
        <path d="M7 20 v 3"/>
        {/* 좌측(하행결장) 외측 불룩 - 3 bumps 왼쪽으로 */}
        <path d="M2.5 17
                 a1.75 1.75 0 0 1 0 -3
                 a1.75 1.75 0 0 1 0 -3
                 a1.75 1.75 0 0 1 0 -3"/>
      </svg>
    );
    case 'stomach': return (
      <svg {...props} strokeWidth="1.7">
        {/* 식도 — 좌측에 위로 열린 긴 튜브 */}
        <path d="M9 2 v 6"/>
        <path d="M11.5 2 v 5"/>
        {/* 위 본체 outline (좌우 반전: fundus 우측, pylorus 좌측) */}
        <path d="M11.5 7
                 c1 .8 2 1.2 3 1.2
                 c3 0 5 1.8 5.5 4.5
                 c .5 3 -1 6 -4 7
                 c -3 1 -7 .5 -9 -1.5
                 c -2 -2 -2.5 -5 -1 -7
                 c 1 -1.3 2.5 -1.7 4 -1.7"/>
        {/* 분문 곡선 (식도→위 입구) */}
        <path d="M9 8 c .5 1 1.7 1.5 2.5 .5"/>
        {/* 십이지장 — 좌측 아래로 긴 튜브 */}
        <path d="M5.5 16
                 c -1 1.5 -.5 3.5 1 4
                 c 1 .3 1.7 -.5 1 -1.5"/>
      </svg>
    );
    case 'lung':   return (
      <svg {...props} strokeWidth="1.7">
        {/* 기관(trachea) — 위로 열린 튜브 */}
        <path d="M11 2 v 6"/>
        <path d="M13 2 v 6"/>
        {/* 기관 분기부 — 양쪽으로 더 벌어짐 (gap 확대) */}
        <path d="M11 8 L 8.5 10.5"/>
        <path d="M13 8 L 15.5 10.5"/>
        {/* 좌측 폐 — 내측 edge x=10 (이전 11.5 → gap 확대) */}
        <path d="M8.5 10.5
                 c-3 .8 -5.5 3.5 -6 7
                 c-.4 2.5 .8 4.5 3 4.5
                 h4.5
                 c.6 0 1 -.5 1 -1.2
                 V 11.5
                 c0 -.6 -.4 -1 -1 -1
                 z"/>
        {/* 우측 폐 — 내측 edge x=14 */}
        <path d="M15.5 10.5
                 c3 .8 5.5 3.5 6 7
                 c.4 2.5 -.8 4.5 -3 4.5
                 h-4.5
                 c-.6 0 -1 -.5 -1 -1.2
                 V 11.5
                 c0 -.6 .4 -1 1 -1
                 z"/>
      </svg>
    );
    case 'gear': return (<svg {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3h0a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8v0a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>);
    case 'phone':return (<svg {...props}><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg>);
    case 'link': return (<svg {...props}><path d="M10 14a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1"/><path d="M14 10a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>);
    case 'cal2': return (<svg {...props}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>);
    case 'search':return (<svg {...props}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>);
    case 'chevL':return (<svg {...props}><path d="M15 6l-6 6 6 6"/></svg>);
    case 'chevR':return (<svg {...props}><path d="M9 6l6 6-6 6"/></svg>);
    case 'chevD':return (<svg {...props}><path d="M6 9l6 6 6-6"/></svg>);
    case 'copy': return (<svg {...props}><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V6a2 2 0 012-2h10"/></svg>);
    case 'star': return (<svg {...props}><path d="M12 3l2.7 5.5L20.5 9.4l-4.3 4.2 1 6L12 16.8 6.8 19.6l1-6-4.3-4.2 5.8-.9z"/></svg>);
    case 'starF':return (<svg width="18" height="18" viewBox="0 0 24 24" fill={C.accent}><path d="M12 3l2.7 5.5L20.5 9.4l-4.3 4.2 1 6L12 16.8 6.8 19.6l1-6-4.3-4.2 5.8-.9z"/></svg>);
    case 'check':return (<svg {...props} strokeWidth="3"><path d="M5 12l5 5 9-10"/></svg>);
    case 'refresh':return (<svg {...props}><path d="M21 12a9 9 0 11-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>);
    case 'x':    return (<svg {...props}><path d="M6 6l12 12M18 6L6 18"/></svg>);
    case 'edit': return (<svg {...props}><path d="M4 20h4l10-10-4-4L4 16v4z"/></svg>);
    case 'note': return (<svg {...props}><path d="M4 4h12l4 4v12H4z"/><path d="M16 4v4h4"/></svg>);
    case 'send': return (<svg {...props}><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>);
    case 'inbox':return (<svg {...props}><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 6h13a1 1 0 0 1 .9.6L22 12v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6L4.6 6.6A1 1 0 0 1 5.5 6z"/></svg>);
    case 'expand': return (
      <svg {...props}>
        {/* 우상단 대각선 화살표 (밖으로) */}
        <path d="M14 10L20 4"/>
        <path d="M15 4h5v5"/>
        {/* 좌하단 대각선 화살표 (밖으로) */}
        <path d="M10 14L4 20"/>
        <path d="M9 20H4v-5"/>
      </svg>
    );
    case 'collapse': return (
      <svg {...props}>
        {/* 우상단 → 안쪽으로 향하는 화살표 */}
        <path d="M20 4L14 10"/>
        <path d="M14 5v5h5"/>
        {/* 좌하단 → 안쪽으로 향하는 화살표 */}
        <path d="M4 20L10 14"/>
        <path d="M10 19v-5H5"/>
      </svg>
    );
    default: return null;
  }
};

/* ───────── 로고 ───────── */
const Logo = () => (
  <div style={{
    width: 72, height: 60,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    color: '#fff', fontWeight: 800, letterSpacing: 0.2,

    <div style={{ fontSize: 14, fontWeight: 800 }}>닥터앤서</div>
  </div>
);

/* ───────── 상단 헤더 ───────── */
function Header() {
  const tab = (label) => (
    <button style={{
      padding: '0 4px', height: 60, fontSize: 15, fontWeight: 700,
      color: '#fff', position: 'relative',
    }}>
      {label}
      <div style={{ position:'absolute', left:0, right:0, bottom:-1, height:2, background: '#fff', borderRadius: 2 }}/>
    </button>
  );
  const navItem = (iconName, label) => (
    <button style={{ display:'flex', alignItems:'center', gap:6, padding:'0 12px', height:60, fontSize:13.5, color:'#fff', fontWeight:500 }}>
      <Icon name={iconName} size={17} color="#fff"/> {label}
    </button>
  );
  return (
    <header style={{
      height: 60, background: C.chrome,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      paddingRight: 16, flexShrink: 0,
    }}>
      <div style={{ display:'flex', alignItems:'center', gap: 24 }}>
        <Logo/>
        <div style={{ display:'flex', alignItems:'center', gap: 24, marginLeft: 4 }}>
          {tab('진료')}
          <div style={{ width:1, height:18, background:'rgba(255,255,255,0.3)' }}/>
          <span style={{ fontSize: 14, color: 'rgba(255,255,255,0.85)', fontWeight: 500 }}>대장항문외과 이예나 교수님</span>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'center' }}>
        {navItem('search','환자검색')}
      </div>
    </header>
  );
}

/* ───────── 좌측 사이드바 ───────── */
function Sidebar() {
  const items = [
    { icon:'colon',   label:'대장암',   active: true },
    { icon:'stomach', label:'위암'   },
    { icon:'lung',    label:'호흡부전' },
  ];
  return (
    <aside style={{
      width: 84, background: C.chrome,
      display:'flex', flexDirection:'column', alignItems:'center',
      padding: '14px 0', flexShrink: 0,
    }}>
      {items.map((it, i) => (
        <button key={i} style={{
          width: 68, padding: '12px 0', marginBottom: 6,
          display:'flex', flexDirection:'column', alignItems:'center', gap:6,
          color: it.active ? '#fff' : 'rgba(255,255,255,0.7)',
          fontSize: 13, fontWeight: it.active ? 700 : 500,
          borderRadius: 10, background: it.active ? C.chromeAct : 'transparent',
        }}>
          <Icon name={it.icon} size={24}/>
          <span>{it.label}</span>
        </button>
      ))}
      <div style={{ flex: 1 }}/>
      <button style={{
        width: 68, padding: '12px 0',
        display:'flex', flexDirection:'column', alignItems:'center', gap:6,
        color: 'rgba(255,255,255,0.7)', fontSize: 13, fontWeight: 500,
      }}>
        <Icon name="gear" size={22}/>
        <span>설정</span>
      </button>
    </aside>
  );
}

const STATUS_STYLES = {

  '대기':         { bg:'#EEF0F3', fg:'#6E7280' },
  '진료보류':     { bg:'#22253A', fg:'#fff' },
  '템플릿 발송 완료': { bg:'#EEF0F3', fg:'#6E7280' },
};
function StatusBadge({ label }) {
  const s = STATUS_STYLES[label] || { bg: C.graySoft, fg: C.gray };
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', height: 22, padding:'0 8px',
      borderRadius: 4, background: s.bg, color: s.fg,
      fontSize: 11, fontWeight: 600,
    }}>{label}</span>
  );
}
function PatientCard({ p, selected, onClick }) {
  return (
    <button onClick={onClick} style={{
      width:'100%', textAlign:'left',
      background: C.surface, border: `1.5px solid ${selected ? C.accent : C.border}`,
      borderRadius: 10, padding: '12px 14px', marginBottom: 8,
      boxShadow: selected ? '0 0 0 3px rgba(84,104,255,0.08)' : 'none',
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>
          {p.name} <span style={{ fontSize:12, color: C.textSub, fontWeight: 500, marginLeft:4 }}>
            {p.id} · {p.gender}/{p.age}세
          </span>
        </div>
      </div>
      <div style={{ fontSize: 12, color: C.textSub, marginTop: 4 }}>오전 {p.time}</div>
      <div style={{ display:'flex', gap: 5, marginTop: 8 }}>
        {p.tags.map((t, i) => <StatusBadge key={i} label={t}/>)}
      </div>
    </button>
  );
}

/* ───────── 재발률 예측 스코어 카드 (꺾은선 그래프) ───────── */
function RecurrenceChart({ points }) {
  const W = 560, H = 130;
  const PAD = { top: 12, right: 24, bottom: 24, left: 36 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;
  const yMax = 100;

  const xToPx = (i, n) => n <= 1
    ? PAD.left + innerW / 2
    : PAD.left + (i / (n - 1)) * innerW;
  const yToPx = (v) => PAD.top + innerH * (1 - v / yMax);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'auto', display:'block' }}>
      {/* y-grid */}
      {[0, 25, 50, 75, 100].map(v => (
        <g key={v}>
          <line x1={PAD.left} x2={W - PAD.right} y1={yToPx(v)} y2={yToPx(v)}
                stroke={C.borderSoft} strokeWidth="1"/>
          <text x={PAD.left - 8} y={yToPx(v) + 4} textAnchor="end"
                fontSize="11" fill={C.textSub} fontFamily="Pretendard">{v}</text>
        </g>
      ))}
      {/* baseline */}
      <line x1={PAD.left} x2={W - PAD.right} y1={yToPx(0)} y2={yToPx(0)}
            stroke={C.border} strokeWidth="1"/>
      {/* line */}
      {points.length > 1 && (
        <polyline
          fill="none" stroke={C.accent} strokeWidth="2.5"
          strokeLinejoin="round" strokeLinecap="round"
          points={points.map((p, i) => `${xToPx(i, points.length)},${yToPx(p.score)}`).join(' ')}
        />
      )}
      {/* dots + labels + x-axis ticks */}
      {points.map((p, i) => {
        const x = xToPx(i, points.length);
        const y = yToPx(p.score);
        return (
          <g key={i}>
            <circle cx={x} cy={y} r="6" fill="#fff" stroke={C.accent} strokeWidth="2.5"/>
            <text x={x} y={y - 14} textAnchor="middle" fontSize="12" fontWeight="700"
                  fill={C.text} fontFamily="Pretendard">{p.score}</text>
            <text x={x} y={H - PAD.bottom + 18} textAnchor="middle" fontSize="11"
                  fill={C.textSub} fontFamily="Pretendard">{p.date}</text>
          </g>
        );
      })}
    </svg>
  );
}

    weight: '주 3회', bp: '매일', pain: '매일', diet: '매일', exercise: '매일',
    daily:  { '통증': true, '메스꺼움': true, '설사': true, '변비': false, '피로': true },
    weekly: { '손발 저림': true, '식욕': true, '수면': true },
    painThreshold: 7,
  },
  triage: {
    redFever: true, redFeverTemp: 38.5,
    redBlood: true, redAbdominalPain: true, redConsciousness: true,
    yellowFever: true, yellowFeverTemp: 38.0,
    yellowDiarrhea: true, yellowDiarrheaFreq: 6,
    yellowDehydration: true,
  },
  next: {
    checkDate: '2026.04.10',
    nextVisit: '2026.05.15',
    metrics: {
      '재발률 예측 스코어': true,
      '체중 변화': true,
      '통증 패턴': true,
      '운동량 (걸음수)': true,
      '식이 순응도': false,

};

/* ─── EMR 보조 컴포넌트들 ─── */
const REGIMENS = [
  'FOLFOX',
  'FOLFIRI',
  'FOLFOXIRI',
  'CAPOX (XELOX)',
  'Capecitabine 단독',
  '5-FU + Leucovorin',
  'FOLFOX + Bevacizumab',
  'FOLFIRI + Cetuximab',
];
const EMR_SECTIONS = [
  { k:'basic',   l:'기본 정보' },
  { k:'tests',   l:'검사 기록지 결과' },
  { k:'chemo',   l:'항암 치료 정보' },
  { k:'surgery', l:'수술 이력' },
];

function KVGrid({ items, cols = 2 }) {
  return (
    <div style={{
      display:'grid', gridTemplateColumns: `repeat(${cols}, 1fr)`,
      columnGap: 18, rowGap: 10,
    }}>
      {items.map(([k, v], i) => (
        <div key={i} style={{ display:'flex', gap: 8, fontSize: 13, alignItems:'baseline' }}>
          <div style={{ width: 84, color: C.textSub, flexShrink: 0 }}>{k}</div>
          <div style={{ color: C.text, fontWeight: 500, flex: 1 }}>{v}</div>
        </div>
      ))}
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap: 12, marginBottom: 12 }}>
      <div style={{ width: 110, fontSize: 12.5, color: C.textSub, flexShrink: 0 }}>{label}</div>
      <div style={{ flex: 1 }}>{children}</div>
    </div>
  );
}

function Select({ value, options, onChange }) {
  return (
    <div style={{ position:'relative' }}>
      <select value={value} onChange={(e) => onChange(e.target.value)}
        style={{
          width: '100%', height: 36, padding: '0 32px 0 12px',
          borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface,
          fontSize: 13, color: C.text, fontFamily: 'inherit',
          appearance: 'none', WebkitAppearance: 'none', MozAppearance: 'none',
          cursor: 'pointer',
        }}>
        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
      </select>
      <div style={{ position:'absolute', right: 10, top: '50%', transform:'translateY(-50%)', pointerEvents:'none', color: C.textSub }}>
        <Icon name="chevD" size={14}/>
      </div>
    </div>
  );
}

function TextInput({ value, onChange, placeholder, width }) {
  return (
    <input value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
      style={{
        width: width || '100%', height: 36, padding: '0 12px',
        borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface,
        fontSize: 13, color: C.text, outline: 'none', boxSizing:'border-box',
      }}/>
  );
}

function TestRow({ test, open, onToggle }) {
  return (
    <div style={{
      border: `1px solid ${C.border}`, borderRadius: 10,
      marginBottom: 8, background: C.surface, overflow:'hidden',
    }}>
      <button onClick={onToggle} style={{
        width:'100%', padding: '12px 14px', textAlign:'left',
        display:'flex', alignItems:'center', justifyContent:'space-between', gap: 10,
        background: open ? C.bg : C.surface,
      }}>
        <div style={{ display:'flex', flexDirection:'column', gap: 2, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.text,
                        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {test.name}
          </div>
          <div style={{ fontSize: 12, color: C.textSub,
                        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {test.summary}
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap: 8, flexShrink: 0 }}>
          <div style={{ fontSize: 11.5, color: C.textSub }}>{test.date}</div>
          <div style={{ color: C.textSub, transform: open ? 'rotate(180deg)' : 'none', display:'flex' }}>
            <Icon name="chevD" size={14}/>
          </div>
        </div>
      </button>
      {open && (
        <div style={{ padding: '12px 14px', borderTop: `1px solid ${C.borderSoft}` }}>
          <ul style={{ margin: 0, padding: '0 0 0 16px', fontSize: 12.5, color: C.text, lineHeight: 1.7 }}>
            {test.detail.map((d, i) => <li key={i} style={{ marginBottom: 2 }}>{d}</li>)}
          </ul>
        </div>
      )}
    </div>
  );
}

function EMRPanel({ emr }) {
  const [section, setSection] = useState('basic');
  const [openTest, setOpenTest] = useState(0);
  const [chemo, setChemo] = useState(emr ? emr.chemo : null);

  if (!emr) {
    return (
      <div style={{
        flex: 1, display:'flex', alignItems:'center', justifyContent:'center',
        padding: 24, color: C.textSub, fontSize: 13,
      }}>
        등록된 치료 정보가 없습니다.
      </div>
    );
  }

  const content = (() => {
    if (section === 'basic') {
      return (
        <KVGrid cols={2} items={[
          ['신장', emr.basic.height],
          ['체중', emr.basic.weight],
          ['BMI',  emr.basic.bmi],
          ['혈압', emr.basic.bp],
          ['맥박', emr.basic.pulse],
          ['ECOG', emr.basic.ecog],
        ]}/>
      );
    }
    if (section === 'tests') {
      return (
        <div>
          {emr.tests.map((t, i) => (
            <TestRow key={i} test={t} open={openTest === i}
              onToggle={() => setOpenTest(openTest === i ? -1 : i)}/>
          ))}
        </div>
      );
    }
    if (section === 'chemo') {
      return (
        <div>
          <Field label="레지멘">
            <Select value={chemo.regimen} options={REGIMENS}
              onChange={(v) => setChemo({ ...chemo, regimen: v })}/>
          </Field>
          <Field label="치료 차수">
            <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
              <TextInput value={String(chemo.cycleNum)} width={80}
                onChange={(v) => setChemo({ ...chemo, cycleNum: v.replace(/\D/g, '') })}/>
              <span style={{ fontSize: 13, color: C.textSub }}>/</span>
              <TextInput value={String(chemo.cycleTotal)} width={80}
                onChange={(v) => setChemo({ ...chemo, cycleTotal: v.replace(/\D/g, '') })}/>
              <span style={{ fontSize: 13, color: C.textSub }}>주기</span>
            </div>
          </Field>
          <Field label="이번 주기 시작일">
            <TextInput value={chemo.lastStartDate} placeholder="YYYY.MM.DD"
              onChange={(v) => setChemo({ ...chemo, lastStartDate: v })} width={180}/>
          </Field>
          <Field label="치료 유형">
            <Select value={chemo.adjuvant ? '보조 화학요법 (Adjuvant)' : '완화 화학요법 (Palliative)'}
              options={['보조 화학요법 (Adjuvant)', '완화 화학요법 (Palliative)', '선행 화학요법 (Neoadjuvant)']}
              onChange={(v) => setChemo({ ...chemo, adjuvant: v.includes('보조') })}/>
          </Field>
          <Field label="비고">
            <TextInput value={chemo.note || ''} placeholder="메모"
              onChange={(v) => setChemo({ ...chemo, note: v })}/>
          </Field>
        </div>
      );
    }
    if (section === 'surgery') {
      return (
        <KVGrid cols={1} items={[
          ['수술일',    emr.surgery.date],
          ['수술 방법', emr.surgery.method],
          ['집도의',    emr.surgery.surgeon],
          ['병기',      emr.surgery.stage],
        ]}/>
      );
    }
    return null;
  })();

  const sectionLabel = EMR_SECTIONS.find(s => s.k === section).l;

  return (
    <div style={{ flex: 1, display:'flex', minHeight: 0, borderTop: `1px solid ${C.borderSoft}` }}>
      {/* 좌측 섹션 사이드바 */}
      <div className="scroll" style={{
        width: 168, overflowY:'auto',
        borderRight: `1px solid ${C.borderSoft}`, padding: '6px 0',
      }}>
        {EMR_SECTIONS.map(s => {
          const active = section === s.k;
          return (
            <button key={s.k} onClick={() => setSection(s.k)} style={{
              width:'100%', textAlign:'left',
              padding: '10px 16px', fontSize: 13,
              color: active ? C.text : C.textSub,
              fontWeight: active ? 700 : 500,
              background: active ? C.bg : 'transparent',
              borderLeft: active ? `3px solid ${C.text}` : '3px solid transparent',
            }}>{s.l}</button>
          );
        })}
      </div>
      {/* 우측 콘텐츠 */}
      <div className="scroll" style={{ flex: 1, minWidth: 0, overflowY:'auto', padding: '16px 20px 20px' }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>
          {sectionLabel}
        </div>
        {content}
      </div>
    </div>
  );
}

/* ─── 재택 관리 플랜 helpers ─── */
function NumberInput({ value, onChange, width = 64 }) {
  return (
    <input type="text" inputMode="decimal" value={value}
      onChange={(e) => onChange(e.target.value.replace(/[^\d.]/g, ''))}
      style={{
        width, height: 32, padding: '0 8px',
        borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface,
        fontSize: 13, color: C.text, outline: 'none', textAlign:'center',
        fontFamily: 'inherit', boxSizing:'border-box',
      }}/>
  );
}
function CheckBox({ checked, onChange, label }) {
  return (
    <label onClick={() => onChange(!checked)} style={{
      display:'inline-flex', alignItems:'center', gap: 6, cursor:'pointer',
      fontSize: 13, color: C.text, padding: '4px 0',
    }}>
      <span style={{
        width: 16, height: 16, borderRadius: 4,
        background: checked ? C.accent : C.surface,
        border: `1.5px solid ${checked ? C.accent : '#C7CCD6'}`,
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        flexShrink: 0,
      }}>
        {checked && <Icon name="check" size={10} color="#fff"/>}
      </span>
      {label}
    </label>
  );
}
function Segment({ options, value, onChange }) {
  return (
    <div style={{
      display:'inline-flex', background: '#FAFBFC',
      border: `1px solid ${C.border}`, borderRadius: 8, padding: 2,
    }}>
      {options.map(opt => {
        const active = opt === value;
        return (
          <button key={opt} onClick={() => onChange(opt)} style={{
            padding: '6px 12px', borderRadius: 6,
            background: active ? C.surface : 'transparent',
            color: active ? C.text : C.textSub,
            fontSize: 12.5, fontWeight: active ? 700 : 500,
            border: active ? `1px solid ${C.border}` : '1px solid transparent',
            boxShadow: active ? '0 1px 2px rgba(0,0,0,0.04)' : 'none',
          }}>{opt}</button>
        );
      })}
    </div>
  );
}
function Textarea({ value, onChange, placeholder }) {
  return (
    <textarea value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
      style={{
        width:'100%', minHeight: 60, padding: '10px 12px',
        borderRadius: 8, border: `1px solid ${C.border}`, background: C.surface,
        fontSize: 13, color: C.text, outline: 'none',
        fontFamily: 'inherit', resize: 'vertical', boxSizing:'border-box',
      }}/>
  );
}
function SectionTitle({ children, color }) {
  return (
    <div style={{
      display:'flex', alignItems:'center', gap: 8,
      fontSize: 14, fontWeight: 700, color: C.text,
      marginTop: 20, marginBottom: 12, paddingBottom: 6,
      borderBottom: `2px solid ${color || C.accent}`,
    }}>
      <span style={{ width: 4, height: 14, borderRadius: 2, background: color || C.accent }}/>
      {children}
    </div>
  );
}
function SubHeader({ children, color }) {
  return (
    <div style={{
      fontSize: 12, fontWeight: 700, color: color || C.textSub,
      letterSpacing: 0.2, marginTop: 12, marginBottom: 6,
    }}>
      {children}
    </div>
  );
}
function InlineHint({ children }) {
  return <span style={{ fontSize: 13, color: C.textSub, marginLeft: 6 }}>{children}</span>;
}

/* ─── 섹션 컴포넌트 ─── */
function DietSection({ d, set }) {
  return (
    <div>
      <SubHeader>권장</SubHeader>
      <Field label="과일·채소">
        <NumberInput value={d.fruitsVeg} onChange={(v) => set({ ...d, fruitsVeg: v })}/>
        <InlineHint>servings/일 이상</InlineHint>
      </Field>
      <Field label="식이섬유">
        <NumberInput value={d.fiber} onChange={(v) => set({ ...d, fiber: v })}/>
        <InlineHint>g/일 이상</InlineHint>
      </Field>

      <SubHeader>제한</SubHeader>
      <Field label="가공육">
        <InlineHint>주</InlineHint>
        <NumberInput value={d.processedMeat} onChange={(v) => set({ ...d, processedMeat: v })}/>
        <InlineHint>회 이하</InlineHint>
      </Field>
      <Field label="붉은 육류">
        <InlineHint>주</InlineHint>
        <NumberInput value={d.redMeat} onChange={(v) => set({ ...d, redMeat: v })}/>
        <InlineHint>회 이하</InlineHint>
      </Field>
      <Field label="튀김 · 패스트푸드">
        <InlineHint>주</InlineHint>
        <NumberInput value={d.fried} onChange={(v) => set({ ...d, fried: v })}/>
        <InlineHint>회 이하</InlineHint>
      </Field>
      <Field label="가당 음료">
        <InlineHint>일</InlineHint>
        <NumberInput value={d.sugary} onChange={(v) => set({ ...d, sugary: v })}/>
        <InlineHint>잔 이하</InlineHint>
      </Field>

      <SubHeader>알코올 · 수분</SubHeader>
      <Field label="알코올">
        <Segment options={['금주', '절제 (주 2잔 이하)', '자유']}
          value={d.alcohol} onChange={(v) => set({ ...d, alcohol: v })}/>
      </Field>
      <Field label="수분">
        <NumberInput value={d.water} onChange={(v) => set({ ...d, water: v })}/>
        <InlineHint>L/일 이상</InlineHint>
      </Field>

      <SubHeader>맞춤 메모</SubHeader>
      <Textarea value={d.note} onChange={(v) => set({ ...d, note: v })}
        placeholder='예) "장루 환자라 ○○ 주의"'/>
    </div>
  );
}

function ExerciseSection({ e, set }) {
  return (
    <div>
      <Field label="F · 빈도">
        <InlineHint>주</InlineHint>
        <NumberInput value={e.freq} onChange={(v) => set({ ...e, freq: v })}/>
        <InlineHint>회</InlineHint>
      </Field>
      <Field label="I · 강도">
        <Segment options={['저강도', '중강도', '고강도']}
          value={e.intensity} onChange={(v) => set({ ...e, intensity: v })}/>
      </Field>
      <Field label="T · 시간">
        <NumberInput value={e.timePerSession} onChange={(v) => set({ ...e, timePerSession: v })}/>
        <InlineHint>분/회 · 주</InlineHint>
        <NumberInput value={e.timePerWeek} onChange={(v) => set({ ...e, timePerWeek: v })}/>
        <InlineHint>분</InlineHint>
      </Field>
      <Field label="T · 종류">
        <div style={{ display:'flex', alignItems:'center', gap: 14, flexWrap:'wrap' }}>
          <CheckBox checked={e.aerobic} onChange={(v) => set({ ...e, aerobic: v })} label="유산소"/>
          <CheckBox checked={e.strength} onChange={(v) => set({ ...e, strength: v })} label="근력"/>
          {e.strength && (
            <span style={{ display:'inline-flex', alignItems:'center', gap: 6 }}>
              <InlineHint>근력 주</InlineHint>
              <NumberInput value={e.strengthFreq} onChange={(v) => set({ ...e, strengthFreq: v })}/>
              <InlineHint>회</InlineHint>
            </span>
          )}
        </div>
      </Field>
      <Field label="단계적 진행">
        <CheckBox checked={e.progressive} onChange={(v) => set({ ...e, progressive: v })}
          label="수술 후 회복기 첫 2주 저강도"/>
      </Field>
    </div>
  );
}

function MeasureSection({ m, set }) {
  const freqRow = (key, label) => (
    <Field label={label}>
      <Select value={m[key]} options={FREQ_OPTIONS}
        onChange={(v) => set({ ...m, [key]: v })}/>
    </Field>
  );
  const togDaily = (k) => set({ ...m, daily: { ...m.daily, [k]: !m.daily[k] } });
  const togWeek  = (k) => set({ ...m, weekly: { ...m.weekly, [k]: !m.weekly[k] } });

  return (
    <div>
      <SubHeader>측정 주기</SubHeader>
      {freqRow('weight',   '체중')}
      {freqRow('bp',       '혈압')}
      {freqRow('pain',     '통증 NRS')}
      {freqRow('diet',     '식단')}
      {freqRow('exercise', '운동')}

      <SubHeader>증상 모니터링 (PRO-CTCAE)</SubHeader>
      <Field label="매일 체크">
        <div style={{ display:'flex', gap: 14, flexWrap:'wrap' }}>
          {PRO_DAILY.map(it => (
            <CheckBox key={it} checked={!!m.daily[it]} onChange={() => togDaily(it)} label={it}/>
          ))}
        </div>
      </Field>
      <Field label="주 1회 체크">
        <div style={{ display:'flex', gap: 14, flexWrap:'wrap' }}>
          {PRO_WEEKLY.map(it => (
            <CheckBox key={it} checked={!!m.weekly[it]} onChange={() => togWeek(it)} label={it}/>
          ))}
        </div>
      </Field>
      <Field label="통증 임계값">
        <NumberInput value={m.painThreshold} onChange={(v) => set({ ...m, painThreshold: v })}/>
        <InlineHint>NRS 이상 시 자동 알람</InlineHint>
      </Field>
    </div>
  );
}

      display:'inline-flex', alignItems:'center', height: 22, padding: '0 10px',

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap: 8, marginTop: 8, marginBottom: 6 }}>
        <Tag color="#D63A3A" bg="#FBE6E6">RED</Tag>
        <div style={{ fontSize: 12.5, color: C.textSub }}>즉시 응급실 — 트리거 시 즉시 알림</div>
      </div>
      <Field label="발열">
        <CheckBox checked={t.redFever} onChange={(v) => set({ ...t, redFever: v })} label="발열 이상"/>

          <InlineHint>≥</InlineHint>
          <NumberInput value={t.redFeverTemp} onChange={(v) => set({ ...t, redFeverTemp: v })}/>

      </Field>
      <Field label="기타">
        <div style={{ display:'flex', gap: 14, flexWrap:'wrap' }}>
          <CheckBox checked={t.redBlood}         onChange={(v) => set({ ...t, redBlood: v })}         label="혈변"/>
          <CheckBox checked={t.redAbdominalPain} onChange={(v) => set({ ...t, redAbdominalPain: v })} label="심한 복통"/>
          <CheckBox checked={t.redConsciousness} onChange={(v) => set({ ...t, redConsciousness: v })} label="의식 변화"/>
        </div>
      </Field>

      <div style={{ display:'flex', alignItems:'center', gap: 8, marginTop: 18, marginBottom: 6 }}>
        <Tag color="#D08221" bg="#FFF1DC">YELLOW</Tag>
        <div style={{ fontSize: 12.5, color: C.textSub }}>24시간 내 외래 연락</div>
      </div>
      <Field label="발열">
        <CheckBox checked={t.yellowFever} onChange={(v) => set({ ...t, yellowFever: v })} label="발열 이상"/>
        <span style={{ marginLeft: 12, display:'inline-flex', alignItems:'center', gap: 6 }}>
          <InlineHint>≥</InlineHint>
          <NumberInput value={t.yellowFeverTemp} onChange={(v) => set({ ...t, yellowFeverTemp: v })}/>
          <InlineHint>°C</InlineHint>
        </span>
      </Field>
      <Field label="설사">
        <CheckBox checked={t.yellowDiarrhea} onChange={(v) => set({ ...t, yellowDiarrhea: v })} label="설사 빈도 이상"/>
        <span style={{ marginLeft: 12, display:'inline-flex', alignItems:'center', gap: 6 }}>
          <InlineHint>≥</InlineHint>
          <NumberInput value={t.yellowDiarrheaFreq} onChange={(v) => set({ ...t, yellowDiarrheaFreq: v })}/>
          <InlineHint>회/일</InlineHint>
        </span>
      </Field>
      <Field label="기타">
        <CheckBox checked={t.yellowDehydration} onChange={(v) => set({ ...t, yellowDehydration: v })}
          label="수분 섭취 불가"/>
      </Field>

      <div style={{ display:'flex', alignItems:'center', gap: 8, marginTop: 18, marginBottom: 6 }}>
        <Tag color="#16A769" bg="#E7F6EE">GREEN</Tag>
        <div style={{ fontSize: 12.5, color: C.textSub }}>경미한 변화 — 다음 외래 시 보고</div>
      </div>
    </div>
  );
}

function NextVisitSection({ n, set }) {
  const toggle = (k) => set({ ...n, metrics: { ...n.metrics, [k]: !n.metrics[k] } });
  return (
    <div>
      <Field label="중간 점검일">
        <TextInput value={n.checkDate} placeholder="YYYY.MM.DD" width={180}
          onChange={(v) => set({ ...n, checkDate: v })}/>
        <InlineHint>(앱 푸시 알림)</InlineHint>
      </Field>
      <Field label="다음 외래일">
        <TextInput value={n.nextVisit} placeholder="YYYY.MM.DD" width={180}
          onChange={(v) => set({ ...n, nextVisit: v })}/>
      </Field>
      <SubHeader>재평가 시 확인할 지표</SubHeader>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap: 6 }}>
        {NEXT_METRICS.map(it => (
          <CheckBox key={it} checked={!!n.metrics[it]} onChange={() => toggle(it)} label={it}/>
        ))}
      </div>
    </div>
  );
}

function PlanPanel() {
  const [section, setSection] = useState('all');
  const [plan, setPlan] = useState(DEFAULT_PLAN);

  const sectionsRender = {
    diet:     <DietSection      d={plan.diet}     set={(d) => setPlan({ ...plan, diet: d })}/>,
    exercise: <ExerciseSection  e={plan.exercise} set={(e) => setPlan({ ...plan, exercise: e })}/>,
    measure:  <MeasureSection   m={plan.measure}  set={(m) => setPlan({ ...plan, measure: m })}/>,
    triage:   <TriageSection    t={plan.triage}   set={(t) => setPlan({ ...plan, triage: t })}/>,
    next:     <NextVisitSection n={plan.next}     set={(n) => setPlan({ ...plan, next: n })}/>,
  };

  return (
    <div style={{ flex: 1, display:'flex', minHeight: 0, borderTop: `1px solid ${C.borderSoft}` }}>
      {/* 좌측 섹션 사이드바 */}
      <div className="scroll" style={{
        width: 168, overflowY:'auto',
        borderRight: `1px solid ${C.borderSoft}`, padding: '6px 0',
      }}>
        {PLAN_SECTIONS.map(s => {
          const active = section === s.k;
          return (
            <button key={s.k} onClick={() => setSection(s.k)} style={{
              width:'100%', textAlign:'left',
              padding: '10px 16px', fontSize: 13,
              color: active ? C.text : C.textSub,
              fontWeight: active ? 700 : 500,
              background: active ? C.bg : 'transparent',
              borderLeft: active ? `3px solid ${C.text}` : '3px solid transparent',
            }}>{s.l}</button>
          );
        })}
      </div>
      {/* 우측 콘텐츠 */}
      <div className="scroll" style={{ flex: 1, minWidth: 0, overflowY:'auto', padding: '14px 22px 20px' }}>
        {section === 'all' ? (
          <>
            <SectionTitle>식이 처방 (Diet Rx)</SectionTitle>{sectionsRender.diet}
            <SectionTitle>운동 처방 (FITT)</SectionTitle>{sectionsRender.exercise}
            <SectionTitle>자기 측정 처방</SectionTitle>{sectionsRender.measure}
            <SectionTitle>트리아제 트리거</SectionTitle>{sectionsRender.triage}
            <SectionTitle>다음 외래 일정</SectionTitle>{sectionsRender.next}
          </>
        ) : (
          <>
            <SectionTitle>
              {PLAN_SECTIONS.find(s => s.k === section).l}
            </SectionTitle>
            {sectionsRender[section]}
          </>
        )}
      </div>
    </div>
  );
}

function RightPanel({ patient }) {
  const [tab, setTab] = useState('emr');           // 'emr' | 'plan'

  return (
    <section style={{
      flex: 1, minWidth: 0, background: C.surface,
      borderRadius: 12, border: `1px solid ${C.border}`,
      display:'flex', flexDirection:'column', overflow:'hidden',
    }}>
      {/* 탭 */}
      <div style={{ display:'flex', borderBottom: `1px solid ${C.border}`, padding: '0 20px' }}>
        {[
          { k:'emr',  l:'환자 치료 정보 (EMR)' },
          { k:'plan', l:'재택 관리 플랜 생성' },
        ].map(t => {
          const active = tab === t.k;
          return (
            <button key={t.k} onClick={() => setTab(t.k)} style={{
              height: 50, padding: '0 18px',
              fontSize: 14, fontWeight: active ? 700 : 500,
              color: active ? C.text : C.textSub,
              borderBottom: active ? `2px solid ${C.text}` : '2px solid transparent',
            }}>{t.l}</button>
          );
        })}
      </div>

      {tab === 'emr' ? <EMRPanel emr={patient.emr}/> : <PlanPanel/>}

      {/* 하단 액션 바 */}
      <div style={{ borderTop: `1px solid ${C.border}`, padding: '12px 20px',
                    display:'flex', justifyContent:'flex-end' }}>
        <button style={{
          display:'flex', alignItems:'center', gap: 8,
          height: 42, padding: '0 24px', borderRadius: 8,
          background: C.primary, color: '#fff',
          fontSize: 14, fontWeight: 700,
        }}>
          <Icon name="send" size={14} color="#fff"/> 환자 앱으로 내보내기
        </button>
      </div>
    </section>
  );
}

/* ───────── App ───────── */
function App() {
  const [selectedIdx, setSelectedIdx] = useState(0);
  const patient = PATIENTS[selectedIdx];

  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column' }}>
      <Header/>
      <div style={{ flex:1, display:'flex', minHeight: 0, background: C.chrome }}>
        <Sidebar/>
        <div style={{
          flex:1, display:'flex', gap: 10, padding: 10,
          background: C.bg, minHeight: 0,
        }}>
          <PatientList selectedIdx={selectedIdx} setSelectedIdx={setSelectedIdx}/>
          <CenterPanel patient={patient}/>
          <RightPanel patient={patient}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
