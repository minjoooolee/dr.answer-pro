<title>닥터앤서 PRO Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
  body {
    font-family: 'Pretendard', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #f3f6f5;
  }
  input::placeholder { color: rgba(0,0,0,0.35); }

  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes radarPulse {
    0%   { transform: scale(0.6); opacity: 0.55; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.35); opacity: 0.55; }
  }

    0%   { transform: scale(0.85); opacity: 0.55; }
    100% { transform: scale(1.25); opacity: 0; }
  }
  @keyframes aiBreathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  @keyframes aiHeart {
    0%, 100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.6; }
    50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }
  @keyframes aiRotate {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes aiRotateRev {
    0%   { transform: rotate(360deg); }
    100% { transform: rotate(0deg); }
  }
  @keyframes aiShimmer {
    0%, 100% { opacity: 0.55; transform: rotate(0deg) scale(1); }
    50%      { opacity: 0.9;  transform: rotate(180deg) scale(1.05); }
  }
  @keyframes aiBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }
  @keyframes alertBlink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  @keyframes aiWave {
    0%, 100% { height: 30%; }
    50%      { height: 90%; }
  }
  @keyframes blobA {
    0%, 100% { transform: translate(0%, 0%) scale(1); }
    33%      { transform: translate(-12%, 8%) scale(1.18); }
    66%      { transform: translate(8%, -10%) scale(0.92); }
  }
  @keyframes blobB {
    0%, 100% { transform: translate(0%, 0%) scale(1); }
    50%      { transform: translate(14%, -6%) scale(1.12); }
  }
  @keyframes blobC {
    0%, 100% { transform: translate(0%, 0%) scale(1); }
    40%      { transform: translate(-10%, -8%) scale(1.2); }
    80%      { transform: translate(6%, 10%) scale(0.9); }
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes slideInRight {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }
</style>
</head>

<div id="root"></div>

<script type="text/babel">
// iOS device frame — Simplified iOS 26 (Liquid Glass)
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: 'Pretendard, system-ui, sans-serif', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: 'Pretendard, system-ui, sans-serif',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: dark ? '#fff' : '#000', letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: 'Pretendard, system-ui, sans-serif', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: 'Pretendard, system-ui, sans-serif', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSDevice({ children, width = 402, height = 874, dark = false, title, keyboard = false }) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: 'Pretendard, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
      </div>
      {/* home indicator */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

Object.assign(window, { IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow });
</script>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined'
      ? new ResizeObserver(clampToViewport)
      : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value}
                onChange={(e) => onChange(options.find(o => String(typeof o === 'object' ? o.value : o) === e.target.value) ?? e.target.value)}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakToggle, TweakRadio, TweakText,
});
</script>

function WeightChart({ data, dark, accent = '#41d2b4' }) {
  const w = 320, h = 160;
  const pad = { top: 26, right: 16, bottom: 32, left: 16 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  const values = data.map(d => d.value);
  const min = Math.min(...values) - 0.6;
  const max = Math.max(...values) + 0.6;
  const range = max - min || 1;
  const points = data.map((d, i) => ({
    x: pad.left + (i / Math.max(1, data.length - 1)) * cw,
    y: pad.top + ch - ((d.value - min) / range) * ch,
    ...d,
  }));
  const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const last = points[points.length - 1];
  const first = points[0];
  const areaPath = `${path} L ${last.x} ${pad.top + ch} L ${first.x} ${pad.top + ch} Z`;

  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none"
         style={{ display: 'block' }}>
      <defs>
        <linearGradient id="wgtGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={accent} stopOpacity="0.28" />
          <stop offset="100%" stopColor={accent} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill="url(#wgtGrad)" />
      <path d={path} fill="none" stroke={accent} strokeWidth="2.5"
            strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => (
        <g key={i}>
          <circle cx={p.x} cy={p.y} r="4" fill={dark ? '#0d1614' : '#fff'}

            {r.star && <span style={{ color: C_red, fontSize:10, marginLeft:2 }}>★</span>}
          </td>
          {visibleValues.map((v, vi) => (
            <td key={vi} style={{ height:42, textAlign:'center', verticalAlign:'middle', borderRight: vi < visibleValues.length - 1 ? `1px solid ${rowBorderColor}` : 'none' }}>
              {renderTableCell(v, r.type, dark)}
            </td>
          ))}
        </tr>
      );
    });
  });

  const btnStyle = (disabled) => ({
    width:28, height:28, borderRadius:'50%', border:'none', cursor: disabled ? 'default' : 'pointer',
    background: disabled ? (dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)') : (dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.08)'),
    display:'flex', alignItems:'center', justifyContent:'center', padding:0, flexShrink:0,
  });

  return (
    <>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'flex-end', gap:6, marginBottom:6 }}>
        <span style={{ fontFamily:'Pretendard', fontSize:11, color: subColor }}>
          {page * PAGE_SIZE + 1}–{Math.min(page * PAGE_SIZE + PAGE_SIZE, MEDICAL_TABLE_DATES.length)}일 / 전체 {MEDICAL_TABLE_DATES.length}일
        </span>
        <button style={btnStyle(page === 0)} disabled={page === 0} onClick={() => setPage(p => p - 1)}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke={dark?'#fff':'#000'} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <button style={btnStyle(page === totalPages - 1)} disabled={page === totalPages - 1} onClick={() => setPage(p => p + 1)}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke={dark?'#fff':'#000'} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      </div>
      <table style={{
        width:'100%', tableLayout:'fixed', borderCollapse:'collapse',
        marginBottom:24, borderRadius:12, overflow:'hidden',
        border:`1px solid ${borderColor}`,
        background: dark ? '#152120' : '#fafbfb',
        fontFamily:'Pretendard',
      }}>
        <thead>
          <tr style={{ background: headerBg, borderBottom:`1px solid ${borderColor}` }}>
            <th style={{ width:76, padding:'8px', fontWeight:700, fontSize:11.5, color: textColor, borderRight:`1px solid ${borderColor}`, textAlign:'left' }}>증상</th>
            {visibleDates.map((d, di) => (
              <th key={di} style={{ padding:'6px 0', textAlign:'center', borderRight: di < visibleDates.length - 1 ? `1px solid ${rowBorderColor}` : 'none', fontWeight:400 }}>
                <div style={{ fontWeight:700, fontSize:10.5, color: textColor }}>{d.d}</div>
                <div style={{ fontFamily: 'Pretendard', fontWeight:600, fontSize:8.5, color: subColor, marginTop:1 }}>{d.cycle}</div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>{bodyRows}</tbody>
      </table>
    </>
  );
}

                    <div style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:10, color:dark?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.35)', textAlign:'center', marginTop:14, lineHeight:1.5 }}>
                      ※ 임상시험 참여는 담당 의료진과 상의 후 결정해주세요.
                    </div>
                    <div style={{ height:24 }} />
                  </>
                )}
              </>
            ) : activeTag === '이상증세' ? (
              <>
                <div style={{ fontFamily: 'Pretendard', fontWeight:400, fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', color:C.red, marginBottom:8 }}>SIDE EFFECTS</div>
                <div style={{ fontFamily:'Pretendard', fontWeight:800, fontSize:22, color:dark?'#fff':'#000', letterSpacing:'-0.02em', marginBottom:6 }}>외래일에 주치의에게 보고하기</div>
                <div style={{ fontFamily:'Pretendard', fontWeight:400, fontSize:13, color:dark?'rgba(255,255,255,0.55)':'rgba(0,0,0,0.5)', lineHeight:1.6, marginBottom:22 }}>
                  통증·발열·메스꺼움 등 이상증세를 사진·동영상과 함께 기록해두면 다음 외래 진료 때 의료진과 빠르게 공유할 수 있어요.
                </div>

                {/* 날짜·시간 */}
                <div style={{ display:'flex', gap:10, marginBottom:18 }}>
                  <div style={{ flex:1 }}>
                    <label style={{ display:'block', fontFamily:'Pretendard', fontWeight:600, fontSize:11, color:dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.55)', marginBottom:6, letterSpacing:'-0.01em' }}>📅 발생 날짜</label>
                    <input type="date" value={symptomDate} onChange={e => setSymptomDate(e.target.value)}
                      style={{ width:'100%', height:46, padding:'0 14px', borderRadius:12, border:`1px solid ${dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.1)'}`, background:dark?'rgba(255,255,255,0.04)':'#fff', fontFamily:'Pretendard', fontWeight:600, fontSize:13, color:dark?'#fff':'#000', outline:'none' }}
                    />
                  </div>
                  <div style={{ flex:1 }}>
                    <label style={{ display:'block', fontFamily:'Pretendard', fontWeight:600, fontSize:11, color:dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.55)', marginBottom:6, letterSpacing:'-0.01em' }}>⏰ 시간</label>
                    <input type="time" value={symptomTime} onChange={e => setSymptomTime(e.target.value)}
                      style={{ width:'100%', height:46, padding:'0 14px', borderRadius:12, border:`1px solid ${dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.1)'}`, background:dark?'rgba(255,255,255,0.04)':'#fff', fontFamily:'Pretendard', fontWeight:600, fontSize:13, color:dark?'#fff':'#000', outline:'none' }}
                    />
                  </div>
                </div>

                {/* 사진/영상 */}
                <label style={{ display:'block', fontFamily:'Pretendard', fontWeight:600, fontSize:11, color:dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.55)', marginBottom:8, letterSpacing:'-0.01em' }}>📷 사진·동영상 첨부</label>
                <div style={{ display:'flex', gap:8, marginBottom:8 }}>
                  <label style={{ flex:1, height:80, borderRadius:14, border:`1.5px dashed ${dark?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.15)'}`, background:dark?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.015)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:4, cursor:'pointer' }}>
                    <span style={{ fontSize:22 }}>📸</span>
                    <span style={{ fontFamily:'Pretendard', fontWeight:600, fontSize:11, color:dark?'rgba(255,255,255,0.65)':'rgba(0,0,0,0.6)' }}>촬영하기</span>
                    <input type="file" accept="image/*,video/*" capture="environment" style={{ display:'none' }} onChange={e => {
                      const f = e.target.files[0]; if (f) setSymptomMedia([...symptomMedia, { type: f.type.startsWith('video') ? 'video' : 'image', name: f.name, url: URL.createObjectURL(f) }]);
                    }} />
                  </label>
                  <label style={{ flex:1, height:80, borderRadius:14, border:`1.5px dashed ${dark?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.15)'}`, background:dark?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.015)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:4, cursor:'pointer' }}>
                    <span style={{ fontSize:22 }}>🖼️</span>
                    <span style={{ fontFamily:'Pretendard', fontWeight:600, fontSize:11, color:dark?'rgba(255,255,255,0.65)':'rgba(0,0,0,0.6)' }}>업로드</span>
                    <input type="file" accept="image/*,video/*" multiple style={{ display:'none' }} onChange={e => {
                      const fs = Array.from(e.target.files).map(f => ({ type: f.type.startsWith('video') ? 'video' : 'image', name: f.name, url: URL.createObjectURL(f) }));
                      setSymptomMedia([...symptomMedia, ...fs]);
                    }} />
                  </label>
                </div>
                {symptomMedia.length > 0 && (
                  <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:18 }}>
                    {symptomMedia.map((m, i) => (
                      <div key={i} style={{ position:'relative', width:64, height:64, borderRadius:10, overflow:'hidden', border:`1px solid ${dark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.08)'}`, background:dark?'rgba(255,255,255,0.05)':'#f5f5f5' }}>
                        {m.type === 'image'
                          ? <img src={m.url} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                          : <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24 }}>🎬</div>}
                        <button onClick={() => setSymptomMedia(symptomMedia.filter((_,j) => j !== i))} style={{
                          position:'absolute', top:2, right:2, width:18, height:18, borderRadius:'50%', border:'none', background:'rgba(0,0,0,0.6)', color:'#fff', fontSize:11, cursor:'pointer', padding:0, lineHeight:1,
                        }}>×</button>
                      </div>
                    ))}
                  </div>
                )}
                {symptomMedia.length === 0 && <div style={{ height:18 }} />}

                {/* 증상 텍스트 */}
                <label style={{ display:'block', fontFamily:'Pretendard', fontWeight:600, fontSize:11, color:dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.55)', marginBottom:8, letterSpacing:'-0.01em' }}>📝 증상 내용</label>
                <textarea
                  value={symptomText}
                  onChange={e => setSymptomText(e.target.value)}
                  placeholder="언제부터, 어디에, 어떤 증상이 어느 정도로 나타났는지 자세히 적어주세요. 예) 어제 저녁부터 양쪽 손끝이 저리고 차갑게 느껴짐. 통증 점수 4/10."
                  style={{
                    width:'100%', minHeight:130, padding:'14px 16px', borderRadius:14,
                    border:`1px solid ${symptomText?C.red:(dark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.1)')}`,
                    background:dark?'rgba(255,255,255,0.04)':'#fff',
                    fontFamily:'Pretendard', fontWeight:500, fontSize:13, color:dark?'#fff':'#000',
                    lineHeight:1.6, outline:'none', resize:'vertical', marginBottom:22, transition:'border-color 0.15s',
                  }}
                />

                <button
                  onClick={() => {
                    if (!symptomText) return;
                    setSymptomLog([{ id:Date.now(), date:symptomDate, time:symptomTime, text:symptomText, media:symptomMedia }, ...symptomLog]);
                    setSymptomText('');
                    setSymptomMedia([]);
                  }}
                  disabled={!symptomText}
                  style={{
                    width:'100%', height:56, minHeight:56, flexShrink:0, borderRadius:8, border:'none',
                    cursor:symptomText?'pointer':'not-allowed',
                    background: symptomText
                      ? `linear-gradient(135deg, ${C.main} 0%, ${C.purple} 100%)`
                      : (dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)'),
                    color: symptomText ? '#fff' : (dark?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.3)'),
                    fontFamily:'Pretendard', fontWeight:600, fontSize:14, letterSpacing:'-0.01em',
                    boxShadow: symptomText
                      ? `0 10px 24px ${dark?'rgba(74,159,143,0.35)':'rgba(74,159,143,0.25)'}, 0 2px 6px rgba(0,0,0,0.06)`
                      : 'none',
                    display:'flex', alignItems:'center', justifyContent:'center', gap:8,
                    transition:'all 0.2s ease',
                  }}
                >
                  <span style={{ fontSize:14 }}>✓</span>
                  <span>기록 저장하기</span>
                </button>

                {/* 누적된 기록 */}
                <div style={{ marginTop:32, paddingTop:24, borderTop:`1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)'}` }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
                    <div style={{ fontFamily:'Pretendard', fontWeight:800, fontSize:15, color:dark?'#fff':'#000', letterSpacing:'-0.01em' }}>지난 기록</div>
                    <div style={{ fontFamily: 'Pretendard', fontWeight:600, fontSize:11, color:dark?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.45)', letterSpacing:'0.06em' }}>{symptomLog.length} ENTRIES</div>
                  </div>
                  {symptomLog.length === 0 ? (
                    <div style={{ padding:'24px 0', textAlign:'center', fontFamily:'Pretendard', fontWeight:500, fontSize:13, color:dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.35)' }}>아직 기록된 이상증세가 없어요.</div>
                  ) : (
                    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                      {symptomLog.map(it => (
                        <div key={it.id}
                          onClick={() => setSelectedSymptom(it)}
                          style={{
                            padding:'14px 16px', borderRadius:14, cursor:'pointer',
                            background:dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.025)',
                            border:`1px solid ${dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)'}`,
                            transition:'transform 0.15s, background 0.15s',
                          }}
                          onMouseEnter={e => e.currentTarget.style.background = dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.045)'}
                          onMouseLeave={e => e.currentTarget.style.background = dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.025)'}
                        >
                          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                            <span style={{ width:6, height:6, borderRadius:'50%', background:C.red }} />
                            <span style={{ fontFamily: 'Pretendard', fontWeight:600, fontSize:11, color:C.red, letterSpacing:'0.04em' }}>
                              {it.date.replaceAll('-','.')} · {it.time}
                            </span>
                          </div>
                          <div style={{ fontFamily:'Pretendard', fontWeight:500, fontSize:13, color:dark?'rgba(255,255,255,0.85)':'rgba(0,0,0,0.78)', lineHeight:1.55, letterSpacing:'-0.01em' }}>{it.text}</div>
                          {it.media && it.media.length > 0 && (
                            <div style={{ display:'flex', gap:6, marginTop:10, flexWrap:'wrap' }}>
                              {it.media.map((m,i) => (
                                <div key={i} style={{ width:48, height:48, borderRadius:8, overflow:'hidden', border:`1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)'}` }}>
                                  {m.type === 'image'
                                    ? <img src={m.url} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                                    : <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, background:dark?'rgba(255,255,255,0.05)':'#f5f5f5' }}>🎬</div>}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ height:16 }} />
              </>
            ) : null
            }
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Auth color palette ────────────────────────────────────────────
const AC = {
  bg: '#f8f9fa', ink: '#0e1116', ink2: '#4b5563', mute: 'rgba(14,17,22,0.45)',
  accent: '#7d50f0', ok: '#2bb673', card: '#fff', line: 'rgba(14,17,22,0.08)',
  border: 'rgba(14,17,22,0.10)',
};

const AuthWrap = ({ children, top }) => (
  <div style={{
    width: '100%', minHeight: '100%', display: 'flex', flexDirection: 'column',
    background: AC.bg, color: AC.ink,
    paddingTop: 64, paddingBottom: 28,
  }}>
    {top}
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '0 22px' }}>
      {children}
    </div>
  </div>
);

const AuthStepHeader = ({ progress, onBack }) => (
  <div style={{ padding: '4px 22px 14px' }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
      {onBack && (
        <button onClick={onBack} style={{
          background: 'none', border: 'none', cursor: 'pointer', padding: 2, display: 'inline-flex',
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M15 6l-6 6 6 6" stroke={AC.ink} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      )}
      <div style={{ flex: 1, height: 4, background: 'rgba(14,17,22,0.08)', borderRadius: 4, overflow: 'hidden' }}>
        <div style={{
          width: `${progress * 100}%`, height: '100%', background: AC.accent,
          borderRadius: 4, transition: 'width 0.35s ease',
        }}/>
      </div>
    </div>
  </div>
);

const AuthTitle = ({ children, sub }) => (
  <div style={{ marginBottom: 24 }}>
    <div style={{ fontSize: 22, fontWeight: 800, color: AC.ink, letterSpacing: -0.6, lineHeight: 1.25 }}>
      {children}
    </div>
    {sub && (
      <div style={{ fontSize: 13, color: AC.mute, fontWeight: 500, marginTop: 6, letterSpacing: -0.1, lineHeight: 1.5 }}>
        {sub}
      </div>
    )}
  </div>
);

const AuthField = ({ label, children, hint }) => (
  <div style={{ marginBottom: 16 }}>
    <div style={{ fontSize: 11.5, fontWeight: 700, color: AC.mute, letterSpacing: 0.8, marginBottom: 8, textTransform: 'uppercase' }}>
      {label}
    </div>
    {children}
    {hint && (
      <div style={{ fontSize: 11.5, color: AC.mute, marginTop: 6, letterSpacing: -0.1 }}>{hint}</div>
    )}
  </div>
);

const authInputBox = {
  width: '100%', padding: '14px 16px', fontSize: 15, fontWeight: 600,
  color: AC.ink, letterSpacing: -0.3,
  background: '#fff', border: '1px solid rgba(14,17,22,0.10)',
  borderRadius: 14, outline: 'none', fontFamily: 'inherit', boxSizing: 'border-box',
};

const AuthCTA = ({ onClick, disabled, children, variant = 'primary' }) => {
  const styles = {
    primary:   { bg: AC.accent, fg: '#fff' },
    secondary: { bg: 'rgba(14,17,22,0.04)', fg: AC.ink, border: '1px solid rgba(14,17,22,0.10)' },
  }[variant];
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width: '100%', padding: '16px 0', borderRadius: 16,
      border: styles.border || 0, cursor: disabled ? 'not-allowed' : 'pointer',
      background: styles.bg, color: styles.fg, opacity: disabled ? 0.35 : 1,
      fontSize: 14.5, fontWeight: 700, letterSpacing: -0.3,
      boxShadow: variant === 'primary' && !disabled ? `0 6px 18px ${AC.accent}44` : 'none',
    }}>{children}</button>
  );
};

function Auth({ onComplete }) {
  // welcome → phone → verify → patient-code → hospital → done
  const [step, setStep] = React.useState('welcome');
  const [mode, setMode] = React.useState('signup');
  const [phone, setPhone] = React.useState('');
  const [otp, setOtp] = React.useState('');
  const [patientCode, setPatientCode] = React.useState('');

  // ── WELCOME ──────────────────────────────────────────────────────
  if (step === 'welcome') {
    return (
      <div style={{
        width: '100%', minHeight: '100%', display: 'flex', flexDirection: 'column',
        background: '#0D0F14', color: '#fff',
        padding: '90px 28px 32px',
      }}>
        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 28 }}>
          <img src="ai-orb.svg" alt="" style={{ width: 72, height: 72, borderRadius: '50%' }} />
        </div>
        <div style={{ textAlign: 'center', marginBottom: 'auto' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.55)', letterSpacing: 2, textTransform: 'uppercase', marginBottom: 12 }}>
            Dr.Answer PRO Companion
          </div>
          <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.8, lineHeight: 1.25 }}>
            대장암 환자를 위한<br/>AI 주치의
          </div>
          <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.55)', marginTop: 14, lineHeight: 1.55, letterSpacing: -0.1 }}>
            매일의 증상과 컨디션을 기록하고<br/>의료진과 함께 치료를 관리해요.
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 32 }}>
          <button onClick={() => { setMode('signup'); setStep('phone'); }} style={{
            width: '100%', padding: '16px 0', borderRadius: 16, border: 0, cursor: 'pointer',
            background: '#fff', color: AC.ink, fontSize: 14.5, fontWeight: 700, letterSpacing: -0.3,
          }}>새로 시작하기</button>
          <button onClick={onComplete} style={{
            width: '100%', padding: '14px 0', background: 'transparent', border: 0, cursor: 'pointer',
            color: 'rgba(255,255,255,0.75)', fontSize: 13, fontWeight: 600, letterSpacing: -0.2,
          }}>이미 계정이 있어요</button>
        </div>
      </div>
    );
  }

  // ── PHONE ─────────────────────────────────────────────────────────
  if (step === 'phone') {
    const formatted = phone.replace(/[^0-9]/g, '').slice(0, 11);
    const disp = formatted.replace(/^(\d{3})(\d{0,4})(\d{0,4}).*/, (m,a,b,c) => [a,b,c].filter(Boolean).join('-'));
    const valid = formatted.length >= 10;
    return (
      <AuthWrap top={<AuthStepHeader progress={mode === 'login' ? 0.5 : 0.2} onBack={() => setStep('welcome')}/>}>
        <AuthTitle sub={mode === 'login' ? '로그인을 위해 번호를 입력해 주세요.' : '본인 인증을 위해 사용해요. 개인정보는 암호화 저장됩니다.'}>
          {mode === 'login' ? '로그인' : '휴대폰 번호로\n시작하기'}
        </AuthTitle>
        <AuthField label="휴대폰 번호">
          <input
            value={disp}
            onChange={e => setPhone(e.target.value)}
            placeholder="010-0000-0000"
            inputMode="numeric"
            style={authInputBox}
          />
        </AuthField>
        <div style={{ flex: 1 }}/>
        <AuthCTA disabled={!valid} onClick={() => setStep('verify')}>인증번호 받기</AuthCTA>
      </AuthWrap>
    );
  }

  // ── VERIFY (OTP) ──────────────────────────────────────────────────
  if (step === 'verify') {
    const valid = otp.length === 6;
    const formattedPhone = phone.replace(/[^0-9]/g,'').replace(/^(\d{3})(\d{4})(\d{4}).*/, '$1-$2-$3');
    return (
      <AuthWrap top={<AuthStepHeader progress={mode === 'login' ? 0.85 : 0.4} onBack={() => setStep('phone')}/>}>
        <AuthTitle sub={`${formattedPhone}로 전송한 6자리 코드를 입력해 주세요.`}>
          인증번호를 입력해 주세요
        </AuthTitle>
        <AuthField label="인증번호" hint="문자가 오지 않으면 1분 후 재요청할 수 있어요.">
          <input
            value={otp}
            onChange={e => setOtp(e.target.value.replace(/[^0-9]/g,'').slice(0,6))}
            placeholder="123456"
            inputMode="numeric"
            style={{ ...authInputBox, letterSpacing: 8, textAlign: 'center', fontWeight: 800, fontSize: 22 }}
          />
        </AuthField>
        <div style={{ flex: 1 }}/>
        <AuthCTA disabled={!valid} onClick={() => {
          if (mode === 'login') { onComplete(); }
          else { setStep('patient-code'); }
        }}>{mode === 'login' ? '로그인' : '인증 완료 · 계속'}</AuthCTA>
      </AuthWrap>
    );
  }

  // ── PATIENT CODE ──────────────────────────────────────────────────
  if (step === 'patient-code') {
    const cleaned = patientCode.replace(/[^A-Za-z0-9]/g,'').slice(0,8).toUpperCase();
    const valid = cleaned.length >= 6;
    return (
      <AuthWrap top={<AuthStepHeader progress={0.6} onBack={() => setStep('verify')}/>}>
        <AuthTitle sub="병원에서 받으신 환자 등록 코드를 입력하면 처방 정보가 자동으로 불러와져요.">
          환자 코드를 입력해 주세요
        </AuthTitle>
        <AuthField label="환자 코드" hint="외래 진료 시 발급된 카드에서 확인할 수 있어요.">
          <input
            value={cleaned}
            onChange={e => setPatientCode(e.target.value)}
            placeholder="예: MJ5K28"
            style={{ ...authInputBox, letterSpacing: 6, textAlign: 'center', fontWeight: 800, fontSize: 20, textTransform: 'uppercase' }}
          />
        </AuthField>
        <div style={{
          background: `rgba(125,80,240,0.06)`, borderRadius: 14, padding: '12px 14px',
          display: 'flex', gap: 10, alignItems: 'flex-start', marginTop: 4,
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{ marginTop: 1, flexShrink: 0 }}>
            <circle cx="12" cy="12" r="9" stroke={AC.accent} strokeWidth="1.6"/>
            <path d="M12 8v5M12 16v.5" stroke={AC.accent} strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
          <div style={{ fontSize: 12, color: AC.ink2, lineHeight: 1.55, letterSpacing: -0.1 }}>
            코드가 없으신가요? 담당 의료진에게 문의하시면 발급받으실 수 있어요.
          </div>
        </div>
        <div style={{ flex: 1 }}/>
        <AuthCTA disabled={!valid} onClick={() => setStep('hospital')}>진료 정보 불러오기</AuthCTA>
      </AuthWrap>
    );
  }

  // ── HOSPITAL ──────────────────────────────────────────────────────
  if (step === 'hospital') {
    const Row = ({ label, value }) => (
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '11px 0', borderBottom: `1px solid ${AC.line}`,
      }}>
        <span style={{ fontSize: 12.5, color: AC.mute, fontWeight: 500, letterSpacing: -0.1 }}>{label}</span>
        <span style={{ fontSize: 13.5, color: AC.ink, fontWeight: 700, letterSpacing: -0.3 }}>{value}</span>
      </div>
    );
    return (
      <AuthWrap top={<AuthStepHeader progress={0.8} onBack={() => setStep('patient-code')}/>}>
        <AuthTitle sub="병원 시스템에서 자동으로 등록된 정보입니다. 변경이 필요하면 외래에서 의료진에게 요청해 주세요.">
          이 정보가 맞나요?
        </AuthTitle>
        <div style={{
          background: AC.card, borderRadius: 18, padding: '14px 18px',
          boxShadow: '0 1px 1.5px rgba(14,17,22,0.04)',
          animation: 'fadeUp 0.45s ease both',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 5,
              padding: '3px 10px', borderRadius: 100,
              background: `rgba(125,80,240,0.10)`, color: AC.accent,
              fontSize: 10.5, fontWeight: 700, letterSpacing: 0.4,
            }}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none">
                <path d="M5 13l4 4L19 7" stroke={AC.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              HOSPITAL VERIFIED
            </span>
          </div>
          <Row label="환자" value="김성인 · 58세 (남)"/>
          <Row label="진단명" value="대장암 (결장암 3기)"/>
          <Row label="진료 병원" value="서울아산병원"/>
          <Row label="주치의" value="종양내과 박현수 교수"/>
          <Row label="현재 항암요법" value="FOLFOX 5차"/>
          <Row label="다음 외래일" value="2026. 06. 03"/>
        </div>
        <div style={{ flex: 1, minHeight: 12 }}/>
        <AuthCTA onClick={() => setStep('done')}>네, 맞아요 · 시작하기</AuthCTA>
        <div style={{ height: 8 }}/>
        <AuthCTA variant="secondary" onClick={() => setStep('patient-code')}>정보가 달라요</AuthCTA>
      </AuthWrap>
    );
  }

  // ── DONE ──────────────────────────────────────────────────────────
  if (step === 'done') {
    return (
      <div style={{
        width: '100%', minHeight: '100%', display: 'flex', flexDirection: 'column',
        background: AC.bg, padding: '90px 28px 28px',
      }}>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
          <div style={{ marginBottom: 26, animation: 'fadeUp 0.5s ease both' }}>
            <img src="ai-orb.svg" alt="" style={{ width: 72, height: 72, borderRadius: '50%' }} />
          </div>
          <div style={{ fontSize: 22, fontWeight: 800, color: AC.ink, letterSpacing: -0.6, lineHeight: 1.3, animation: 'fadeUp 0.5s 0.1s both' }}>
            준비가 끝났어요 🎉
          </div>
          <div style={{ fontSize: 13.5, color: AC.mute, marginTop: 10, lineHeight: 1.6, letterSpacing: -0.1, animation: 'fadeUp 0.5s 0.18s both' }}>
            성인님, 환영합니다.<br/>
            지금부터 매일의 컨디션을<br/>함께 기록하고 관리해드릴게요.
          </div>
        </div>
        <AuthCTA onClick={onComplete}>홈으로 이동</AuthCTA>
      </div>
    );
  }

  return null;
}

// ─── App ───────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULT);
  const [authed, setAuthed] = React.useState(false);

  return (
    <div data-screen-label="01 PRO Home" style={{
      minHeight: '100vh',
      background: tweaks.darkMode
        ? 'radial-gradient(ellipse at top, #0a1412 0%, #000 80%)'
        : 'radial-gradient(ellipse at top, #f3f6f5 0%, #e8ecea 100%)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '40px 0',
    }}>
      <IOSDevice width={402} height={874} dark={tweaks.darkMode}>
        {!authed ? (
          <Auth onComplete={() => setAuthed(true)} />
        ) : (
          <PROScreen tweaks={tweaks} setTweak={setTweak} />
        )}
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Symbol">
          <TweakRadio
            label="Variant"
            value={tweaks.variant}
            options={['aurora', 'liquid', 'plasma']}
            onChange={v => setTweak('variant', v)}
          />
          <TweakRadio
            label="State"
            value={tweaks.state}
            options={['idle', 'thinking', 'listening']}
            onChange={v => setTweak('state', v)}
          />
        </TweakSection>
        <TweakSection label="Theme">
          <TweakToggle label="Dark mode" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
        </TweakSection>
        <TweakSection label="Copy">
          <TweakText label="Greeting" value={tweaks.greeting} onChange={v => setTweak('greeting', v)} />
          <TweakText label="Subtitle" value={tweaks.subGreeting} onChange={v => setTweak('subGreeting', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
