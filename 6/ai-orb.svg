<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="sphere" cx="30%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#41d2b4"/>
      <stop offset="100%" stop-color="#5a3aa8"/>
    </radialGradient>
    <radialGradient id="bottomShadow" cx="70%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#5a3aa8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5a3aa8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobMid" cx="65%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#7d50f0" stop-opacity="1"/>
      <stop offset="18%" stop-color="#7d50f0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#7d50f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobAccent" cx="30%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#ee3f60" stop-opacity="1"/>
      <stop offset="16%" stop-color="#ee3f60" stop-opacity="1"/>
      <stop offset="55%" stop-color="#ee3f60" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobMid2" cx="25%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#7d50f0" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#7d50f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobAccent2" cx="75%" cy="25%" r="28%">
      <stop offset="0%" stop-color="#ee3f60" stop-opacity="0.85"/>
      <stop offset="42%" stop-color="#ee3f60" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#41d2b4"/>
      <stop offset="65%" stop-color="#41d2b4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="specular" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rimLight" cx="78%" cy="80%" r="22%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur14" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="softBlur18" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softBlur6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="softBlur2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="sphereClip">
      <circle cx="200" cy="200" r="148"/>
    </clipPath>
  </defs>

  <!-- Outer pulse rings -->
  <circle cx="200" cy="200" r="148" fill="none" stroke="#41d2b4" stroke-width="1" opacity="0.22"/>
  <circle cx="200" cy="200" r="134" fill="none" stroke="#41d2b4" stroke-width="1" opacity="0.16"/>

  <!-- Sphere with all chromatic layers, clipped to circle -->
  <g clip-path="url(#sphereClip)" filter="url(#outerGlow)">
    <!-- Base sphere -->
    <circle cx="200" cy="200" r="148" fill="url(#sphere)"/>
    <circle cx="200" cy="200" r="148" fill="url(#bottomShadow)"/>

    <!-- Color blobs (screen blend approximated by additive overlay) -->
    <g style="mix-blend-mode: screen">
      <circle cx="200" cy="200" r="148" fill="url(#blobMid)" filter="url(#softBlur14)"/>
      <circle cx="200" cy="200" r="148" fill="url(#blobAccent)" filter="url(#softBlur14)" opacity="0.95"/>
      <circle cx="200" cy="200" r="148" fill="url(#blobMid2)" filter="url(#softBlur18)" opacity="0.85"/>
      <circle cx="200" cy="200" r="148" fill="url(#blobAccent2)" filter="url(#softBlur18)" opacity="0.8"/>
      <!-- Inner core highlight -->
      <ellipse cx="184" cy="184" rx="47" ry="47" fill="url(#core)" filter="url(#softBlur6)"/>
    </g>

    <!-- Specular highlight (top-left) -->
    <ellipse cx="232" cy="160" rx="80" ry="64" fill="url(#specular)" filter="url(#softBlur2)"/>
    <circle cx="244" cy="170" r="7" fill="#ffffff" opacity="0.9" filter="url(#softBlur2)"/>

    <!-- Rim light (bottom-right) -->
    <circle cx="200" cy="200" r="148" fill="url(#rimLight)"/>
  </g>

  <!-- Inset AO ring -->
  <circle cx="200" cy="200" r="148" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
</svg>
