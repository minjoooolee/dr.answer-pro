<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>닥터앤서 PRO Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
  body {
    font-family: 'Pretendard', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #f3f6f5;
  }
  input::placeholder { color: rgba(0,0,0,0.35); }

  @keyframes aiPulse {
    0%   { transform: scale(0.85); opacity: 0.55; }
    100% { transform: scale(1.25); opacity: 0; }
  }
  @keyframes aiBreathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  @keyframes aiHeart {
    0%, 100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.6; }
    50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }
  @keyframes aiRotate {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes aiBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }
  @keyframes aiWave {
    0%, 100% { height: 30%; }
    50%      { height: 90%; }
  }
  @keyframes blobA {
    0%, 100% { transform: translate(0%, 0%) scale(1); }
    33%      { transform: translate(-12%, 8%) scale(1.18); }
    66%      { transform: translate(8%, -10%) scale(0.92); }
  }
  @keyframes blobB {
    0%, 100% { transform: translate(0%, 0%) scale(1); }
    50%      { transform: translate(14%, -6%) scale(1.12); }
  }
  @keyframes blobC {
    0%, 100% { transform: translate(0%, 0%) scale(1); }
    40%      { transform: translate(-10%, -8%) scale(1.2); }
    80%      { transform: translate(6%, 10%) scale(0.9); }
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes slideInRight {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
